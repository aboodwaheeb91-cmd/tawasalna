<style>
:root{--ac:#00c896;--ac2:#2563ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:#070b18;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 16px;overflow-x:hidden;}

/* BG */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(110px);animation:breathe 9s ease-in-out infinite;}
.o1{width:600px;height:600px;background:#00c896;opacity:.12;top:-200px;right:-160px;}
.o2{width:500px;height:500px;background:#2563ff;opacity:.11;bottom:-180px;left:-140px;animation-delay:4s;}
.o3{width:280px;height:280px;background:#8b5cf6;opacity:.07;top:40%;left:30%;animation-delay:2s;}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.08) translateY(-18px);}}
.grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:52px 52px;}

/* WRAP */
.wrap{position:relative;z-index:10;width:100%;max-width:420px;}

/* LOGO */
.logo{text-align:center;margin-bottom:28px;}
.logo-mark{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.logo-sub{font-size:.7rem;color:rgba(255,255,255,.28);margin-top:3px;}

/* TYPE CARDS - compact */
.type-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.type-btn{
  padding:10px 8px;
  border-radius:14px;
  border:2px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);
  cursor:pointer;
  text-align:center;
  transition:all .25s;
  font-family:'Cairo',sans-serif;
  display:flex;
  align-items:center;
  gap:8px;
  justify-content:center;
}
.type-btn:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.07);}
.type-btn.active{border-color:var(--ac);background:rgba(0,200,150,.08);}
.type-btn.active.inst{border-color:var(--ac2);background:rgba(37,99,255,.08);}
.tb-ico{font-size:1.3rem;flex-shrink:0;}
.tb-name{font-size:.8rem;font-weight:800;color:#fff;}
.tb-sub{font-size:.62rem;color:rgba(255,255,255,.35);}

/* BUBBLE */
.bubble{
  background:linear-gradient(160deg,rgba(20,30,55,.9),rgba(10,18,38,.95));
  border:1px solid rgba(255,255,255,.09);
  border-radius:22px;
  padding:26px 24px;
  backdrop-filter:blur(24px);
  box-shadow:0 20px 70px rgba(0,0,0,.6);
}

/* FORM TITLE */
.form-title{font-size:.92rem;font-weight:900;color:#fff;margin-bottom:18px;}

/* FIELDS */
.field{margin-bottom:13px;}
.field label{display:block;font-size:.71rem;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:5px;}
.field input,
.field select{
  width:100%;
  padding:11px 14px;
  background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.09);
  border-radius:12px;
  color:#fff;
  font-family:'Cairo',sans-serif;
  font-size:.84rem;
  outline:none;
  direction:rtl;
  transition:border-color .2s;
  appearance:none;
}
.field input:focus,
.field select:focus{border-color:var(--ac);}
.field input::placeholder{color:rgba(255,255,255,.28);}
.field select{cursor:pointer;}
.field select option{background:#0d1526;color:#fff;}

/* CTA */
.cta{
  width:100%;padding:13px;border:none;border-radius:13px;
  background:linear-gradient(135deg,var(--ac),var(--ac2));
  color:#fff;font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:900;
  cursor:pointer;transition:all .25s;margin-top:4px;
}
.cta:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,200,150,.35);}
.cta:disabled{opacity:.6;transform:none;cursor:wait;}

/* SWITCH */
.switch-link{text-align:center;margin-top:14px;font-size:.73rem;color:rgba(255,255,255,.35);}
.switch-link span{color:var(--ac);cursor:pointer;font-weight:700;}
.switch-link span:hover{text-decoration:underline;}

/* HIDDEN */

.hidden{display:none!important;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 18px;border-radius:12px;font-size:.78rem;font-weight:700;z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:#065f46;color:#6ee7b7;border:1px solid rgba(110,231,183,.2);}
.toast.error{background:#7f1d1d;color:#fca5a5;border:1px solid rgba(252,165,165,.2);}


/* ══ ITQAN - Shared Utilities ══ */
@keyframes tw-shimmer{0%{background-position:-1000px 0}100%{background-position:1000px 0}}
@keyframes tw-spin{to{transform:translateY(-50%) rotate(360deg);}}
@keyframes tw-fadein{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes tw-verified{0%,100%{box-shadow:0 0 0 0 rgba(0,200,150,0);}50%{box-shadow:0 0 0 5px rgba(0,200,150,.15);}}
.tw-toast[aria-live="polite"]{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(7,11,24,.97);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(20px);border-radius:14px;padding:12px 20px;display:flex;align-items:center;gap:10px;font-size:.82rem;font-family:Cairo,sans-serif;color:rgba(255,255,255,.92);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:9999;white-space:nowrap;min-width:180px;justify-content:center;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.tw-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.tw-toast.success{border-color:rgba(0,200,150,.3);}
.tw-toast.error{border-color:rgba(239,68,68,.3);}
.tw-toast.info{border-color:rgba(37,99,255,.3);}
.tw-skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 75%);background-size:2000px 100%;animation:tw-shimmer 1.5s infinite linear;border-radius:8px;}
.tw-btn-loading{position:relative;pointer-events:none;opacity:.8;}
.tw-btn-loading::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;animation:tw-spin .7s linear infinite;right:12px;top:50%;transform:translateY(-50%);}
.tw-scroll-prog{position:fixed;top:0;left:0;height:2px;z-index:999;background:linear-gradient(90deg,var(--ac,#00c896),var(--ac2,#2563ff));transition:width .1s;width:0%;}
.tw-fab{position:fixed;bottom:80px;left:18px;width:50px;height:50px;border-radius:50%;border:none;font-size:1.4rem;background:linear-gradient(135deg,var(--ac,#00c896),var(--ac2,#2563ff));color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(0,200,150,.35);transition:all .25s cubic-bezier(.34,1.56,.64,1);z-index:50;display:flex;align-items:center;justify-content:center;}
.tw-fab:hover{transform:scale(1.12) rotate(90deg);}
.tw-empty{text-align:center;padding:50px 20px;}
.tw-empty-ico{font-size:2.5rem;margin-bottom:12px;opacity:.7;display:block;}
.tw-empty-title{font-size:.95rem;font-weight:800;margin-bottom:6px;}
.tw-empty-sub{font-size:.78rem;color:rgba(255,255,255,.35);margin-bottom:18px;line-height:1.6;}
.tw-empty-btn{padding:10px 22px;border-radius:12px;background:linear-gradient(135deg,var(--ac,#00c896),var(--ac2,#2563ff));border:none;color:#fff;font-family:Cairo,sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;}
.tw-card-lift{transition:transform .2s,box-shadow .2s;}
.tw-card-lift:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.tw-verified{animation:tw-verified 2.5s ease-in-out infinite;}

</style>

.pass-eye:hover{opacity:.9;}

<script>// Redirect if already logged in
try{
  var _lu=JSON.parse(localStorage.getItem('tw_user'));
  if(_lu&&_lu.id){
    var dest=_lu.user_type==='co'?'company-profile.html?id='+(_lu.tw_id||_lu.id)
            :_lu.user_type==='edu'?'edu-profile.html?id='+(_lu.tw_id||_lu.id)
            :'profile.html?id='+(_lu.tw_id||_lu.id);
    window.location.href=dest;
  }
}catch(e){}

// Redirect if already logged in
try{
  const _lu=JSON.parse(localStorage.getItem('tw_user'));
  if(_lu&&_lu.id){
    const dest=_lu.user_type==='co'?'company-profile.html?id='+(_lu.tw_id||_lu.id)
              :_lu.user_type==='edu'?'edu-profile.html?id='+(_lu.tw_id||_lu.id)
              :'profile.html?id='+(_lu.tw_id||_lu.id);
    window.location.href=dest;
  }
}catch(e){}

let curType = 'emp';
let instUserType = '';
let instSubtype = '';

// ── Auto redirect ──
try {
  const saved = JSON.parse(localStorage.getItem('tw_user'));
  if(saved && saved.id){
    redirect(saved);
  }
} catch(e){}


function redirect(u){
  const dest = u.user_type==='co' ? 'company-profile.html?id='+(u.tw_id||u.id)
             : u.user_type==='edu' ? 'edu-profile.html?id='+(u.tw_id||u.id)
             : 'profile.html?id='+(u.tw_id||u.id);
  window.location.href = dest;
}

function selectType(type){
  curType = type;
  const empBtn = document.getElementById('empBtn');
  const instBtn = document.getElementById('instBtn');
  const instField = document.getElementById('instTypeField');
  const nameLabel = document.getElementById('nameLabel');
  const rName = document.getElementById('rName');

  // Always go back to login when switching type
  showLogin();

  if(type === 'emp'){
    empBtn.classList.add('active');
    empBtn.classList.remove('inst');
    instBtn.classList.remove('active','inst');
    instField.classList.add('hidden');
    nameLabel.textContent = 'الاسم الكامل';
    rName.placeholder = 'اكتب اسمك...';
  } else {
    instBtn.classList.add('active','inst');
    empBtn.classList.remove('active');
    nameLabel.textContent = 'اسم الجهة / المؤسسة';
    rName.placeholder = 'اسم شركتك أو مؤسستك...';
  }
}

function showRegister(){
  document.getElementById('loginSection').classList.add('hidden');
  document.getElementById('registerSection').classList.remove('hidden');
  // Show inst type if جهة is selected
  if(curType === 'inst'){
    document.getElementById('instTypeField').classList.remove('hidden');
  }
}

function showLogin(){
  document.getElementById('registerSection').classList.add('hidden');
  document.getElementById('instTypeField').classList.add('hidden');
  document.getElementById('loginSection').classList.remove('hidden');
}

function toast(msg, type='success'){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'), 3200);
}

async function doLogin(){
  const email = document.getElementById('lEmail').value.trim();
  const pass = document.getElementById('lPass').value;
  if(!email||!pass){ toast('أدخل البريد وكلمة المرور','error'); return; }
  const btn = document.getElementById('loginBtn');
  setBtnLoad(btn, true);
  try{
    const res = await fetch('/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email, password:pass})
    });
    const data = await res.json();
    if(!res.ok){ toast(data.detail||'بيانات الدخول غير صحيحة','error'); return; }
    localStorage.setItem('tw_user', JSON.stringify(data.user));
        if(data.token) localStorage.setItem('tw_jwt', data.token);
    toast('مرحباً بك! 👋');
    setTimeout(()=>redirect(data.user), 600);
  }catch(e){ toast('تعذّر الاتصال بالخادم','error'); }
  finally{ btn.disabled=false; btn.textContent='دخول'; }
}

async function doRegister(){
  const full_name = document.getElementById('rName').value.trim();
  const email = document.getElementById('rEmail').value.trim();
  const password = document.getElementById('rPass').value;

  if(!full_name){ toast('أدخل الاسم','error'); return; }
  if(!email){ toast('أدخل البريد الإلكتروني','error'); return; }
  if(password.length<6){ toast('كلمة المرور قصيرة جداً','error'); return; }

  let user_type = 'emp';
  if(curType === 'inst'){
    const val = document.getElementById('instSubtype').value;
    if(!val){ toast('اختر نوع الجهة','error'); return; }
    const parts = val.split('|');
    user_type = parts[0];
    instSubtype = parts[1];
  }

  const btn = document.getElementById('regBtn');
  btn.disabled=true; btn.textContent='جاري الإنشاء...';
  try{
    const res = await fetch('/auth/register',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({full_name, email, password, user_type})
    });
    const data = await res.json();
    if(!res.ok){ toast(data.detail||'خطأ في التسجيل','error'); return; }
    const userData = {...data.user, institution_subtype: instSubtype||''};
    localStorage.setItem('tw_user', JSON.stringify(userData));
        if(data.token) localStorage.setItem('tw_jwt', data.token);
    toast('تم إنشاء حسابك! 🎉');
    setTimeout(()=>redirect(data.user), 700);
  }catch(e){ toast('تعذّر الاتصال بالخادم','error'); }
  finally{ btn.disabled=false; btn.textContent='إنشاء حساب'; }
}

document.addEventListener('keydown', e => {
  if(e.key==='Enter'){
    const login = document.getElementById('loginSection');
    if(!login.classList.contains('hidden')) doLogin();
    else doRegister();
  }
});


// ── Password Strength ──
function checkPassStrength(val){
  var bar=document.getElementById('passStrengthBar');
  var fill=document.getElementById('passStrengthFill');
  var label=document.getElementById('passStrengthLabel');
  if(!bar||!val){if(bar)bar.style.display='none';return;}
  bar.style.display='block';label.style.display='block';
  var score=0;
  if(val.length>=8) score++;
  if(val.length>=12) score++;
  if(/[A-Z]/.test(val)) score++;
  if(/[0-9]/.test(val)) score++;
  if(/[^A-Za-z0-9]/.test(val)) score++;
  var levels=[
    {w:'20%',c:'#ef4444',t:'ضعيف جداً'},
    {w:'40%',c:'#f97316',t:'ضعيف'},
    {w:'60%',c:'#eab308',t:'متوسط'},
    {w:'80%',c:'#22c55e',t:'قوي'},
    {w:'100%',c:'#00c896',t:'قوي جداً'}
  ];
  var level=levels[Math.min(score,4)];
  fill.style.width=level.w;fill.style.background=level.c;
  label.textContent=level.t;label.style.color=level.c;
}

// ══ ITQAN Utilities ══
var _twToast=null;
function showToast(msg,type,dur){
  type=type||'success';dur=dur||2800;
  if(_twToast){_twToast.remove();}
  var t=document.createElement('div');
  t.className='tw-toast '+type;
  var ico=type==='success'?'✅':type==='error'?'❌':'ℹ️';
  t.innerHTML='<span>'+ico+'</span><span>'+msg+'</span>';
  document.body.appendChild(t);
  _twToast=t;
  requestAnimationFrame(function(){requestAnimationFrame(function(){t.classList.add('show');});});
  setTimeout(function(){t.classList.remove('show');setTimeout(function(){if(t.parentNode)t.remove();},350);},dur);
}
function setBtnLoad(btn,loading){
  if(!btn)return;
  if(loading){btn.classList.add('tw-btn-loading');btn._orig=btn.textContent;btn.textContent='';btn.disabled=true;}
  else{btn.classList.remove('tw-btn-loading');btn.textContent=btn._orig||'حفظ';btn.disabled=false;}
}
function twNavigate(url){
  document.body.style.cssText='opacity:0;transform:translateY(-6px);transition:all .2s ease;';
  setTimeout(function(){window.location.href=url;},180);
}
function initScrollProg(){
  var p=document.createElement('div');p.className='tw-scroll-prog';
  document.body.prepend(p);
  window.addEventListener('scroll',function(){
    var pct=window.scrollY/(document.body.scrollHeight-window.innerHeight)*100;
    p.style.width=Math.min(pct,100)+'%';
  });
}
