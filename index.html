<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html">
<head>
<meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="dns-prefetch" href="https://tawasolna.com">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00c896">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="تواصلنا">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - تواصلنا</title>
  <meta name="description" content="سجّل دخولك أو أنشئ حسابك في تواصلنا - منصة التوظيف والتوثيق العربية.">
  <meta property="og:title" content="تسجيل الدخول - تواصلنا">
  <meta property="og:description" content="سجّل دخولك أو أنشئ حسابك في تواصلنا - منصة التوظيف والتوثيق العربية.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://tawasolna.com">
  <meta property="og:locale" content="ar_AR">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="تسجيل الدخول - تواصلنا">
  <meta name="twitter:description" content="سجّل دخولك أو أنشئ حسابك في تواصلنا - منصة التوظيف والتوثيق العربية.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://tawasolna.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/tw_shared.css">
<link rel="stylesheet" href="/index.css?v=auth-gw-v1">
<a href="#main-content" class="skip-link">تخطى للمحتوى الرئيسي</a>
</head>
<body>

<div class="bg"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div class="grid"></div>

<main id="main-content" class="wrap">

  <!-- Logo -->
  <div class="logo">
    <div class="logo-mark nav-logo">
      <img src="https://wrxvmdmknhoufoeprpoc.supabase.co/storage/v1/object/public/site/Logo.svg"
           alt="تواصلنا" style="height:36px;width:auto;object-fit:contain;display:block">
    </div>
    <div class="logo-sub">منصة التوظيف والتوثيق العربية</div>
  </div>

  <!--
    Role selector — register-only.
    Hidden by default (login view); shown by showRegister() / hidden by showLogin().
    3 explicit cards: emp | co | edu — no ambiguous dropdown.
    Hash routes: /login#register-emp, /login#register-co, /login#register-edu
  -->
  <div class="type-row hidden" id="typeRow">
    <div class="type-btn active" id="empBtn" onclick="selectType('emp')">
      <div class="tb-ico">👤</div>
      <div class="tb-name">موظف</div>
      <div class="tb-sub">باحث عن عمل</div>
    </div>
    <div class="type-btn" id="coBtn" onclick="selectType('co')">
      <div class="tb-ico">🏢</div>
      <div class="tb-name">شركة</div>
      <div class="tb-sub">صاحب عمل</div>
    </div>
    <div class="type-btn" id="eduBtn" onclick="selectType('edu')">
      <div class="tb-ico">🎓</div>
      <div class="tb-name">مؤسسة تعليمية</div>
      <div class="tb-sub">جامعة · مركز تدريب</div>
    </div>
  </div>

  <!-- Auth card -->
  <div class="bubble">

    <!-- ── LOGIN FORM ── -->
    <div id="loginSection">
      <div class="form-title">دخول</div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input id="lEmail" autocomplete="email" type="email" placeholder="example@email.com">
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input id="lPass" autocomplete="current-password" type="password" placeholder="••••••••">
      </div>
      <div style="text-align:left;margin-bottom:12px">
        <span style="font-size:.7rem;color:rgba(255,255,255,.3);cursor:pointer">نسيت كلمة المرور؟</span>
      </div>
      <button class="cta" id="loginBtn" onclick="doLogin()">دخول</button>
      <div class="switch-link">مستخدم جديد؟ <span onclick="showRegister()">سجّل الآن</span></div>
    </div>

    <!-- ── OR divider + Google SSO placeholder ── -->
    <div style="margin-top:16px;display:flex;align-items:center;gap:10px">
      <div style="flex:1;height:1px;background:rgba(255,255,255,.08)"></div>
      <span style="font-size:.7rem;color:rgba(255,255,255,.3)">أو</span>
      <div style="flex:1;height:1px;background:rgba(255,255,255,.08)"></div>
    </div>
    <button onclick="showToast('قريباً - تسجيل بـ Google','info')"
            style="width:100%;margin-top:12px;padding:11px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.6);font-family:Cairo,sans-serif;font-size:.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
      🌐 متابعة بـ Google
    </button>

    <!-- ── REGISTER FORM ── -->
    <div id="registerSection" class="hidden">
      <div class="form-title">تسجيل جديد</div>
      <div class="field">
        <label id="nameLabel">الاسم الكامل</label>
        <input id="rName" autocomplete="off" placeholder="اكتب اسمك...">
      </div>
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input id="rEmail" autocomplete="off" type="email" placeholder="example@email.com">
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input id="rPass" autocomplete="new-password" type="password"
               placeholder="6 أحرف على الأقل" oninput="checkPassStrength(this.value)">
      </div>
      <div id="passStrengthBar"
           style="height:3px;border-radius:2px;background:rgba(255,255,255,.08);margin-top:6px;transition:all .3s;display:none">
        <div id="passStrengthFill" style="height:100%;border-radius:2px;width:0%;transition:all .3s"></div>
      </div>
      <div id="passStrengthLabel"
           style="font-size:.65rem;color:rgba(255,255,255,.4);margin-top:3px;display:none"></div>
      <button class="cta" id="regBtn" onclick="doRegister()">إنشاء حساب</button>
      <div class="switch-link">عندك حساب؟ <span onclick="showLogin()">دخول</span></div>
    </div>

  </div>
</main>

<div class="toast" id="toast"></div>

<script src="/tw_shared.js"></script>
<script src="/index.auth.js?v=auth-gw-v1"></script>
<script src="/index.ui.js?v=auth-gw-v1"></script>
</body>
</html>
