<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تواصلنا — البطاقة التعريفية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/tw_shared.css">
  <link rel="stylesheet" href="/static/profile-v2.css?v=modular-v1">
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
</head>
<body>
  <!-- Header -->
  <div class="sc-header">
    <button class="sc-home-pill" id="scHomeBtn"><i data-lucide="home" class="ico-sm"></i> الرئيسية</button>
    <div class="sc-logo">
      <img src="https://wrxvmdmknhoufoeprpoc.supabase.co/storage/v1/object/public/site/33333.svg"
           alt="تواصلنا"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span class="sc-logo-fallback" style="display:none">تواصلنا</span>
    </div>
    <div class="sc-head-icons">

      <!-- Eye preview button — owner only (hidden via CSS until body.view-owner) -->
      <div class="sc-eye-wrap" id="scEyeWrap">
        <button class="sc-hicon sc-hicon-bare" id="scEyeBtn" title="معاينة البروفايل">
          <i data-lucide="eye-off" class="ico sc-eye-icon-off"></i>
          <i data-lucide="eye"     class="ico sc-eye-icon-on"></i>
        </button>
        <div class="sc-eye-menu" id="scEyeMenu">

          <button class="sc-eye-item" id="scPreviewPublic">
            <i data-lucide="user-round" class="ico-sm"></i>
            معاينة كمستخدم مسجل
          </button>
          <button class="sc-eye-item" id="scPreviewGuest">
            <i data-lucide="user-x" class="ico-sm"></i>
            معاينة كزائر
          </button>
          <div class="sc-eye-sep"></div>
          <button class="sc-eye-item sc-eye-end" id="scPreviewEnd">
            <i data-lucide="x-circle" class="ico-sm"></i>
            إنهاء المعاينة
          </button>
        </div>
      </div>

      <button class="sc-hicon sc-hicon-bare" id="scBellBtn" title="الإشعارات"><i data-lucide="bell" class="ico"></i></button>
      <button class="sc-hicon sc-hicon-bare" id="scMsgBtn" title="الرسائل"><i data-lucide="message-circle-more" class="ico"></i></button>
      <button class="sc-hicon sc-hicon-bare" id="scMenuBtn" title="القائمة"><i data-lucide="menu" class="ico"></i></button>
    </div>
  </div>

  <div class="sc-wrap">
    <div id="scLoading" class="sc-loading">جاري التحميل…</div>

    <div id="scContent" style="display:none">
      <div class="sc-main-card">
        <!-- Cover -->
        <div class="sc-cover" id="scCover">
          <button class="cv-edit-btn" id="cvEditBtn" title="تغيير الكفر">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </button>
          <input type="file" id="cvFileInput" accept="image/jpeg,image/png,image/webp" style="display:none">
        </div>

        <!-- Zero-height anchor: positions edit button just below the cover edge, not inside it -->
        <div class="sc-edit-anchor">
          <button class="sc-prof-edit-btn owner-only" id="scEditProfileBtn" title="تعديل الملف الشخصي" style="display:none">
            <i data-lucide="pencil" class="ico-sm"></i>
          </button>
        </div>

        <!-- Profile row: avatar+QR (right) | info (left) -->
        <div class="sc-prof-row">
          <div class="sc-ava-col">
            <div class="sc-avatar-wrap" id="scAvatarWrap">
              <div class="sc-avatar" id="scAvatar"><i data-lucide="user" class="ico-lg"></i></div>
              <button class="av-cam-btn" id="avCamBtn" title="تغيير الصورة">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              </button>
              <input type="file" id="avFileInput" accept="image/jpeg,image/png,image/webp" style="display:none">
            </div>
            <div class="sc-qr" id="scQr"></div>
          </div>
          <div class="sc-info">
            <div class="sc-name-row">
              <span class="sc-verified" id="scVerified" style="display:none" data-tooltip="حساب موثق" tabindex="0"><svg class="sc-verified-ico" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z" fill="rgba(37,99,255,0.22)" stroke="#00c896" stroke-width="1.8" stroke-linejoin="round"/><path d="m9 12 2 2 4-4" stroke="rgba(255,255,255,0.88)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
              <span class="sc-name" id="scName">—</span>
            </div>
            <div class="sc-title" id="scTitle"></div>
            <div class="sc-bio" id="scBio"></div>
            <button class="sc-bio-more" id="scBioMore" style="display:none" onclick="toggleBio()">عرض المزيد ▾</button>
            <div class="sc-meta-row">
              <span class="sc-loc" id="scLoc"></span>
              <span class="sc-age" id="scAge" style="display:none"></span>
            </div>
            <div class="sc-link-row" id="scLinkRow">
              <i data-lucide="link" class="ico-sm"></i>
              <span class="sc-link-text" id="scLinkText"></span>

              <button class="sc-link-copy" id="scLinkCopy" title="نسخ الرابط">
                <i data-lucide="copy" class="ico-sm"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="sc-actions">
          <button class="sc-btn sc-btn-primary" id="scFollowBtn"><i data-lucide="user-plus" class="ico-sm"></i> متابعة</button>
          <button class="sc-btn sc-btn-ghost" id="scContactBtn"><i data-lucide="message-circle" class="ico-sm"></i> تواصل معي</button>
          <button class="sc-btn sc-btn-ghost" id="scFullBtn"><i data-lucide="file-text" class="ico-sm"></i> الملف</button>
        </div>

        <!-- Stats: 5 cells RTL order: الشهادات ← القوة ← المشاهدات ← المتابعون ← الخبرات -->
        <div class="sc-stats">
          <div class="sc-stat">
            <i data-lucide="graduation-cap" class="ico sc-stat-i" style="color:#f59e0b"></i>
            <div class="sc-stat-n" id="scStatEdu">—</div>
            <div class="sc-stat-l">الشهادات</div>
          </div>
          <div class="sc-stat">
            <i data-lucide="trending-up" class="ico sc-stat-i" style="color:#00c896"></i>
            <div class="sc-stat-n" id="scStatScore">—</div>
            <div class="sc-stat-l">القوة</div>
          </div>
          <div class="sc-stat">
            <i data-lucide="eye" class="ico sc-stat-i" style="color:#2563ff"></i>
            <div class="sc-stat-n" id="scStatViews">—</div>
            <div class="sc-stat-l">المشاهدات</div>
          </div>
          <div class="sc-stat">
            <i data-lucide="users" class="ico sc-stat-i" style="color:#8b5cf6"></i>
            <div class="sc-stat-n" id="scStatFollowers">—</div>
            <div class="sc-stat-l">المتابعون</div>
          </div>
          <div class="sc-stat">
            <i data-lucide="briefcase" class="ico sc-stat-i" style="color:#f97316"></i>
            <div class="sc-stat-n" id="scStatExp">—</div>
            <div class="sc-stat-l">الخبرات</div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="sc-tabs-wrap">
          <div class="sc-tabs">
            <button class="sc-tab active" data-tab="about" onclick="scTab('about',this)"><i data-lucide="user-round" class="ico-sm"></i> نبذة عني</button>
            <button class="sc-tab" data-tab="skills" onclick="scTab('skills',this)"><i data-lucide="zap" class="ico-sm"></i> المهارات</button>
            <button class="sc-tab" data-tab="exp" onclick="scTab('exp',this)"><i data-lucide="briefcase" class="ico-sm"></i> الخبرات</button>
            <button class="sc-tab" data-tab="edu" onclick="scTab('edu',this)"><i data-lucide="graduation-cap" class="ico-sm"></i> الشهادات</button>
            <button class="sc-tab" data-tab="courses" onclick="scTab('courses',this)"><i data-lucide="book-open" class="ico-sm"></i> الدورات</button>
            <button class="sc-tab" data-tab="langs" onclick="scTab('langs',this)"><i data-lucide="languages" class="ico-sm"></i> اللغات</button>
            <button class="sc-tab" data-tab="links" onclick="scTab('links',this)"><i data-lucide="link-2" class="ico-sm"></i> الروابط</button>
          </div>
        </div>

        <!-- Tab content -->
        <div class="sc-content">
          <div class="sc-pane active" id="pane-about">
            <div class="sc-about-card">
              <div class="sc-about-title"><i data-lucide="user-round" class="ico-sm"></i> نبذة عني</div>
              <div class="sc-bio-text" id="scAboutText"></div>
            </div>
          </div>
          <div class="sc-pane" id="pane-skills"><div class="sc-skills" id="scSkillsPane"></div></div>
          <div class="sc-pane" id="pane-exp"><div id="scExpPane"></div></div>
          <div class="sc-pane" id="pane-edu"><div id="scEduPane"></div></div>
          <div class="sc-pane" id="pane-courses"><div id="scCoursesPane"></div></div>
          <div class="sc-pane" id="pane-langs"><div id="scLangsPane"></div></div>
          <div class="sc-pane" id="pane-links"><div id="scLinksPane"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="sc-toast" id="scToast"></div>

  <!-- Cover Crop Overlay -->
  <div class="cv-crop-overlay" id="cvCropOverlay">
    <div class="cv-crop-card">
      <div class="cv-crop-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00c896" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-left:5px"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        تحديد منطقة الكفر (نسبة 6:1)
      </div>
      <canvas id="cvCropCanvas"></canvas>
      <div class="cv-zoom-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        <input type="range" id="cvZoomSlider" min="100" max="300" value="100" step="1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </div>
      <div class="cv-crop-actions">
        <button class="cv-crop-cancel" id="cvCropCancelBtn">إلغاء</button>
        <button class="cv-crop-save" id="cvCropSaveBtn">حفظ الكفر</button>
      </div>
    </div>
  </div>

  <!-- Avatar Crop Overlay -->
  <div class="av-crop-overlay" id="avCropOverlay">
    <div class="av-crop-card">
      <div class="av-crop-title"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00c896" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-left:6px"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>تحديد الصورة</div>
      <canvas id="avCropCanvas" width="260" height="260"></canvas>
      <div class="av-zoom-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        <input type="range" id="avZoomSlider" min="100" max="300" value="100" step="1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </div>
      <div class="av-crop-actions">
        <button class="av-crop-cancel" id="avCropCancelBtn">إلغاء</button>
        <button class="av-crop-save" id="avCropSaveBtn">حفظ الصورة</button>
      </div>
    </div>
  </div>

  <!-- Experience Modal -->
  <div class="ep-overlay" id="exOverlay">
    <div class="ep-sheet">
      <div class="ep-head">
        <span class="ep-title" id="exModalTitle">إضافة خبرة</span>
        <button class="ep-close" id="exClose"><i data-lucide="x" class="ico-sm"></i></button>
      </div>
      <div class="ep-body" id="exForm">
        <div class="ep-field">
          <label class="ep-label">المسمى الوظيفي *</label>
          <input class="ep-input" id="exTitle" placeholder="مثال: مطور ويب" autocomplete="off">
          <div class="ep-field-err" id="exTitleErr"></div>
        </div>
        <div class="ep-field">
          <label class="ep-label">اسم الشركة / جهة العمل *</label>
          <input class="ep-input" id="exCompany" placeholder="مثال: شركة تقنية" autocomplete="off">
          <div class="ep-field-err" id="exCompanyErr"></div>
        </div>
        <div class="ep-row2">
          <div class="ep-field">
            <label class="ep-label">سنة البداية</label>
            <select class="ep-select" id="exStart">
              <option value="">— اختر —</option>
            </select>
          </div>
          <div class="ep-field" id="exEndWrap">
            <label class="ep-label">سنة الانتهاء</label>
            <select class="ep-select" id="exEnd">
              <option value="">— اختر —</option>
            </select>
          </div>
        </div>
        <div class="ep-field">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--t2,#9aa5b4);font-size:.83rem">
            <input type="checkbox" id="exCurrent" style="width:16px;height:16px;accent-color:#00c896">
            ما زلت أعمل هنا
          </label>
        </div>
        <div class="ep-field">
          <label class="ep-label">الدولة (اختياري)</label>
          <select class="ep-select" id="exCountry">
            <option value="">— اختر الدولة —</option>
            <option value="JO">🇯🇴 الأردن</option>
            <option value="SA">🇸🇦 السعودية</option>
            <option value="AE">🇦🇪 الإمارات</option>
            <option value="KW">🇰🇼 الكويت</option>
            <option value="QA">🇶🇦 قطر</option>
            <option value="BH">🇧🇭 البحرين</option>
            <option value="OM">🇴🇲 عُمان</option>
            <option value="EG">🇪🇬 مصر</option>
            <option value="IQ">🇮🇶 العراق</option>
            <option value="SY">🇸🇾 سوريا</option>
            <option value="LB">🇱🇧 لبنان</option>
            <option value="PS">🇵🇸 فلسطين</option>
            <option value="YE">🇾🇪 اليمن</option>
            <option value="MA">🇲🇦 المغرب</option>
            <option value="DZ">🇩🇿 الجزائر</option>
            <option value="TN">🇹🇳 تونس</option>
            <option value="LY">🇱🇾 ليبيا</option>
            <option value="SD">🇸🇩 السودان</option>
          </select>
        </div>
        <div class="ep-field" id="exCityWrap" style="display:none">
          <label class="ep-label">المدينة (اختياري)</label>
          <select class="ep-select" id="exCity">
            <option value="">— اختر المدينة —</option>
          </select>
        </div>
        <div class="ep-field">
          <label class="ep-label">الوصف (اختياري)</label>
          <textarea class="ep-textarea" id="exDesc" placeholder="نبذة عن مهامك وإنجازاتك…" maxlength="600"></textarea>
          <div class="ep-field-err" id="exDescErr"></div>
        </div>
        <div class="ep-err" id="exErr"></div>
      </div>
      <div class="ep-footer">
        <button class="ep-cancel" id="exCancelBtn">إلغاء</button>
        <button class="ep-save" id="exSaveBtn">حفظ</button>
      </div>
    </div>
  </div>

  <!-- Edit Profile Modal — Phase 2: name, dob, country/city, avail, profession, bio -->
  <!-- Must be in DOM before profile-v2.edit.js runs -->
  <div class="ep-overlay" id="epOverlay">
    <div class="ep-sheet">
      <div class="ep-head">
        <span class="ep-title"><i data-lucide="pencil" class="ico-sm" style="color:var(--ac,#00c896);vertical-align:middle;margin-left:6px"></i> تعديل الملف الشخصي</span>
        <button class="ep-close" id="epClose"><i data-lucide="x" class="ico-sm"></i></button>
      </div>
      <div class="ep-body">

        <div class="ep-field">
          <label class="ep-label">الاسم</label>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
            <input class="ep-input" id="epFirstName" placeholder="الأول" autocomplete="off">
            <input class="ep-input" id="epMidName"   placeholder="الأوسط" autocomplete="off">
            <input class="ep-input" id="epLastName"  placeholder="العائلة" autocomplete="off">
          </div>
          <div class="ep-field-err" id="epNameErr"></div>
        </div>

        <div class="ep-field">
          <label class="ep-label">تاريخ الميلاد</label>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
            <select class="ep-select" id="epDobD"><option value="">اليوم</option></select>
            <select class="ep-select" id="epDobM">
              <option value="">الشهر</option>
              <option value="01">يناير</option><option value="02">فبراير</option>
              <option value="03">مارس</option><option value="04">أبريل</option>
              <option value="05">مايو</option><option value="06">يونيو</option>
              <option value="07">يوليو</option><option value="08">أغسطس</option>
              <option value="09">سبتمبر</option><option value="10">أكتوبر</option>
              <option value="11">نوفمبر</option><option value="12">ديسمبر</option>
            </select>
            <select class="ep-select" id="epDobY"><option value="">السنة</option></select>
          </div>
        </div>

        <div class="ep-field">
          <label class="ep-label">البلد</label>
          <select class="ep-select" id="epCountry" onchange="epLoadCities()">
            <option value="">— اختر البلد —</option>
            <option value="JO">🇯🇴 الأردن</option>
            <option value="SA">🇸🇦 السعودية</option>
            <option value="AE">🇦🇪 الإمارات</option>
            <option value="KW">🇰🇼 الكويت</option>
            <option value="QA">🇶🇦 قطر</option>
            <option value="BH">🇧🇭 البحرين</option>
            <option value="OM">🇴🇲 عُمان</option>
            <option value="EG">🇪🇬 مصر</option>
            <option value="IQ">🇮🇶 العراق</option>
            <option value="SY">🇸🇾 سوريا</option>
            <option value="LB">🇱🇧 لبنان</option>
            <option value="PS">🇵🇸 فلسطين</option>
            <option value="YE">🇾🇪 اليمن</option>
            <option value="MA">🇲🇦 المغرب</option>
            <option value="DZ">🇩🇿 الجزائر</option>
            <option value="TN">🇹🇳 تونس</option>
            <option value="LY">🇱🇾 ليبيا</option>
            <option value="SD">🇸🇩 السودان</option>
          </select>
        </div>

        <div class="ep-field" id="epCityWrap" style="display:none">
          <label class="ep-label">المدينة</label>
          <select class="ep-select" id="epCity">
            <option value="">— اختر المدينة —</option>
          </select>
        </div>

        <div class="ep-field">
          <label class="ep-label">حالة التوظيف</label>
          <select class="ep-select" id="epAvail">
            <option value="">— اختر —</option>
            <option value="open">متاح للعمل</option>
            <option value="employed">غير متاح حالياً</option>
            <option value="freelance">فريلانس</option>
            <option value="closed">غير متاح</option>
          </select>
        </div>

        <div class="ep-field">
          <label class="ep-label">التخصص المهني</label>
          <select class="ep-select" id="epProfession">
            <option value="">جاري التحميل…</option>
          </select>
        </div>

        <div class="ep-field">
          <label class="ep-label">نبذة تعريفية</label>
          <textarea class="ep-textarea" id="epBio" placeholder="اكتب نبذة عن نفسك…" maxlength="600"></textarea>
          <div class="ep-field-err" id="epBioErr"></div>
        </div>

        <div class="ep-err" id="epErr"></div>
      </div>
      <div class="ep-footer">
        <button class="ep-cancel" id="epCancelBtn">إلغاء</button>
        <button class="ep-save" id="epSaveBtn">حفظ التغييرات</button>
      </div>
    </div>
  </div>


  <!-- ── Education modal ── -->
  <div class="sc-modal-overlay" id="eduOverlay">
    <div class="sc-modal">
      <div class="sc-modal-head">
        <input type="text" class="sc-modal-title-inp" id="eduMTitle" readonly value="إضافة شهادة">
        <button class="sc-modal-close" id="eduClose">×</button>
      </div>
      <div class="sc-form-group">
        <label>المؤسسة التعليمية *</label>
        <input type="text" id="eduInst" placeholder="اسم الجامعة أو المدرسة">
      </div>
      <div class="sc-form-row">
        <div class="sc-form-group">
          <label>الدرجة العلمية</label>
          <input type="text" id="eduDeg" placeholder="بكالوريوس، ماجستير...">
        </div>
        <div class="sc-form-group">
          <label>التخصص</label>
          <input type="text" id="eduField" placeholder="علوم الحاسوب...">
        </div>
      </div>
      <div class="sc-form-row">
        <div class="sc-form-group">
          <label>سنة البداية</label>
          <input type="number" id="eduSY" placeholder="2018" min="1950" max="2100">
        </div>
        <div class="sc-form-group">
          <label>سنة التخرج</label>
          <input type="number" id="eduEY" placeholder="2022" min="1950" max="2100">
        </div>
      </div>
      <div class="sc-form-group">
        <label>وصف إضافي</label>
        <textarea id="eduDesc" placeholder="أي معلومات إضافية..."></textarea>
      </div>
      <div class="sc-modal-actions">
        <button class="sc-modal-save" id="eduSaveBtn">حفظ</button>
        <button class="sc-modal-cancel" id="eduCancelBtn">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- ── Courses modal ── -->
  <div class="sc-modal-overlay" id="courseOverlay">
    <div class="sc-modal">
      <div class="sc-modal-head">
        <input type="text" class="sc-modal-title-inp" id="courseMTitle" readonly value="إضافة دورة">
        <button class="sc-modal-close" id="courseClose">×</button>
      </div>
      <div class="sc-form-group">
        <label>اسم الدورة *</label>
        <input type="text" id="courseTitle" placeholder="اسم الدورة أو البرنامج التدريبي">
      </div>
      <div class="sc-form-group">
        <label>الجهة المانحة</label>
        <input type="text" id="courseProv" placeholder="Coursera، Udemy، LinkedIn Learning...">
      </div>
      <div class="sc-form-group">
        <label>تاريخ الإتمام</label>
        <input type="date" id="courseCD">
      </div>
      <div class="sc-form-group">
        <label>رابط الشهادة</label>
        <input type="url" id="courseCurl" placeholder="https://..." dir="ltr">
      </div>
      <div class="sc-form-group">
        <label>وصف</label>
        <textarea id="courseDesc" placeholder="مختصر عن محتوى الدورة..."></textarea>
      </div>
      <div class="sc-modal-actions">
        <button class="sc-modal-save" id="courseSaveBtn">حفظ</button>
        <button class="sc-modal-cancel" id="courseCancelBtn">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- ── Skills modal ── -->
  <div class="sc-modal-overlay" id="skillOverlay">
    <div class="sc-modal">
      <div class="sc-modal-head">
        <span style="font-size:1rem;font-weight:800;color:#fff">إضافة مهارة</span>
        <button class="sc-modal-close" id="skillClose">×</button>
      </div>
      <div class="sc-form-group">
        <label>اسم المهارة *</label>
        <input type="text" id="skillName" placeholder="JavaScript، Photoshop، إدارة المشاريع...">
      </div>
      <div class="sc-form-group">
        <label>المستوى (اختياري)</label>
        <select id="skillLevel">
          <option value="">— اختر المستوى —</option>
          <option value="مبتدئ">مبتدئ</option>
          <option value="متوسط">متوسط</option>
          <option value="متقدم">متقدم</option>
          <option value="خبير">خبير</option>
        </select>
      </div>
      <div class="sc-modal-actions">
        <button class="sc-modal-save" id="skillSaveBtn">حفظ</button>
        <button class="sc-modal-cancel" id="skillCancelBtn">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- ── Languages modal ── -->
  <div class="sc-modal-overlay" id="langOverlay">
    <div class="sc-modal">
      <div class="sc-modal-head">
        <span style="font-size:1rem;font-weight:800;color:#fff">إضافة لغة</span>
        <button class="sc-modal-close" id="langClose">×</button>

      <div class="sc-form-group">
        <label>اللغة *</label>
        <input type="text" id="langName" placeholder="العربية، الإنجليزية، الفرنسية...">
      </div>
      <div class="sc-form-group">
        <label>مستوى الإتقان (اختياري)</label>
        <select id="langLevel">
          <option value="">— اختر المستوى —</option>
          <option value="مبتدئ">مبتدئ</option>
          <option value="متوسط">متوسط</option>
          <option value="متقدم">متقدم</option>
          <option value="بطلاقة">بطلاقة</option>
          <option value="اللغة الأم">اللغة الأم</option>
        </select>
      </div>
      <div class="sc-modal-actions">
        <button class="sc-modal-save" id="langSaveBtn">حفظ</button>
        <button class="sc-modal-cancel" id="langCancelBtn">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- ── Links modal ── -->
  <div class="sc-modal-overlay" id="linkOverlay">
    <div class="sc-modal">
      <div class="sc-modal-head">
        <span style="font-size:1rem;font-weight:800;color:#fff">إضافة رابط</span>
        <button class="sc-modal-close" id="linkClose">×</button>
      </div>
      <div class="sc-form-group">
        <label>نوع الرابط</label>
        <select id="linkType">
          <option value="linkedin">LinkedIn</option>
          <option value="github">GitHub</option>
          <option value="website">الموقع الشخصي</option>
          <option value="twitter">Twitter / X</option>
          <option value="instagram">Instagram</option>
          <option value="behance">Behance</option>
          <option value="portfolio">Portfolio</option>
          <option value="other">رابط آخر</option>
        </select>
      </div>
      <div class="sc-form-group">
        <label>الرابط *</label>
        <input type="url" id="linkUrl" placeholder="https://..." dir="ltr">
      </div>
      <div class="sc-modal-actions">
        <button class="sc-modal-save" id="linkSaveBtn">حفظ</button>
        <button class="sc-modal-cancel" id="linkCancelBtn">إلغاء</button>
      </div>
    </div>
