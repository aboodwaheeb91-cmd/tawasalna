<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تواصلنا — البطاقة التعريفية</title>
  <link rel="stylesheet" href="/static/tw_shared.css">
  <style>
    /* ── Showcase: light, fast first-impression page (Step 1: structure only) ── */
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Cairo',sans-serif; background:var(--bg,#0a0e14); color:var(--t1,#fff);
      direction:rtl; min-height:100vh;
    }
    .sc-wrap { max-width:560px; margin:0 auto; padding-bottom:40px; }

    /* Cover + avatar */
    .sc-cover {
      height:160px; background:linear-gradient(135deg,var(--ac,#00c896),var(--ac2,#2563ff));
      position:relative; background-size:cover; background-position:center;
    }
    .sc-avatar {
      width:108px; height:108px; border-radius:50%; border:4px solid var(--bg,#0a0e14);
      background:var(--bg2,#141a24); position:absolute; bottom:-54px; right:50%;
      transform:translateX(50%); object-fit:cover; display:flex;
      align-items:center; justify-content:center; font-size:2.4rem;
    }

    /* Identity */
    .sc-identity { text-align:center; margin-top:68px; padding:0 20px; }
    .sc-name { font-size:1.4rem; font-weight:800; }
    .sc-title { color:var(--t2,#9aa5b4); font-size:.92rem; margin-top:4px; }
    .sc-bio { color:var(--t3,#6b7686); font-size:.84rem; margin-top:10px; line-height:1.6; }

    /* Action buttons */
    .sc-actions { display:flex; gap:10px; justify-content:center; margin:18px 20px; flex-wrap:wrap; }
    .sc-btn {
      padding:10px 18px; border-radius:12px; border:none; cursor:pointer;
      font-family:inherit; font-size:.82rem; font-weight:700;
    }
    .sc-btn-primary { background:linear-gradient(135deg,var(--ac,#00c896),var(--ac2,#2563ff)); color:#fff; }
    .sc-btn-ghost { background:rgba(255,255,255,.06); color:var(--t1,#fff); border:1px solid rgba(255,255,255,.1); }

    /* Stats */
    .sc-stats { display:flex; justify-content:center; gap:24px; margin:20px; padding:16px;
      background:var(--bg2,#141a24); border-radius:16px; }
    .sc-stat { text-align:center; }
    .sc-stat-n { font-size:1.3rem; font-weight:800; color:var(--ac,#00c896); }
    .sc-stat-l { font-size:.7rem; color:var(--t3,#6b7686); margin-top:2px; }

    /* Section card */
    .sc-card { margin:16px 20px; padding:16px; background:var(--bg2,#141a24); border-radius:16px; }
    .sc-card-title { font-size:.95rem; font-weight:700; margin-bottom:12px; }

    /* Skills */
    .sc-skills { display:flex; flex-wrap:wrap; gap:8px; }
    .sc-skill { padding:6px 12px; border-radius:20px; background:rgba(0,200,150,.12);
      color:var(--ac,#00c896); font-size:.76rem; }

    /* Latest items */
    .sc-item { padding:10px 0; border-bottom:1px solid rgba(255,255,255,.06); }
    .sc-item:last-child { border-bottom:none; }
    .sc-item-t { font-weight:600; font-size:.86rem; }
    .sc-item-s { color:var(--t3,#6b7686); font-size:.74rem; margin-top:2px; }

    /* Full profile button */
    .sc-full { display:block; margin:24px 20px; padding:14px; text-align:center;
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1);
      border-radius:14px; color:var(--ac,#00c896); font-weight:700; font-size:.88rem;
      text-decoration:none; cursor:pointer; }

    .sc-loading { text-align:center; padding:60px 20px; color:var(--t3,#6b7686); }
  </style>
</head>
<body>
  <div class="sc-wrap">
    <!-- Loading state (Step 2 will populate from API) -->
    <div id="scLoading" class="sc-loading">جاري التحميل…</div>

    <!-- Showcase content (hidden until data loads — Step 2) -->
    <div id="scContent" style="display:none">
      <!-- Cover + Avatar -->
      <div class="sc-cover" id="scCover">
        <div class="sc-avatar" id="scAvatar">👤</div>
      </div>

      <!-- Identity -->
      <div class="sc-identity">
        <div class="sc-name" id="scName">—</div>
        <div class="sc-title" id="scTitle">—</div>
        <div class="sc-bio" id="scBio"></div>
      </div>

      <!-- Actions (Step 4: only "full profile" is wired; others hidden — no backing system yet) -->
      <div class="sc-actions">
        <button class="sc-btn sc-btn-primary" id="scContactBtn" style="display:none">💬 تواصل</button>
        <button class="sc-btn sc-btn-ghost" id="scCvBtn" style="display:none">📄 السيرة الذاتية</button>
        <button class="sc-btn sc-btn-ghost" id="scFollowBtn" style="display:none">+ متابعة</button>
      </div>

      <!-- Stats -->
      <div class="sc-stats" id="scStats">
        <div class="sc-stat"><div class="sc-stat-n" id="scStatScore">—</div><div class="sc-stat-l">القوة</div></div>
        <div class="sc-stat"><div class="sc-stat-n" id="scStatExp">—</div><div class="sc-stat-l">خبرات</div></div>
        <div class="sc-stat"><div class="sc-stat-n" id="scStatSkills">—</div><div class="sc-stat-l">مهارات</div></div>
      </div>

      <!-- Top skills -->
      <div class="sc-card">
        <div class="sc-card-title">أهم المهارات</div>
        <div class="sc-skills" id="scSkills"></div>
      </div>

      <!-- Latest experience -->
      <div class="sc-card">
        <div class="sc-card-title">أحدث الخبرات</div>
        <div id="scLatestExp"></div>
      </div>

      <!-- Full profile link → Details (profile.html) -->
      <a class="sc-full" id="scFullBtn">عرض الملف الكامل ←</a>
    </div>
  </div>

  <script src="/tw_shared.js"></script>
  <script>
  (function() {
    // ── Step 2: fetch + basic data (escape user content; no backend changes) ──
    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }
    function setText(id, val) {
      var el = document.getElementById(id);
      if (el) el.textContent = val == null ? '' : val;
    }

    var id = new URLSearchParams(location.search).get('id');
    if (!id) {
      var ld = document.getElementById('scLoading');
      if (ld) ld.textContent = 'لا يوجد معرّف ملف';
      return;
    }

    fetch('/profile/' + encodeURIComponent(id))
      .then(function(r) {
        if (!r.ok) throw new Error('profile fetch failed: ' + r.status);
        return r.json();
      })
      .then(function(res) {
        var p = (res && res.profile) ? res.profile : {};
        // Basic identity
        setText('scName', p.full_name || '—');
        setText('scTitle', p.headline || p.title || '');
        setText('scBio', p.bio || '');

        // Location (optional)
        if (p.location) {
          var t = document.getElementById('scTitle');
          if (t && (p.headline || p.title)) {
            t.textContent = (p.headline || p.title) + ' · 📍 ' + p.location;
          } else if (t) {
            t.textContent = '📍 ' + p.location;
          }
        }

        // Avatar (image if available, else emoji placeholder)
        var av = document.getElementById('scAvatar');
        if (av && p.avatar_url) {
          av.innerHTML = '<img src="' + esc(p.avatar_url) + '" alt="" ' +
            'style="width:100%;height:100%;border-radius:50%;object-fit:cover">';
        }
        // Cover stays default gradient (no cover_url for employee profiles)

        // ── Step 3: Stats (experience + skills counts; score loaded separately) ──
        var skills = Array.isArray(p.skills) ? p.skills : [];
        var exp    = Array.isArray(p.experience) ? p.experience : [];
        setText('scStatExp', exp.length);
        setText('scStatSkills', skills.length);

        // ── Top skills (first 6; hide section if none) ──
        var skillsCard = document.getElementById('scSkills');
        var skillsWrap = skillsCard ? skillsCard.closest('.sc-card') : null;
        if (skills.length && skillsCard) {
          skillsCard.innerHTML = skills.slice(0, 6).map(function(s) {
            var label = (s && typeof s === 'object') ? (s.skill || '') : s;
            return '<span class="sc-skill">' + esc(label) + '</span>';
          }).join('');
        } else if (skillsWrap) {
          skillsWrap.style.display = 'none';
        }

        // ── Latest experience (newest 3; hide section if none) ──
        var expList = document.getElementById('scLatestExp');
        var expWrap = expList ? expList.closest('.sc-card') : null;
        if (exp.length && expList) {
          expList.innerHTML = exp.slice(0, 3).map(function(e) {
            var t = esc(e.title || '');
            var c = esc(e.company || '');
            return '<div class="sc-item">' +
              '<div class="sc-item-t">' + t + '</div>' +
              (c ? '<div class="sc-item-s">' + c + '</div>' : '') +
            '</div>';
          }).join('');
        } else if (expWrap) {
          expWrap.style.display = 'none';
        }

        // ── Step 4: wire "full profile" button → Details (profile.html) ──
        var fullBtn = document.getElementById('scFullBtn');
        if (fullBtn) {
          fullBtn.href = '/profile.html?id=' + encodeURIComponent(id);
        }

        // Reveal content, hide loading
        var ld = document.getElementById('scLoading');
        var ct = document.getElementById('scContent');
        if (ld) ld.style.display = 'none';
        if (ct) ct.style.display = 'block';

        // ── Score: independent parallel fetch (failure must NOT break page) ──
        // Use NUMERIC id from response (score endpoint expects int, not tw_id)
        var numId = (p.id != null) ? p.id : id;
        fetch('/profile/' + encodeURIComponent(numId) + '/score')
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(sc) {
            if (sc && typeof sc.score !== 'undefined') setText('scStatScore', sc.score);
          })
          .catch(function() { /* score stays '—' — page already shown */ });
      })
      .catch(function() {
        var ld = document.getElementById('scLoading');
        if (ld) ld.textContent = 'تعذّر تحميل الملف';
      });
  })();
  </script>
</body>
</html>
