<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تواصلنا — البطاقة التعريفية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/tw_shared.css">
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <style>
    /* Unified Lucide icon sizing + stroke + theme color */
    .ico { width:18px; height:18px; stroke-width:2; vertical-align:middle; flex-shrink:0; }
    .ico-sm { width:15px; height:15px; stroke-width:2; }
    .ico-lg { width:40px; height:40px; stroke-width:1.5; }
    [data-lucide] { color:inherit; }
    * { margin:0; padding:0; box-sizing:border-box; }
    /* ── Typography system ── */    body {
      font-family:'Cairo',sans-serif; background:var(--bg,#0a0e14); color:var(--t1,#fff);
      direction:rtl; min-height:100vh;
    }

    /* ── Header ── */
    .sc-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:7px 16px; position:sticky; top:0; z-index:50;
      background:rgba(10,14,20,.85); backdrop-filter:blur(12px);
    }
    .sc-header .sc-logo {
      position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
      pointer-events:none;
    }
    .sc-hicon {
      width:34px; height:34px; border-radius:10px; border:none; cursor:pointer;
      background:rgba(255,255,255,.06); color:var(--t1,#fff); font-size:1rem;
      display:flex; align-items:center; justify-content:center;
    }
    .sc-hicon-bare { background:none !important; border:none !important; }
        .sc-head-icons { display:flex; align-items:center; gap:8px; }
    .sc-head-icons .sc-hicon-bare { width:auto; height:auto; padding:4px; }
    .sc-head-icons .ico { width:20px; height:20px; }
    .sc-hgroup { display:flex; align-items:center; gap:10px; }
    .sc-home-pill {
      display:inline-flex; align-items:center; gap:5px;
      padding:0 18px; height:27px; border-radius:9px; cursor:pointer;
      background:var(--ac,#00c896);
      border:1px solid rgba(255,255,255,.18);
      color:#fff; font-family:inherit; font-size:11px; font-weight:700;
      white-space:nowrap; transition:transform .15s, opacity .2s;
      box-shadow:0 2px 6px rgba(0,200,150,.12);
    }
    .sc-home-pill:active { transform:scale(.95); opacity:.9; }
    .sc-home-pill .ico-sm { width:14px; height:14px; }
    .sc-logo img { height:38px; width:auto; max-width:140px; object-fit:contain; display:block; }
    .sc-logo-fallback { font-weight:800; font-size:1rem; letter-spacing:-.3px;
      background:linear-gradient(135deg,var(--ac,#00c896),var(--ac2,#2563ff));
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }

    /* ── Main wrap ── */
    .sc-wrap { max-width:600px; margin:0 auto; padding:8px 16px 16px; }

    /* ── ONE big card ── */
    .sc-main-card {
      background:var(--bg2,#141a24); border-radius:13px; overflow:hidden;
      border:1px solid rgba(255,255,255,.06);
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }

    /* Cover — thin */
    .sc-cover {
      height:80px; position:relative;
      background:url('https://wrxvmdmknhoufoeprpoc.supabase.co/storage/v1/object/public/site/5a94336e02115ab59aa3c38f28ffb20a%20(1).jpg') center/cover no-repeat, linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      background-size:cover; background-position:center;
    }
    .sc-cover::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(180deg,transparent,rgba(20,26,36,.6));
    }

    /* Header row: avatar (right) + info (left) */
    .sc-prof-row {
      display:flex; gap:16px; padding:0 20px; margin-top:-40px; position:relative; z-index:2;
      align-items:flex-start;
    }
    .sc-ava-col { display:flex; flex-direction:column; align-items:center; gap:8px; flex-shrink:0; }
    /* ── Single glass ring avatar (ring centered on image edge) ── */
    .sc-avatar-wrap {
      position:relative; width:106px; height:106px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
    }
    /* The image */
    .sc-avatar {
      width:100%; height:100%; border-radius:50%;
      border:none; background:var(--bg,#0a0e14);
      object-fit:cover; display:flex; align-items:center; justify-content:center;
      font-size:2.6rem; overflow:hidden;
    }
    /* Single glass ring, centered on the image edge (50% in / 50% out)
       via outline (sits ON the border-box edge) + subtle glass tint */
    /* Single glass ring around avatar (only border source) */
    .sc-avatar-wrap::after {
      content:''; position:absolute; inset:0; border-radius:50%;
      border:3px solid rgba(225,230,240,.55);
      pointer-events:none;
      margin:-1.5px;
      width:calc(100% + 3px); height:calc(100% + 3px);
    }
    /* QR Card — same ring family as avatar */
    .sc-qr {
      width:78px; border-radius:16px;
      background:rgba(10,14,20,.65);
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      padding:6px;
      display:flex; flex-direction:column; align-items:center; gap:0;
      border:1px solid rgba(225,230,240,.28);
      box-shadow:0 4px 14px rgba(0,0,0,.22);
    }
    .sc-qr-inner {
      background:#fff; border-radius:9px; padding:0.5px;
      position:relative; width:100%;
      display:flex; align-items:center; justify-content:center;
    }
    .sc-qr-inner img { width:100%; height:auto; display:block; border-radius:7px; }
    .sc-qr-center {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:22%; height:22%; min-width:14px; min-height:14px;
      border-radius:50%;
      background:linear-gradient(135deg,#00d4b4,#2563ff);
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 0 2px #fff, 0 1px 4px rgba(0,0,0,.2);
      overflow:hidden;
    }
    .sc-qr-center img { width:65%; height:65%; object-fit:contain; filter:brightness(0) invert(1); }

    /* Invisible container: groups name + all info as one unit (transparent) */
    .sc-info { flex:1; min-width:0; padding-top:50px; padding-right:14px;
      background:transparent; border:none; }
    .sc-name-row { display:flex; align-items:center; gap:.3em; min-width:0; }
    .sc-verified {
      color:var(--ac,#00c896); display:inline-flex; align-items:center;
      flex-shrink:0; font-size:inherit;
    }
    /* Badge scales with name: 0.85em (~85% of text height) */
    .sc-verified .ico-sm { width:.85em; height:.85em; }
    .sc-meta-row { display:flex; align-items:center; gap:14px; margin-top:8px; flex-wrap:wrap; }
    .sc-age { color:var(--t3,#6b7686); font-size:.64rem; display:flex; align-items:center; gap:4px; }
    .sc-name {
      font-size:20px; font-weight:800; line-height:1.2;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width:100%; min-width:0;
    }
    .sc-title { color:var(--ac,#00c896); font-size:.74rem; margin-top:3px; font-weight:600; display:inline-flex; align-items:center; gap:4px; }
    .sc-loc { color:var(--t3,#6b7686); font-size:.64rem; }

    /* Profile link row */
    .sc-link-row {
      display:none; align-items:center; gap:5px; margin-top:6px;
      max-width:100%; overflow:hidden;
    }
    .sc-link-row .ico-sm { color:var(--t3,#6b7686); flex-shrink:0; }
    .sc-link-text {
      color:var(--t3,#6b7686); font-size:.6rem;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
      flex:1; min-width:0;
    }
    .sc-link-copy {
      flex-shrink:0; background:none; border:none; cursor:pointer;
      color:var(--t3,#6b7686); padding:2px; display:flex;
      align-items:center; border-radius:5px; transition:color .15s;
    }
    .sc-link-copy:hover { color:var(--ac,#00c896); }
    .sc-link-copy .ico-sm { width:13px; height:13px; }

    /* Bio under row */
    .sc-bio {
      color:var(--t2,#9aa5b4); font-size:8px; line-height:2; margin-top:2px; word-break:break-word;
      display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden;
    }
    .sc-bio.expanded { display:block; overflow:visible; }
    .sc-bio-more {
      color:var(--ac,#00c896); font-size:12px; font-weight:600; cursor:pointer;
      background:none; border:none; padding:4px 0 0; font-family:inherit; display:inline-block;
    }

    /* Action buttons */
    .sc-actions {
      display:flex; flex-direction:row; align-items:center; justify-content:center;
      flex-wrap:nowrap; gap:10px; padding:6px 20px 13px;
    }
    .sc-btn {
      height:27px; border-radius:9px; border:none; cursor:pointer;
      font-family:inherit; font-size:11px; font-weight:700;
      transition:transform .15s, opacity .15s;
      white-space:nowrap; flex-shrink:0;
      display:inline-flex; align-items:center; justify-content:center; gap:5px;
    }
    .sc-btn-primary { padding:0 18px; }
    .sc-btn-ghost   { padding:0 18px; }
    .sc-btn:active { transform:scale(.96); }
    .sc-btn .ico-sm { width:14px; height:14px; stroke-width:1.8; flex-shrink:0; }
    .sc-loc { display:flex; align-items:center; gap:4px; }
    .sc-btn-primary {
      background:linear-gradient(135deg, #00c896, #00b386);
      color:#fff;
      box-shadow:0 2px 8px rgba(0,200,150,.18);
    }
    .sc-btn-ghost {
      background:rgba(255,255,255,.06);
      color:var(--t1,#fff);
      border:1px solid rgba(255,255,255,.12);
    }

    /* Stats row */
    .sc-stats {
      display:flex; margin:10px 20px 0; padding:0;
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.09);
      border-radius:14px; overflow:hidden;
    }
    .sc-stat {
      flex:1; text-align:center; padding:12px 2px;
      display:flex; flex-direction:column; align-items:center; gap:4px;
      position:relative;
    }
    .sc-stat + .sc-stat::before {
      content:''; position:absolute; right:0; top:50%; transform:translateY(-50%);
      width:1px; height:50%; background:rgba(255,255,255,.07);
    }
    .sc-stat-i { width:18px; height:18px; }
    .sc-stat-n { font-size:1rem; font-weight:800; color:var(--t1,#fff); line-height:1; }
    .sc-stat-l { font-size:.58rem; color:var(--t3,#6b7686); }

    /* Tabs */
    .sc-tabs { display:flex; gap:14px; padding:14px 20px 0; overflow-x:auto; border-bottom:1px solid rgba(255,255,255,.06); }
    .sc-tab {
      padding:10px 6px; cursor:pointer; white-space:nowrap;
      font-size:.8rem; font-weight:600; color:var(--t3,#6b7686); background:transparent;
      border:none; border-bottom:2px solid transparent; font-family:inherit;
      display:inline-flex; align-items:center; gap:5px; transition:color .2s, border-color .2s;
    }
    .sc-tab.active { color:var(--ac,#00c896); border-bottom-color:var(--ac,#00c896); }

    /* Tab content */
    .sc-content { padding:16px 20px 24px; min-height:80px; }
    .sc-pane { display:none; }
    .sc-pane.active { display:block; animation:fade .25s; }
    @keyframes fade { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

    .sc-skills { display:flex; flex-wrap:wrap; gap:8px; }
    .sc-skill { padding:7px 13px; border-radius:20px; background:rgba(0,200,150,.1);
      color:var(--ac,#00c896); font-size:.78rem; }

    .sc-item { padding:12px 0; border-bottom:1px solid rgba(255,255,255,.05); }
    .sc-item:last-child { border-bottom:none; }
    .sc-item-t { font-weight:700; font-size:.88rem; }
    .sc-item-s { color:var(--t3,#6b7686); font-size:.76rem; margin-top:3px; }
    .sc-item-d { color:var(--t4,#4a5568); font-size:.72rem; margin-top:2px; }

    .sc-empty { text-align:center; color:var(--t4,#4a5568); padding:24px 0; font-size:.82rem; }
    .sc-bio-text { color:var(--t2,#9aa5b4); font-size:8px; line-height:2; }

    /* About card */
    .sc-about-card {
      background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.08);
      border-radius:17px; padding:18px 20px;
    }
    .sc-about-title {
      display:flex; align-items:center; gap:7px;
      font-size:.82rem; font-weight:700; color:var(--t1,#fff);
      margin-bottom:12px;
    }
    .sc-about-title .ico-sm { color:var(--ac,#00c896); }

    .sc-loading { text-align:center; padding:80px 20px; color:var(--t3,#6b7686); }

    /* Toast */
    .sc-toast {
      position:fixed; bottom:24px; right:50%; transform:translateX(50%) translateY(20px);
      background:var(--bg2,#141a24); color:var(--t1,#fff); padding:12px 22px; border-radius:14px;
      border:1px solid rgba(255,255,255,.12); font-size:.84rem; font-weight:600;
      opacity:0; transition:.3s; z-index:100; box-shadow:0 10px 30px rgba(0,0,0,.4); pointer-events:none;
    }
    .sc-toast.show { opacity:1; transform:translateX(50%) translateY(0); }


    /* ── Profile link row ── */
    .sc-link-row { display:none; align-items:center; gap:5px; margin-top:6px; max-width:100%; overflow:hidden; }
    .sc-link-row .ico-sm { color:var(--t3,#6b7686); flex-shrink:0; }
    .sc-link-text { color:var(--t3,#6b7686); font-size:.6rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
    .sc-link-copy { flex-shrink:0; background:none; border:none; cursor:pointer; color:var(--t3,#6b7686); padding:2px; display:flex; align-items:center; border-radius:5px; transition:color .15s; }
    .sc-link-copy:hover { color:var(--ac,#00c896); }
    .sc-link-copy .ico-sm { width:13px; height:13px; }

    /* ── Preview Eye Button — owner only ── */
    .sc-eye-wrap { position:relative; display:none; }
    body.view-owner .sc-eye-wrap { display:flex; }
    .sc-eye-icon-on { display:none; }
    body.preview-public-user .sc-eye-icon-off,
    body.preview-guest       .sc-eye-icon-off { display:none; }
    body.preview-public-user .sc-eye-icon-on,
    body.preview-guest       .sc-eye-icon-on  { display:block; color:var(--ac,#00c896); }

    .sc-eye-menu {
      display:none; position:absolute; top:calc(100% + 8px); left:0; min-width:190px;
      background:rgba(10,14,24,.95); border:1px solid rgba(255,255,255,.13);
      border-radius:13px; padding:5px; z-index:200;
      backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
      box-shadow:0 10px 30px rgba(0,0,0,.45);
    }
    .sc-eye-menu.open { display:block; }
    .sc-eye-item {
      display:flex; align-items:center; gap:9px; width:100%;
      padding:9px 12px; border:none; background:none;
      color:var(--t1,#fff); font-family:inherit; font-size:12px; font-weight:600;
      border-radius:8px; cursor:pointer; text-align:right;
      transition:background .15s;
    }
    .sc-eye-item:hover { background:rgba(255,255,255,.07); }
    .sc-eye-item .ico-sm { color:var(--ac,#00c896); flex-shrink:0; }
    .sc-eye-item.sc-eye-end .ico-sm { color:#f87171; }
    .sc-eye-item.sc-eye-end { color:var(--t2,#9aa5b4); }
    .sc-eye-sep { height:1px; background:rgba(255,255,255,.08); margin:4px 8px; }


    /* ── Owner-only foundation — Doctrine §25 ──
       أي عنصر owner-only يختفي تلقائياً في preview mode.
       لا تأثير الآن (لا يوجد owner-only بعد) — جاهز للأدوات القادمة. */
    body.preview-public-user .owner-only,
    body.preview-guest       .owner-only { display: none !important; }


    /* ── Edit Profile Modal ── */
    .ep-overlay {
      display:none; position:fixed; inset:0; z-index:300;
      background:rgba(0,0,0,.65); backdrop-filter:blur(4px);
      align-items:flex-end; justify-content:center;
    }
    .ep-overlay.open { display:flex; }
    .ep-sheet {
      background:#0f1420; border-radius:22px 22px 0 0;
      border:1px solid rgba(255,255,255,.1); border-bottom:none;
      width:100%; max-width:560px; max-height:92vh;
      display:flex; flex-direction:column; overflow:hidden;
      animation:slideUp .25s ease;
    }
    @keyframes slideUp { from{transform:translateY(40px);opacity:0;} to{transform:translateY(0);opacity:1;} }
    .ep-head {
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 20px 12px; border-bottom:1px solid rgba(255,255,255,.08);
      flex-shrink:0;
    }
    .ep-title { font-size:.95rem; font-weight:700; }
    .ep-close {
      width:30px; height:30px; border-radius:50%; border:none; cursor:pointer;
      background:rgba(255,255,255,.08); color:var(--t1,#fff);
      display:flex; align-items:center; justify-content:center;
    }
    .ep-body { flex:1; overflow-y:auto; padding:18px 20px 24px; }
    .ep-field { margin-bottom:16px; }
    .ep-label { display:block; font-size:.76rem; font-weight:600; color:var(--t3,#6b7686); margin-bottom:6px; }
    .ep-input, .ep-select, .ep-textarea {
      width:100%; background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1); border-radius:10px;
      color:var(--t1,#fff); font-family:inherit; font-size:.84rem; padding:10px 13px;
      outline:none; transition:border-color .15s;
    }
    .ep-input:focus, .ep-select:focus, .ep-textarea:focus { border-color:var(--ac,#00c896); }
    .ep-select option { background:#0f1420; }
    .ep-textarea { resize:vertical; min-height:80px; line-height:1.7; }
    .ep-row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .ep-footer {
      display:flex; gap:10px; padding:14px 20px;
      border-top:1px solid rgba(255,255,255,.08); flex-shrink:0;
    }
    .ep-save {
      flex:1; height:42px; border-radius:11px; border:none; cursor:pointer;
      background:linear-gradient(135deg,#00c896,#00b386);
      color:#fff; font-family:inherit; font-size:.9rem; font-weight:700;
      transition:opacity .15s;
    }
    .ep-save:disabled { opacity:.5; cursor:not-allowed; }
    .ep-cancel {
      height:42px; padding:0 22px; border-radius:11px; border:1px solid rgba(255,255,255,.12);
      background:none; color:var(--t2,#9aa5b4); cursor:pointer;
      font-family:inherit; font-size:.9rem; font-weight:600;
    }
    .ep-err { color:#f87171; font-size:.78rem; margin-top:4px; display:none; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="sc-header">
    <button class="sc-home-pill" id="scHomeBtn"><i data-lucide="home" class="ico-sm"></i> الرئيسية</button>
    <div class="sc-logo">
      <img src="https://wrxvmdmknhoufoeprpoc.supabase.co/storage/v1/object/public/site/33333.svg"
           alt="تواصلنا"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span class="sc-logo-fallback" style="display:none">تواصلنا</span>
    </div>
    <div class="sc-head-icons">

      <!-- Eye preview button — owner only (hidden via CSS until body.view-owner) -->
      <div class="sc-eye-wrap" id="scEyeWrap">
        <button class="sc-hicon sc-hicon-bare" id="scEyeBtn" title="معاينة البروفايل">
          <i data-lucide="eye-off" class="ico sc-eye-icon-off"></i>
          <i data-lucide="eye"     class="ico sc-eye-icon-on"></i>
        </button>
        <div class="sc-eye-menu" id="scEyeMenu">

          <button class="sc-eye-item" id="scPreviewPublic">
            <i data-lucide="user-round" class="ico-sm"></i>
            معاينة كمستخدم مسجل
          </button>
          <button class="sc-eye-item" id="scPreviewGuest">
            <i data-lucide="user-x" class="ico-sm"></i>
            معاينة كزائر
          </button>
          <div class="sc-eye-sep"></div>
          <button class="sc-eye-item sc-eye-end" id="scPreviewEnd">
            <i data-lucide="x-circle" class="ico-sm"></i>
            إنهاء المعاينة
          </button>
        </div>
      </div>

      <!-- Edit button — owner only -->
      <button class="sc-hicon sc-hicon-bare owner-only" id="scEditBtn" title="تعديل الملف الشخصي" style="display:none">
        <i data-lucide="pencil" class="ico"></i>
      </button>
      <button class="sc-hicon sc-hicon-bare" id="scBellBtn" title="الإشعارات"><i data-lucide="bell" class="ico"></i></button>
      <button class="sc-hicon sc-hicon-bare" id="scMsgBtn" title="الرسائل"><i data-lucide="message-circle-more" class="ico"></i></button>
      <button class="sc-hicon sc-hicon-bare" id="scMenuBtn" title="القائمة"><i data-lucide="menu" class="ico"></i></button>
    </div>
  </div>

  <div class="sc-wrap">
    <div id="scLoading" class="sc-loading">جاري التحميل…</div>

    <div id="scContent" style="display:none">
      <div class="sc-main-card">
        <!-- Cover -->
        <div class="sc-cover" id="scCover"></div>

        <!-- Profile row: avatar+QR (right) | info (left) -->
        <div class="sc-prof-row">
          <div class="sc-ava-col">
            <div class="sc-avatar-wrap" id="scAvatarWrap">
              <div class="sc-avatar" id="scAvatar"><i data-lucide="user" class="ico-lg"></i></div>
            </div>
            <div class="sc-qr" id="scQr"></div>
          </div>
          <div class="sc-info">
            <div class="sc-name-row">
              <span class="sc-verified" id="scVerified" style="display:none"><i data-lucide="badge-check" class="ico-sm"></i></span>
              <span class="sc-name" id="scName">—</span>
            </div>
            <div class="sc-title" id="scTitle"></div>
            <div class="sc-bio" id="scBio"></div>
            <button class="sc-bio-more" id="scBioMore" style="display:none" onclick="toggleBio()">عرض المزيد ▾</button>
            <div class="sc-meta-row">
              <span class="sc-loc" id="scLoc"></span>
              <span class="sc-age" id="scAge" style="display:none"></span>
            </div>
            <div class="sc-link-row" id="scLinkRow">
              <i data-lucide="link" class="ico-sm"></i>
              <span class="sc-link-text" id="scLinkText"></span>

              <button class="sc-link-copy" id="scLinkCopy" title="نسخ الرابط">

        <!-- Actions -->
        <div class="sc-actions">

          <button class="sc-btn sc-btn-ghost" id="scContactBtn"><i data-lucide="message-circle" class="ico-sm"></i> تواصل معي</button>
          <button class="sc-btn sc-btn-ghost" id="scFullBtn"><i data-lucide="file-text" class="ico-sm"></i> الملف</button>
        </div>

        <!-- Stats: 5 cells RTL order: الشهادات ← القوة ← المشاهدات ← المتابعون ← الخبرات -->
        <div class="sc-stats">
          <div class="sc-stat">
            <i data-lucide="graduation-cap" class="ico sc-stat-i" style="color:#f59e0b"></i>
            <div class="sc-stat-n" id="scStatEdu">—</div>
            <div class="sc-stat-l">الشهادات</div>
          </div>
          <div class="sc-stat">
            <i data-lucide="trending-up" class="ico sc-stat-i" style="color:#00c896"></i>
            <div class="sc-stat-n" id="scStatScore">—</div>
            <div class="sc-stat-l">القوة</div>
          </div>
          <div class="sc-stat">
            <i data-lucide="eye" class="ico sc-stat-i" style="color:#2563ff"></i>
            <div class="sc-stat-n" id="scStatViews">—</div>
            <div class="sc-stat-l">المشاهدات</div>
          </div>
          <div class="sc-stat">
            <i data-lucide="users" class="ico sc-stat-i" style="color:#8b5cf6"></i>
            <div class="sc-stat-n" id="scStatFollowers">—</div>
            <div class="sc-stat-l">المتابعون</div>
          </div>
          <div class="sc-stat">
            <i data-lucide="briefcase" class="ico sc-stat-i" style="color:#f97316"></i>
            <div class="sc-stat-n" id="scStatExp">—</div>
            <div class="sc-stat-l">الخبرات</div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="sc-tabs">
          <button class="sc-tab active" data-tab="about" onclick="scTab('about',this)"><i data-lucide="user-round" class="ico-sm"></i> نبذة عني</button>
          <button class="sc-tab" data-tab="skills" onclick="scTab('skills',this)"><i data-lucide="zap" class="ico-sm"></i> المهارات</button>
          <button class="sc-tab" data-tab="exp" onclick="scTab('exp',this)"><i data-lucide="briefcase" class="ico-sm"></i> الخبرات</button>
          <button class="sc-tab" data-tab="edu" onclick="scTab('edu',this)"><i data-lucide="graduation-cap" class="ico-sm"></i> الشهادات</button>
        </div>

        <!-- Tab content -->
        <div class="sc-content">
          <div class="sc-pane active" id="pane-about">
            <div class="sc-about-card">
              <div class="sc-about-title"><i data-lucide="user-round" class="ico-sm"></i> نبذة عني</div>
              <div class="sc-bio-text" id="scAboutText"></div>
            </div>
          </div>
          <div class="sc-pane" id="pane-skills"><div class="sc-skills" id="scSkillsPane"></div></div>
          <div class="sc-pane" id="pane-exp"><div id="scExpPane"></div></div>
          <div class="sc-pane" id="pane-edu"><div id="scEduPane"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="sc-toast" id="scToast"></div>

  <script src="/tw_shared.js"></script>
  <script>
  // Script-level: accessible by all IIFEs below
  var _jwt = localStorage.getItem('tw_jwt') || '';
  var _fetchOpts = _jwt ? { headers: { 'Authorization': 'Bearer ' + _jwt } } : {};
  var _scProfileId = new URLSearchParams(location.search).get('id');

  (function() {
    function esc(s){ var d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML; }
    function setText(id,v){ var el=document.getElementById(id); if(el) el.textContent=v==null?'':v; }
    function renderIcons(){
      if(window.lucide && lucide.createIcons){ lucide.createIcons(); return true; }
      return false;
    }
    function toast(msg){
      var t=document.getElementById('scToast'); if(!t) return;
      t.textContent=msg; t.classList.add('show');
      setTimeout(function(){ t.classList.remove('show'); },2200);
    }
    window.toast = toast;

    // Auto-fit name to one line by measuring real rendered width.
    // Scales font-size between MIN and MAX; badge follows via em units.
    function fitName(){
      var nameEl=document.getElementById('scName');
      var row=document.querySelector('.sc-name-row');
      if(!nameEl || !row) return;
      var MAX=24, MIN=16;
      // Measure against the name-row's own container width (the box the name lives in)
      var boxW=row.clientWidth;
      if(boxW<=0) return;
      var badge=document.getElementById('scVerified');
      var badgeVisible = badge && badge.style.display!=='none';

      nameEl.style.textOverflow='clip';
      var size=MAX;
      nameEl.style.fontSize=size+'px';
      // Reserve space for badge + gap when visible (badge is .85em + .3em gap)
      function reserve(){ return badgeVisible ? (size*0.85 + size*0.3 + 4) : 0; }
      // Shrink font until the name's natural width fits its container box
      while(size>MIN && nameEl.scrollWidth > (boxW - reserve())){
        size-=1; nameEl.style.fontSize=size+'px';
      }
      nameEl.style.textOverflow='ellipsis';
    }
    window._fitName=fitName;

    // Tab switching (local, no fetch — data already loaded)
    window.scTab = function(name, el){
      var tabs=document.querySelectorAll('.sc-tab');
      for(var i=0;i<tabs.length;i++) tabs[i].classList.remove('active');
      if(el) el.classList.add('active');
      var panes=document.querySelectorAll('.sc-pane');
      for(var j=0;j<panes.length;j++) panes[j].classList.remove('active');
      var pane=document.getElementById('pane-'+name);
      if(pane) pane.classList.add('active');
      if(window.lucide && lucide.createIcons) lucide.createIcons();
    };
    window._renderIcons = function(){ if(window.lucide && lucide.createIcons) lucide.createIcons(); };

    var id = _scProfileId;
    window.addEventListener('resize', function(){ if(window._fitName) _fitName(); });

    // Header buttons
    var homeBtn=document.getElementById('scHomeBtn');
    if(homeBtn) homeBtn.onclick=function(){ window.location.href='/home'; };
    var bellBtn=document.getElementById('scBellBtn');
    if(bellBtn) bellBtn.onclick=function(){ window.location.href='/notifications'; };
    var msgBtn=document.getElementById('scMsgBtn');
    if(msgBtn) msgBtn.onclick=function(){ window.location.href='/messages'; };
    var menuBtn=document.getElementById('scMenuBtn');
    if(menuBtn) menuBtn.onclick=function(){ history.back(); };

    if(!id){
      var ld=document.getElementById('scLoading');
      if(ld) ld.textContent='لا يوجد معرّف ملف';
      return;
    }


    // Shared re-render function — called on load and after Edit save (Doctrine §26)
    window.renderProfile = function renderProfile(res){
        var p = (res && res.profile) ? res.profile : {};

        // Viewer state — set body class from server-verified JWT (Architecture Doctrine §22, §23)
        var _vt = res.viewer_type || 'guest';
        document.body.classList.remove('view-owner', 'public-view', 'view-guest');
        if      (_vt === 'owner')       document.body.classList.add('view-owner');
        else if (_vt === 'public-user') document.body.classList.add('public-view');
        else                            document.body.classList.add('view-guest');


        // Show edit button for owner
        var editBtn = document.getElementById('scEditBtn');
        if(editBtn) editBtn.style.display = (_vt === 'owner') ? 'flex' : 'none';

        // Identity
        setText('scName', p.full_name || '—');
        setText('scBio', p.bio || '');

        // Title + profession icon — fallback = briefcase (Doctrine §27)
        var titleEl = document.getElementById('scTitle');
        if(titleEl){
          var profIcon = (p.profession && p.profession.icon) ? p.profession.icon : 'briefcase';
          var titleText = (p.profession && p.profession.name_ar)
            ? p.profession.name_ar
            : (p.headline || p.title || '');
          if(titleText){
            titleEl.innerHTML = '<i data-lucide="' + profIcon + '" class="ico-sm"></i> ' + esc(titleText);
          } else {
            titleEl.textContent = '';
          }
        }

        // Profile link row — canonical /profile URL (Doctrine §28)
        var _profileUrl = location.origin + '/profile?id=' + encodeURIComponent(p.tw_id || id);
        var linkRow  = document.getElementById('scLinkRow');
        var linkText = document.getElementById('scLinkText');
        var linkCopy = document.getElementById('scLinkCopy');
        if(linkRow && linkText && linkCopy){
          linkText.textContent = _profileUrl;
          linkRow.style.display = 'flex';
          linkCopy.onclick = function(){
            if(navigator.clipboard && navigator.clipboard.writeText){
              navigator.clipboard.writeText(_profileUrl)
                .then(function(){ toast('تم نسخ رابط البروفايل'); })
                .catch(function(){ toast('تعذّر نسخ الرابط'); });
            } else { toast('تعذّر نسخ الرابط'); }
          };
        }

        // Store profile data for Edit Modal pre-population
        window._scProfile = p;

        // Verified badge (only if verified)
        if(p.is_verified){
          var vEl=document.getElementById('scVerified');
          if(vEl) vEl.style.display='inline-flex';
        }

        // Location (with map-pin icon)
        var locEl=document.getElementById('scLoc');
        if(locEl && p.location){
          locEl.innerHTML = '<i data-lucide="map-pin" class="ico-sm"></i> ' + esc(p.location);
          locEl.style.display='inline-flex';
          locEl.style.alignItems='center';
          locEl.style.gap='4px';
        }

        // Age (computed from dob; hide if absent)
        if(p.dob){
          var birth=new Date(p.dob);
          if(!isNaN(birth.getTime())){
            var diff=Date.now()-birth.getTime();
            var age=Math.floor(diff/(365.25*24*3600*1000));
            if(age>0 && age<150){
              var ageEl=document.getElementById('scAge');
              if(ageEl){
                ageEl.innerHTML='<i data-lucide="cake" class="ico-sm"></i> ' + age + ' سنة';
                ageEl.style.display='flex';
              }
            }
          }
        }

        // Avatar image
        var av=document.getElementById('scAvatar');
        if(av && p.avatar_url){
          var img=new Image();
          img.alt='';
          img.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:50%';
          img.onload=function(){ av.innerHTML=''; av.appendChild(img); };
          img.src=esc(p.avatar_url);
        }


        // Profile link row — canonical URL uses /profile (not /profile-showcase)
        var _profileUrl = location.origin + '/profile?id=' + encodeURIComponent(p.tw_id || id);
        var linkRow  = document.getElementById('scLinkRow');
        var linkText = document.getElementById('scLinkText');
        var linkCopy = document.getElementById('scLinkCopy');
        if(linkRow && linkText && linkCopy){
          linkText.textContent = _profileUrl;
          linkRow.style.display = 'flex';
          linkCopy.addEventListener('click', function(){
            if(navigator.clipboard && navigator.clipboard.writeText){
              navigator.clipboard.writeText(_profileUrl)
                .then(function(){ toast('تم نسخ رابط البروفايل'); })
                .catch(function(){ toast('تعذّر نسخ الرابط'); });

            } else {
              toast('تعذّر نسخ الرابط');
            }
          });
        }

        // QR (uses public QR service pointing to this showcase URL — no backend)
        var qr=document.getElementById('scQr');
        if(qr){
          var showcaseUrl = location.origin + '/profile-showcase?id=' + encodeURIComponent(id);
          qr.innerHTML = '<div class="sc-qr-inner">'
            + '<img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&qzone=1&data='
            + encodeURIComponent(showcaseUrl) + '" alt="QR">'
            + '<div class="sc-qr-center"><img src="https://wrxvmdmknhoufoeprpoc.supabase.co/storage/v1/object/public/site/55555.svg" alt=""></div>'
            + '</div>';
        }

        // Data arrays
        var skills = Array.isArray(p.skills) ? p.skills : [];
        var exp    = Array.isArray(p.experience) ? p.experience : [];
        var edu    = Array.isArray(p.education) ? p.education : [];

        // Stats
        setText('scStatEdu', edu.length);
        setText('scStatExp', exp.length);
        // scStatViews and scStatFollowers stay — (no API)

        // Bio header: show "عرض المزيد" if text overflows 3 lines
        requestAnimationFrame(function(){
          var bioEl=document.getElementById('scBio');
          var moreBtn=document.getElementById('scBioMore');
          if(bioEl && moreBtn && bioEl.scrollHeight > bioEl.clientHeight + 2){
            moreBtn.style.display='inline-block';
          }
        });

        // Tab: About
        var aboutEl=document.getElementById('scAboutText');
        if(aboutEl) aboutEl.textContent = p.bio || 'لا توجد نبذة بعد';

        // Tab: Skills
        var skEl=document.getElementById('scSkillsPane');
        if(skEl){
          skEl.innerHTML = skills.length
            ? skills.map(function(s){
                var label=(s&&typeof s==='object')?(s.skill||''):s;
                return '<span class="sc-skill">'+esc(label)+'</span>';
              }).join('')
            : '<div class="sc-empty">لا توجد مهارات بعد</div>';
        }

        // Tab: Experience
        var expEl=document.getElementById('scExpPane');
        if(expEl){
          expEl.innerHTML = exp.length
            ? exp.map(function(e){
                var t=esc(e.title||''); var c=esc(e.company||'');
                var loc=e.location?(' · '+esc(e.location)):'';
                return '<div class="sc-item"><div class="sc-item-t">'+t+'</div>'+
                  (c?'<div class="sc-item-s">'+c+loc+'</div>':'')+'</div>';
              }).join('')
            : '<div class="sc-empty">لا توجد خبرات بعد</div>';
        }

        // Tab: Education
        var eduEl=document.getElementById('scEduPane');
        if(eduEl){
          eduEl.innerHTML = edu.length
            ? edu.map(function(d){
                var inst=esc(d.institution||''); var deg=esc(d.degree||'');
                var fld=d.field?(' · '+esc(d.field)):'';
                return '<div class="sc-item"><div class="sc-item-t">'+inst+'</div>'+
                  ((deg||fld)?'<div class="sc-item-s">'+deg+fld+'</div>':'')+'</div>';
              }).join('')
            : '<div class="sc-empty">لا توجد شهادات بعد</div>';
        }

        // Full profile button → Details (profile.html accepts tw_id)
        var fullBtn=document.getElementById('scFullBtn');
        if(fullBtn) fullBtn.onclick=function(){ window.location.href='/profile.html?id='+encodeURIComponent(id); };

        // Action buttons
        var followBtn=document.getElementById('scFollowBtn');
        if(followBtn) followBtn.onclick=function(){ toast('ميزة المتابعة قريباً'); };
        var contactBtn=document.getElementById('scContactBtn');
        if(contactBtn) contactBtn.onclick=function(){ window.location.href='/messages'; };
        var fullBtn=document.getElementById('scFullBtn');
        if(fullBtn) fullBtn.onclick=function(){ window.location.href='/profile?id='+encodeURIComponent(id); };

        // Reveal
        var ld=document.getElementById('scLoading');
        var ct=document.getElementById('scContent');
        if(ld) ld.style.display='none';
        if(ct) ct.style.display='block';

        // Render all Lucide icons (retry if CDN still loading)
        if(!renderIcons()){
          var tries=0, iv=setInterval(function(){
            if(renderIcons() || ++tries>20) clearInterval(iv);
          },150);
        }

        // Auto-fit name to one line (after layout settled)
        requestAnimationFrame(function(){ fitName(); setTimeout(fitName,50); });

        // Score: independent parallel fetch — NUMERIC p.id (not tw_id), failure isolated
        var numId = (p.id != null) ? p.id : id;
        fetch('/profile/' + encodeURIComponent(numId) + '/score')
          .then(function(r){ return r.ok ? r.json() : null; })
          .then(function(sc){ if(sc && typeof sc.score!=='undefined') setText('scStatScore', sc.score); })
          .catch(function(){ /* score stays — */ });
    } // end renderProfile

    // Initial load — sends JWT for server-side viewer_type (Doctrine §22)
    fetch('/profile/' + encodeURIComponent(id), _fetchOpts)
      .then(function(r){ if(!r.ok) throw new Error('profile '+r.status); return r.json(); })
      .then(window.renderProfile)
      .catch(function(){
        var ld=document.getElementById('scLoading');
        if(ld) ld.textContent='تعذّر تحميل الملف';
      });
  })();

  window.toggleBio = function(){
    var bio=document.getElementById('scBio');
    var btn=document.getElementById('scBioMore');
    if(!bio || !btn) return;
    var expanded = bio.classList.toggle('expanded');
    btn.textContent = expanded ? 'عرض أقل ▴' : 'عرض المزيد ▾';
  };


  // ── Preview Eye Button (Doctrine §24) ──
  (function(){
    var eyeWrap = document.getElementById('scEyeWrap');
    var eyeBtn  = document.getElementById('scEyeBtn');
    var eyeMenu = document.getElementById('scEyeMenu');
    if(!eyeBtn || !eyeMenu) return;

    // Toggle dropdown
    eyeBtn.addEventListener('click', function(e){
      e.stopPropagation();
      eyeMenu.classList.toggle('open');
    });

    // Preview as logged-in user
    document.getElementById('scPreviewPublic').addEventListener('click', function(){
      document.body.classList.remove('preview-guest');
      document.body.classList.add('preview-public-user');
      eyeMenu.classList.remove('open');
    });


    // Preview as guest
    document.getElementById('scPreviewGuest').addEventListener('click', function(){
      document.body.classList.remove('preview-public-user');
      document.body.classList.add('preview-guest');
      eyeMenu.classList.remove('open');
    });


    // End preview
    document.getElementById('scPreviewEnd').addEventListener('click', function(){
      document.body.classList.remove('preview-public-user', 'preview-guest');
      eyeMenu.classList.remove('open');
    });


    // Close on outside click
    document.addEventListener('click', function(e){
      if(eyeWrap && !eyeWrap.contains(e.target)) eyeMenu.classList.remove('open');
    });
  })();


  // ── Edit Profile Modal (Doctrine §28) ──
  (function(){
    var EP_CITIES = {
      JO:['عمان','إربد','الزرقاء','العقبة','السلط','مادبا','الكرك','معان','جرش','عجلون','الطفيلة'],
      SA:['الرياض','جدة','مكة المكرمة','المدينة المنورة','الدمام','الخبر','الطائف','أبها','تبوك','القطيف','بريدة'],
      AE:['دبي','أبوظبي','الشارقة','عجمان','رأس الخيمة','الفجيرة','أم القيوين','العين'],
      KW:['مدينة الكويت','حولي','الفروانية','الأحمدي','الجهراء','مبارك الكبير'],
      QA:['الدوحة','الريان','الوكرة','أم صلال','الخور','الشمال'],
      BH:['المنامة','المحرق','الرفاع','مدينة عيسى','مدينة حمد'],
      OM:['مسقط','صلالة','نزوى','صحار','السيب','مطرح','البريمي'],
      EG:['القاهرة','الإسكندرية','الجيزة','شرم الشيخ','الأقصر','أسوان','طنطا','المنصورة','الفيوم','بورسعيد'],
      IQ:['بغداد','البصرة','الموصل','أربيل','كربلاء','النجف','السليمانية','كركوك'],
      SY:['دمشق','حلب','حمص','اللاذقية','حماة','دير الزور','الرقة','درعا'],
      LB:['بيروت','طرابلس','صيدا','صور','جونية','زحلة'],
      PS:['رام الله','القدس','غزة','نابلس','الخليل','جنين','أريحا','بيت لحم'],
      YE:['صنعاء','عدن','تعز','الحديدة','إب','ذمار','مأرب'],
      LY:['طرابلس','بنغازي','مصراتة','الزاوية','البيضاء','سبها'],
      TN:['تونس','صفاقس','سوسة','بنزرت','قابس','القيروان'],
      DZ:['الجزائر','وهران','قسنطينة','عنابة','سطيف','تلمسان'],
      MA:['الرباط','الدار البيضاء','فاس','مراكش','مكناس','أكادير','طنجة'],
      SD:['الخرطوم','أم درمان','بورتسودان','كسلا','الأبيض'],
    };

    var overlay   = document.getElementById('epOverlay');
    var closeBtn  = document.getElementById('epClose');
    var cancelBtn = document.getElementById('epCancelBtn');
    var saveBtn   = document.getElementById('epSaveBtn');
    var editBtn   = document.getElementById('scEditBtn');
    var errEl     = document.getElementById('epErr');

    if(!overlay || !editBtn) return;

    // Cities helper
    window.epLoadCities = function(){
      var country = document.getElementById('epCountry').value;
      var cityEl  = document.getElementById('epCity');
      if(!cityEl) return;
      var cities = EP_CITIES[country] || [];
      cityEl.innerHTML = cities.length
        ? '<option value="">— اختر المدينة —</option>' + cities.map(function(c){ return '<option value="'+c+'">'+c+'</option>'; }).join('')
        : '<option value="">لا توجد مدن متاحة</option>';
    };

    function openModal(){
      var p = window._scProfile || {};

      // Set DOB max = today
      var dobEl = document.getElementById('epDob');
      if(dobEl) dobEl.max = new Date().toISOString().split('T')[0];

      // Pre-populate fields
      var bioEl = document.getElementById('epBio');
      if(bioEl) bioEl.value = p.bio || '';

      var countryEl = document.getElementById('epCountry');
      if(countryEl){ countryEl.value = p.country || ''; epLoadCities(); }

      var cityEl = document.getElementById('epCity');
      if(cityEl) cityEl.value = p.city || '';

      var availEl = document.getElementById('epAvail');
      if(availEl) availEl.value = p.avail || '';

      if(dobEl) dobEl.value = p.dob ? p.dob.split('T')[0] : '';

      var headlineEl = document.getElementById('epHeadline');
      if(headlineEl) headlineEl.value = p.headline || p.title || '';

      // Fetch professions from API (Doctrine §28 — no hardcoded list)
      var profEl = document.getElementById('epProfession');
      if(profEl){
        profEl.innerHTML = '<option value="">جاري التحميل…</option>';
        fetch('/professions')
          .then(function(r){ return r.ok ? r.json() : []; })
          .then(function(list){
            // Group by category_group
            var groups = {};
            list.forEach(function(pr){
              var g = pr.category_group || 'أخرى';
              if(!groups[g]) groups[g] = [];
              groups[g].push(pr);
            });
            var html = '<option value="">— اختر التخصص —</option>';
            Object.keys(groups).forEach(function(g){
              html += '<optgroup label="'+g+'">';
              groups[g].forEach(function(pr){
                var sel = (p.profession && p.profession.id === pr.id) ? ' selected' : '';
                html += '<option value="'+pr.id+'"'+sel+'>'+pr.name_ar+'</option>';
              });
              html += '</optgroup>';
            });
            profEl.innerHTML = html;
          })
          .catch(function(){ profEl.innerHTML = '<option value="">تعذّر تحميل التخصصات</option>'; });
      }

      if(errEl) errEl.style.display = 'none';
      overlay.classList.add('open');
      if(window.lucide && lucide.createIcons) lucide.createIcons();
    }

    function closeModal(){
      overlay.classList.remove('open');
    }

    editBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', function(e){ if(e.target === overlay) closeModal(); });

    saveBtn.addEventListener('click', function(){
      var _u = JSON.parse(localStorage.getItem('tawasalna_user') || 'null');
      if(!_u || !_u.id){ toast('يرجى تسجيل الدخول أولاً'); return; }

      var payload = {};
      var profVal = document.getElementById('epProfession').value;
      if(profVal) payload.profession_id = parseInt(profVal, 10);

      var bioVal = document.getElementById('epBio').value.trim();
      if(bioVal !== undefined) payload.bio = bioVal;

      var countryVal = document.getElementById('epCountry').value;
      if(countryVal) payload.country = countryVal;

      var cityVal = document.getElementById('epCity').value;
      if(cityVal) payload.city = cityVal;

      var availVal = document.getElementById('epAvail').value;
      if(availVal) payload.avail = availVal;

      var dobVal = document.getElementById('epDob').value;
      if(dobVal) payload.dob = dobVal;

      var headlineVal = document.getElementById('epHeadline').value.trim();
      if(headlineVal) payload.headline = headlineVal;

      if(errEl) errEl.style.display = 'none';
      saveBtn.disabled = true;
      saveBtn.textContent = 'جاري الحفظ…';

      fetch('/profile/' + _u.id, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + (_jwt || '')
        },
        body: JSON.stringify(payload)
      })
      .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, data:d}; }); })
      .then(function(res){
        if(!res.ok){
          var msg = (res.data && res.data.detail) ? res.data.detail : 'حدث خطأ أثناء الحفظ';
          if(errEl){ errEl.textContent = msg; errEl.style.display = 'block'; }
          return;
        }
        closeModal();
        toast('تم حفظ التغييرات بنجاح');
        // Re-fetch full profile to get updated profession object (Doctrine §26)
        return fetch('/profile/' + encodeURIComponent(_scProfileId), _fetchOpts)
          .then(function(r){ return r.ok ? r.json() : null; })
          .then(function(freshRes){
            if(freshRes) window.renderProfile(freshRes);
            if(window.lucide && lucide.createIcons) lucide.createIcons();
          });
      })
      .catch(function(){ if(errEl){ errEl.textContent = 'خطأ في الاتصال بالخادم'; errEl.style.display='block'; } })
      .finally(function(){ saveBtn.disabled=false; saveBtn.textContent='حفظ التغييرات'; });
    });
  })();
  </script>

  <!-- Edit Profile Modal -->
  <div class="ep-overlay" id="epOverlay">
    <div class="ep-sheet">
      <div class="ep-head">
        <span class="ep-title"><i data-lucide="pencil" class="ico-sm" style="color:var(--ac,#00c896);vertical-align:middle;margin-left:6px"></i> تعديل الملف الشخصي</span>
        <button class="ep-close" id="epClose"><i data-lucide="x" class="ico-sm"></i></button>
      </div>
      <div class="ep-body">
        <!-- Profession -->
        <div class="ep-field">
          <label class="ep-label">التخصص المهني</label>
          <select class="ep-select" id="epProfession">
            <option value="">جاري التحميل…</option>
          </select>
        </div>
        <!-- Bio -->
        <div class="ep-field">
          <label class="ep-label">نبذة تعريفية</label>
          <textarea class="ep-textarea" id="epBio" placeholder="اكتب نبذة عن نفسك…" maxlength="600"></textarea>
        </div>
        <!-- Country + City -->
        <div class="ep-row2">
          <div class="ep-field">
            <label class="ep-label">البلد</label>
            <select class="ep-select" id="epCountry" onchange="epLoadCities()">
              <option value="">— اختر البلد —</option>
              <option value="JO">🇯🇴 الأردن</option>
              <option value="SA">🇸🇦 السعودية</option>
              <option value="AE">🇦🇪 الإمارات</option>
              <option value="KW">🇰🇼 الكويت</option>
              <option value="QA">🇶🇦 قطر</option>
              <option value="BH">🇧🇭 البحرين</option>
              <option value="OM">🇴🇲 عُمان</option>
              <option value="EG">🇪🇬 مصر</option>
              <option value="IQ">🇮🇶 العراق</option>
              <option value="SY">🇸🇾 سوريا</option>
              <option value="LB">🇱🇧 لبنان</option>
              <option value="PS">🇵🇸 فلسطين</option>
              <option value="YE">🇾🇪 اليمن</option>
              <option value="MA">🇲🇦 المغرب</option>
              <option value="DZ">🇩🇿 الجزائر</option>
              <option value="TN">🇹🇳 تونس</option>
              <option value="LY">🇱🇾 ليبيا</option>
              <option value="SD">🇸🇩 السودان</option>
              <option value="OTHER">🌍 دولة أخرى</option>
            </select>
          </div>
          <div class="ep-field">
            <label class="ep-label">المدينة</label>
            <select class="ep-select" id="epCity">
              <option value="">— اختر البلد أولاً —</option>
            </select>
          </div>
        </div>
        <!-- Availability + DOB -->
        <div class="ep-row2">
          <div class="ep-field">
            <label class="ep-label">حالة التوظيف</label>
            <select class="ep-select" id="epAvail">
              <option value="">— اختر —</option>
              <option value="متاح">متاح للعمل</option>
              <option value="مشغول">مشغول حالياً</option>
              <option value="يفكر">يفكر في الانتقال</option>
              <option value="عمل حر">عمل حر</option>
            </select>
          </div>
          <div class="ep-field">
            <label class="ep-label">تاريخ الميلاد</label>
            <input type="date" class="ep-input" id="epDob" max="">
          </div>
        </div>
        <!-- Headline (fallback, optional) -->
        <div class="ep-field">
          <label class="ep-label">العنوان الوظيفي (نصي — احتياطي)</label>
          <input type="text" class="ep-input" id="epHeadline" placeholder="مثال: مطور Full Stack" maxlength="120">
        </div>
        <div class="ep-err" id="epErr"></div>
      </div>
      <div class="ep-footer">
        <button class="ep-cancel" id="epCancelBtn">إلغاء</button>
        <button class="ep-save" id="epSaveBtn">حفظ التغييرات</button>
      </div>
    </div>
  </div>

</body>
</html>
