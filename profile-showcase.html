<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تواصلنا — البطاقة التعريفية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/tw_shared.css">
  <link rel="stylesheet" href="/static/profile-v2.css">
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
</head>
<body>
  <!-- Header -->
  <div class="sc-header">
    <button class="sc-home-pill" id="scHomeBtn"><i data-lucide="home" class="ico-sm"></i> الرئيسية</button>
    <div class="sc-logo">
      <img src="https://wrxvmdmknhoufoeprpoc.supabase.co/storage/v1/object/public/site/33333.svg"
           alt="تواصلنا"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span class="sc-logo-fallback" style="display:none">تواصلنا</span>
    </div>
    <div class="sc-head-icons">

      <!-- Eye preview button — owner only (hidden via CSS until body.view-owner) -->
      <div class="sc-eye-wrap" id="scEyeWrap">
        <button class="sc-hicon sc-hicon-bare" id="scEyeBtn" title="معاينة البروفايل">
          <i data-lucide="eye-off" class="ico sc-eye-icon-off"></i>
          <i data-lucide="eye"     class="ico sc-eye-icon-on"></i>
        </button>
        <div class="sc-eye-menu" id="scEyeMenu">

          <button class="sc-eye-item" id="scPreviewPublic">
            <i data-lucide="user-round" class="ico-sm"></i>
            معاينة كمستخدم مسجل
          </button>
          <button class="sc-eye-item" id="scPreviewGuest">
            <i data-lucide="user-x" class="ico-sm"></i>
            معاينة كزائر
          </button>
          <div class="sc-eye-sep"></div>
          <button class="sc-eye-item sc-eye-end" id="scPreviewEnd">
            <i data-lucide="x-circle" class="ico-sm"></i>
            إنهاء المعاينة
          </button>
        </div>
      </div>

      <!-- Edit button — owner only, shown by renderProfile when viewer_type=owner -->
      <button class="sc-hicon sc-hicon-bare owner-only" id="scEditProfileBtn" title="تعديل الملف الشخصي" style="display:none">
        <i data-lucide="pencil" class="ico"></i>
      </button>
      <button class="sc-hicon sc-hicon-bare" id="scBellBtn" title="الإشعارات"><i data-lucide="bell" class="ico"></i></button>
      <button class="sc-hicon sc-hicon-bare" id="scMsgBtn" title="الرسائل"><i data-lucide="message-circle-more" class="ico"></i></button>
      <button class="sc-hicon sc-hicon-bare" id="scMenuBtn" title="القائمة"><i data-lucide="menu" class="ico"></i></button>
    </div>
  </div>

  <div class="sc-wrap">
    <div id="scLoading" class="sc-loading">جاري التحميل…</div>

    <div id="scContent" style="display:none">
      <div class="sc-main-card">
        <!-- Cover -->
        <div class="sc-cover" id="scCover"></div>

        <!-- Profile row: avatar+QR (right) | info (left) -->
        <div class="sc-prof-row">
          <div class="sc-ava-col">
            <div class="sc-avatar-wrap" id="scAvatarWrap">
              <div class="sc-avatar" id="scAvatar"><i data-lucide="user" class="ico-lg"></i></div>
            </div>
            <div class="sc-qr" id="scQr"></div>
          </div>
          <div class="sc-info">
            <div class="sc-name-row">
              <span class="sc-verified" id="scVerified" style="display:none"><i data-lucide="badge-check" class="ico-sm"></i></span>
              <span class="sc-name" id="scName">—</span>
            </div>
            <div class="sc-title" id="scTitle"></div>
            <div class="sc-bio" id="scBio"></div>
            <button class="sc-bio-more" id="scBioMore" style="display:none" onclick="toggleBio()">عرض المزيد ▾</button>
            <div class="sc-meta-row">
              <span class="sc-loc" id="scLoc"></span>
              <span class="sc-age" id="scAge" style="display:none"></span>
            </div>
            <div class="sc-link-row" id="scLinkRow">
              <i data-lucide="link" class="ico-sm"></i>
              <span class="sc-link-text" id="scLinkText"></span>

              <button class="sc-link-copy" id="scLinkCopy" title="نسخ الرابط">
                <i data-lucide="copy" class="ico-sm"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="sc-actions">
          <button class="sc-btn sc-btn-primary" id="scFollowBtn"><i data-lucide="user-plus" class="ico-sm"></i> متابعة</button>
          <button class="sc-btn sc-btn-ghost" id="scContactBtn"><i data-lucide="message-circle" class="ico-sm"></i> تواصل معي</button>
          <button class="sc-btn sc-btn-ghost" id="scFullBtn"><i data-lucide="file-text" class="ico-sm"></i> الملف</button>
        </div>

        <!-- Stats: 5 cells RTL order: الشهادات ← القوة ← المشاهدات ← المتابعون ← الخبرات -->
        <div class="sc-stats">
          <div class="sc-stat">
            <i data-lucide="graduation-cap" class="ico sc-stat-i" style="color:#f59e0b"></i>
            <div class="sc-stat-n" id="scStatEdu">—</div>
            <div class="sc-stat-l">الشهادات</div>
          </div>
          <div class="sc-stat">
            <i data-lucide="trending-up" class="ico sc-stat-i" style="color:#00c896"></i>
            <div class="sc-stat-n" id="scStatScore">—</div>
            <div class="sc-stat-l">القوة</div>
          </div>
          <div class="sc-stat">
            <i data-lucide="eye" class="ico sc-stat-i" style="color:#2563ff"></i>
            <div class="sc-stat-n" id="scStatViews">—</div>
            <div class="sc-stat-l">المشاهدات</div>
          </div>
          <div class="sc-stat">
            <i data-lucide="users" class="ico sc-stat-i" style="color:#8b5cf6"></i>
            <div class="sc-stat-n" id="scStatFollowers">—</div>
            <div class="sc-stat-l">المتابعون</div>
          </div>
          <div class="sc-stat">
            <i data-lucide="briefcase" class="ico sc-stat-i" style="color:#f97316"></i>
            <div class="sc-stat-n" id="scStatExp">—</div>
            <div class="sc-stat-l">الخبرات</div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="sc-tabs">
          <button class="sc-tab active" data-tab="about" onclick="scTab('about',this)"><i data-lucide="user-round" class="ico-sm"></i> نبذة عني</button>
          <button class="sc-tab" data-tab="skills" onclick="scTab('skills',this)"><i data-lucide="zap" class="ico-sm"></i> المهارات</button>
          <button class="sc-tab" data-tab="exp" onclick="scTab('exp',this)"><i data-lucide="briefcase" class="ico-sm"></i> الخبرات</button>
          <button class="sc-tab" data-tab="edu" onclick="scTab('edu',this)"><i data-lucide="graduation-cap" class="ico-sm"></i> الشهادات</button>
        </div>

        <!-- Tab content -->
        <div class="sc-content">
          <div class="sc-pane active" id="pane-about">
            <div class="sc-about-card">
              <div class="sc-about-title"><i data-lucide="user-round" class="ico-sm"></i> نبذة عني</div>
              <div class="sc-bio-text" id="scAboutText"></div>
            </div>
          </div>
          <div class="sc-pane" id="pane-skills"><div class="sc-skills" id="scSkillsPane"></div></div>
          <div class="sc-pane" id="pane-exp"><div id="scExpPane"></div></div>
          <div class="sc-pane" id="pane-edu"><div id="scEduPane"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="sc-toast" id="scToast"></div>

  <script src="/tw_shared.js"></script>
  <script src="/static/profile-v2.utils.js"></script>
  <script>
  window.PROFILE_SHOWCASE_VERSION = "edit-modal-profession-v1";
  // Script-level globals — also defined in profile-v2.state.js (Phase 4)
  var _jwt = localStorage.getItem('tw_jwt') || '';
  var _fetchOpts = _jwt ? { headers: { 'Authorization': 'Bearer ' + _jwt } } : {};
  var _scProfileId  = new URLSearchParams(location.search).get('id');
  var _scProfileKey = _scProfileId;
  var _scUserId     = null;

  (function() {
    var id = _scProfileId;

    // Header buttons
    var homeBtn=document.getElementById('scHomeBtn');
    if(homeBtn) homeBtn.onclick=function(){ window.location.href='/home'; };
    var bellBtn=document.getElementById('scBellBtn');
    if(bellBtn) bellBtn.onclick=function(){ window.location.href='/notifications'; };
    var msgBtn=document.getElementById('scMsgBtn');
    if(msgBtn) msgBtn.onclick=function(){ window.location.href='/messages'; };
    var menuBtn=document.getElementById('scMenuBtn');
    if(menuBtn) menuBtn.onclick=function(){ history.back(); };

    if(!id){
      var ld=document.getElementById('scLoading');
      if(ld) ld.textContent='لا يوجد معرّف ملف';
      return;
    }


    // Shared re-render function — called on load and after Edit save (Doctrine §26)
    window.renderProfile = function renderProfile(res){
        var p = (res && res.profile) ? res.profile : {};

        // Viewer state — set body class from server-verified JWT (Architecture Doctrine §22, §23)
        var _vt = res.viewer_type || 'guest';
        document.body.classList.remove('view-owner', 'public-view', 'view-guest');
        if      (_vt === 'owner')       document.body.classList.add('view-owner');
        else if (_vt === 'public-user') document.body.classList.add('public-view');
        else                            document.body.classList.add('view-guest');


        // Store numeric user id for Edit Modal save (never use URL param directly)
        window._scUserId = (p.id != null) ? p.id : null;

        // Show edit button for owner — from server-verified viewer_type only
        var editBtn = document.getElementById('scEditProfileBtn');
        if(editBtn) editBtn.style.display = (_vt === 'owner') ? 'flex' : 'none';

        // Identity
        setText('scName', p.full_name || '—');
        setText('scBio', p.bio || '');

        // Title + profession icon — fallback = briefcase (Doctrine §27)
        var titleEl = document.getElementById('scTitle');
        if(titleEl){
          var profIcon = (p.profession && p.profession.icon) ? p.profession.icon : 'briefcase';
          var titleText = (p.profession && p.profession.name_ar)
            ? p.profession.name_ar
            : (p.headline || p.title || '');
          if(titleText){
            titleEl.innerHTML = '<i data-lucide="' + profIcon + '" class="ico-sm"></i> ' + esc(titleText);
          } else {
            titleEl.textContent = '';
          }
        }

        // Profile link row — canonical /profile URL (Doctrine §28)
        var _profileUrl = location.origin + '/profile?id=' + encodeURIComponent(p.tw_id || id);
        var linkRow  = document.getElementById('scLinkRow');
        var linkText = document.getElementById('scLinkText');
        var linkCopy = document.getElementById('scLinkCopy');
        if(linkRow && linkText && linkCopy){
          linkText.textContent = _profileUrl;
          linkRow.style.display = 'flex';
          linkCopy.onclick = function(){
            if(navigator.clipboard && navigator.clipboard.writeText){
              navigator.clipboard.writeText(_profileUrl)
                .then(function(){ toast('تم نسخ رابط البروفايل'); })
                .catch(function(){ toast('تعذّر نسخ الرابط'); });
            } else { toast('تعذّر نسخ الرابط'); }
          };
        }

        // Store profile data for Edit Modal pre-population
        window._scProfile = p;

        // Verified badge (only if verified)
        if(p.is_verified){
          var vEl=document.getElementById('scVerified');
          if(vEl) vEl.style.display='inline-flex';
        }

        // Location (with map-pin icon)
        var locEl=document.getElementById('scLoc');
        if(locEl && p.location){
          locEl.innerHTML = '<i data-lucide="map-pin" class="ico-sm"></i> ' + esc(p.location);
          locEl.style.display='inline-flex';
          locEl.style.alignItems='center';
          locEl.style.gap='4px';
        }

        // Age (computed from dob; hide if absent)
        if(p.dob){
          var birth=new Date(p.dob);
          if(!isNaN(birth.getTime())){
            var diff=Date.now()-birth.getTime();
            var age=Math.floor(diff/(365.25*24*3600*1000));
            if(age>0 && age<150){
              var ageEl=document.getElementById('scAge');
              if(ageEl){
                ageEl.innerHTML='<i data-lucide="cake" class="ico-sm"></i> ' + age + ' سنة';
                ageEl.style.display='flex';
              }
            }
          }
        }

        // Avatar image
        var av=document.getElementById('scAvatar');
        if(av && p.avatar_url){
          var img=new Image();
          img.alt='';
          img.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:50%';
          img.onload=function(){ av.innerHTML=''; av.appendChild(img); };
          img.src=esc(p.avatar_url);
        }


        // Profile link row — canonical URL uses /profile (not /profile-showcase)
        var _profileUrl = location.origin + '/profile?id=' + encodeURIComponent(p.tw_id || id);
        var linkRow  = document.getElementById('scLinkRow');
        var linkText = document.getElementById('scLinkText');
        var linkCopy = document.getElementById('scLinkCopy');
        if(linkRow && linkText && linkCopy){
          linkText.textContent = _profileUrl;
          linkRow.style.display = 'flex';
          linkCopy.addEventListener('click', function(){
            if(navigator.clipboard && navigator.clipboard.writeText){
              navigator.clipboard.writeText(_profileUrl)
                .then(function(){ toast('تم نسخ رابط البروفايل'); })
                .catch(function(){ toast('تعذّر نسخ الرابط'); });

            } else {
              toast('تعذّر نسخ الرابط');
            }
          });
        }

        // QR (uses public QR service pointing to this showcase URL — no backend)
        var qr=document.getElementById('scQr');
        if(qr){
          var showcaseUrl = location.origin + '/profile-showcase?id=' + encodeURIComponent(id);
          qr.innerHTML = '<div class="sc-qr-inner">'
            + '<img src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&qzone=1&data='
            + encodeURIComponent(showcaseUrl) + '" alt="QR">'
            + '<div class="sc-qr-center"><img src="https://wrxvmdmknhoufoeprpoc.supabase.co/storage/v1/object/public/site/55555.svg" alt=""></div>'
            + '</div>';
        }

        // Data arrays
        var skills = Array.isArray(p.skills) ? p.skills : [];
        var exp    = Array.isArray(p.experience) ? p.experience : [];
        var edu    = Array.isArray(p.education) ? p.education : [];

        // Stats
        setText('scStatEdu', edu.length);
        setText('scStatExp', exp.length);
        // scStatViews and scStatFollowers stay — (no API)

        // Bio header: show "عرض المزيد" if text overflows 3 lines
        requestAnimationFrame(function(){
          var bioEl=document.getElementById('scBio');
          var moreBtn=document.getElementById('scBioMore');
          if(bioEl && moreBtn && bioEl.scrollHeight > bioEl.clientHeight + 2){
            moreBtn.style.display='inline-block';
          }
        });

        // Tab: About
        var aboutEl=document.getElementById('scAboutText');
        if(aboutEl) aboutEl.textContent = p.bio || 'لا توجد نبذة بعد';

        // Tab: Skills
        var skEl=document.getElementById('scSkillsPane');
        if(skEl){
          skEl.innerHTML = skills.length
            ? skills.map(function(s){
                var label=(s&&typeof s==='object')?(s.skill||''):s;
                return '<span class="sc-skill">'+esc(label)+'</span>';
              }).join('')
            : '<div class="sc-empty">لا توجد مهارات بعد</div>';
        }

        // Tab: Experience
        var expEl=document.getElementById('scExpPane');
        if(expEl){
          expEl.innerHTML = exp.length
            ? exp.map(function(e){
                var t=esc(e.title||''); var c=esc(e.company||'');
                var loc=e.location?(' · '+esc(e.location)):'';
                return '<div class="sc-item"><div class="sc-item-t">'+t+'</div>'+
                  (c?'<div class="sc-item-s">'+c+loc+'</div>':'')+'</div>';
              }).join('')
            : '<div class="sc-empty">لا توجد خبرات بعد</div>';
        }

        // Tab: Education
        var eduEl=document.getElementById('scEduPane');
        if(eduEl){
          eduEl.innerHTML = edu.length
            ? edu.map(function(d){
                var inst=esc(d.institution||''); var deg=esc(d.degree||'');
                var fld=d.field?(' · '+esc(d.field)):'';
                return '<div class="sc-item"><div class="sc-item-t">'+inst+'</div>'+
                  ((deg||fld)?'<div class="sc-item-s">'+deg+fld+'</div>':'')+'</div>';
              }).join('')
            : '<div class="sc-empty">لا توجد شهادات بعد</div>';
        }

        // Full profile button → Details (profile.html accepts tw_id)
        var fullBtn=document.getElementById('scFullBtn');
        if(fullBtn) fullBtn.onclick=function(){ window.location.href='/profile.html?id='+encodeURIComponent(id); };

        // Action buttons
        var followBtn=document.getElementById('scFollowBtn');
        if(followBtn) followBtn.onclick=function(){ toast('ميزة المتابعة قريباً'); };
        var contactBtn=document.getElementById('scContactBtn');
        if(contactBtn) contactBtn.onclick=function(){ window.location.href='/messages'; };
        var fullBtn=document.getElementById('scFullBtn');
        if(fullBtn) fullBtn.onclick=function(){ window.location.href='/profile?id='+encodeURIComponent(id); };

        // Reveal
        var ld=document.getElementById('scLoading');
        var ct=document.getElementById('scContent');
        if(ld) ld.style.display='none';
        if(ct) ct.style.display='block';

        // Render all Lucide icons (retry if CDN still loading)
        if(!renderIcons()){
          var tries=0, iv=setInterval(function(){
            if(renderIcons() || ++tries>20) clearInterval(iv);
          },150);
        }

        // Auto-fit name to one line (after layout settled)
        requestAnimationFrame(function(){ fitName(); setTimeout(fitName,50); });

        // Score: independent parallel fetch — NUMERIC p.id (not tw_id), failure isolated
        var numId = (p.id != null) ? p.id : id;
        fetch('/profile/' + encodeURIComponent(numId) + '/score')
          .then(function(r){ return r.ok ? r.json() : null; })
          .then(function(sc){ if(sc && typeof sc.score!=='undefined') setText('scStatScore', sc.score); })
          .catch(function(){ /* score stays — */ });
    } // end renderProfile

    // Initial load — sends JWT for server-side viewer_type (Doctrine §22)
    fetch('/profile/' + encodeURIComponent(id), _fetchOpts)
      .then(function(r){ if(!r.ok) throw new Error('profile '+r.status); return r.json(); })
      .then(window.renderProfile)
      .catch(function(){
        var ld=document.getElementById('scLoading');
        if(ld) ld.textContent='تعذّر تحميل الملف';
      });
  })();

  window.toggleBio = function(){
    var bio=document.getElementById('scBio');
    var btn=document.getElementById('scBioMore');
    if(!bio || !btn) return;
    var expanded = bio.classList.toggle('expanded');
    btn.textContent = expanded ? 'عرض أقل ▴' : 'عرض المزيد ▾';
  };


  // ── Preview Eye Button (Doctrine §24) ──
  (function(){
    var eyeWrap = document.getElementById('scEyeWrap');
    var eyeBtn  = document.getElementById('scEyeBtn');
    var eyeMenu = document.getElementById('scEyeMenu');
    if(!eyeBtn || !eyeMenu) return;

    // Toggle dropdown
    eyeBtn.addEventListener('click', function(e){
      e.stopPropagation();
      eyeMenu.classList.toggle('open');
    });

    // Preview as logged-in user
    document.getElementById('scPreviewPublic').addEventListener('click', function(){
      document.body.classList.remove('preview-guest');
      document.body.classList.add('preview-public-user');
      eyeMenu.classList.remove('open');
    });


    // Preview as guest
    document.getElementById('scPreviewGuest').addEventListener('click', function(){
      document.body.classList.remove('preview-public-user');
      document.body.classList.add('preview-guest');
      eyeMenu.classList.remove('open');
    });


    // End preview
    document.getElementById('scPreviewEnd').addEventListener('click', function(){
      document.body.classList.remove('preview-public-user', 'preview-guest');
      eyeMenu.classList.remove('open');
    });


    // Close on outside click
    document.addEventListener('click', function(e){
      if(eyeWrap && !eyeWrap.contains(e.target)) eyeMenu.classList.remove('open');
    });
  })();


  // ── Edit Profile Modal — Phase 1: profession + bio only ──
  (function(){
    var overlay   = document.getElementById('epOverlay');
    var closeBtn  = document.getElementById('epClose');
    var cancelBtn = document.getElementById('epCancelBtn');
    var saveBtn   = document.getElementById('epSaveBtn');
    var editBtn   = document.getElementById('scEditProfileBtn');
    var errEl     = document.getElementById('epErr');

    if(!overlay || !editBtn) return;

    function openModal(){
      var p = window._scProfile || {};

      // Pre-populate bio
      var bioEl = document.getElementById('epBio');
      if(bioEl) bioEl.value = p.bio || '';

      // Fetch professions — pre-select current if any
      var profEl = document.getElementById('epProfession');
      if(profEl){
        profEl.innerHTML = '<option value="">جاري التحميل…</option>';
        fetch('/professions')
          .then(function(r){ return r.ok ? r.json() : []; })
          .then(function(list){
            var groups = {};
            list.forEach(function(pr){
              var g = pr.category_group || 'أخرى';
              if(!groups[g]) groups[g] = [];
              groups[g].push(pr);
            });
            var html = '<option value="">— اختر التخصص —</option>';
            Object.keys(groups).forEach(function(g){
              html += '<optgroup label="' + g + '">';
              groups[g].forEach(function(pr){
                var sel = (p.profession && p.profession.id === pr.id) ? ' selected' : '';
                html += '<option value="' + pr.id + '"' + sel + '>' + pr.name_ar + '</option>';
              });
              html += '</optgroup>';
            });
            profEl.innerHTML = html;
            if(window.lucide && lucide.createIcons) lucide.createIcons();
          })
          .catch(function(){ profEl.innerHTML = '<option value="">تعذّر تحميل التخصصات</option>'; });
      }

      if(errEl) errEl.style.display = 'none';
      overlay.classList.add('open');
      if(window.lucide && lucide.createIcons) lucide.createIcons();
    }

    function closeModal(){
      overlay.classList.remove('open');
    }

    editBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', function(e){ if(e.target === overlay) closeModal(); });

    saveBtn.addEventListener('click', function(){
      // Use numeric user id from API response — never trust URL param alone
      var uid = window._scUserId;
      if(!uid){ if(errEl){ errEl.textContent = 'خطأ: لم يتم التعرف على المستخدم'; errEl.style.display = 'block'; } return; }

      var profEl = document.getElementById('epProfession');
      var profVal = profEl ? profEl.value : '';
      var bioVal  = (document.getElementById('epBio').value || '').trim();

      var payload = {};
      if(profVal) payload.profession_id = parseInt(profVal, 10);
      payload.bio = bioVal;

      if(errEl) errEl.style.display = 'none';
      saveBtn.disabled = true;
      saveBtn.textContent = 'جاري الحفظ…';

      fetch('/profile/' + uid, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (_jwt || '') },
        body: JSON.stringify(payload)
      })
      .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, data:d}; }); })
      .then(function(res){
        if(!res.ok){
          var msg = (res.data && res.data.detail) ? res.data.detail : 'حدث خطأ أثناء الحفظ';
          if(errEl){ errEl.textContent = msg; errEl.style.display = 'block'; }
          return;
        }
        closeModal();
        if(window.toast) window.toast('تم حفظ التغييرات بنجاح');
        // Re-fetch using the original URL key (_scProfileKey) with JWT
        return fetch('/profile/' + encodeURIComponent(_scProfileKey), _fetchOpts)
          .then(function(r){ return r.ok ? r.json() : null; })
          .then(function(freshRes){
            if(freshRes && window.renderProfile) window.renderProfile(freshRes);
            if(window.lucide && lucide.createIcons) lucide.createIcons();
          });
      })
      .catch(function(){ if(errEl){ errEl.textContent = 'خطأ في الاتصال بالخادم'; errEl.style.display = 'block'; } })
      .finally(function(){ saveBtn.disabled = false; saveBtn.textContent = 'حفظ التغييرات'; });
    });
  })();
  </script>

  <!-- Edit Profile Modal — Phase 1: profession + bio -->
  <div class="ep-overlay" id="epOverlay">
    <div class="ep-sheet">
      <div class="ep-head">
        <span class="ep-title"><i data-lucide="pencil" class="ico-sm" style="color:var(--ac,#00c896);vertical-align:middle;margin-left:6px"></i> تعديل الملف الشخصي</span>
        <button class="ep-close" id="epClose"><i data-lucide="x" class="ico-sm"></i></button>
      </div>
      <div class="ep-body">
        <div class="ep-field">
          <label class="ep-label">التخصص المهني</label>
          <select class="ep-select" id="epProfession">
            <option value="">جاري التحميل…</option>
          </select>
        </div>
        <div class="ep-field">
          <label class="ep-label">نبذة تعريفية</label>
          <textarea class="ep-textarea" id="epBio" placeholder="اكتب نبذة عن نفسك…" maxlength="600"></textarea>
        </div>
        <div class="ep-err" id="epErr"></div>
      </div>
      <div class="ep-footer">
        <button class="ep-cancel" id="epCancelBtn">إلغاء</button>
        <button class="ep-save" id="epSaveBtn">حفظ التغييرات</button>
      </div>
    </div>
  </div>

</body>
</html>
