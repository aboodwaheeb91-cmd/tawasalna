<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تواصلنا — البطاقة التعريفية</title>
  <link rel="stylesheet" href="/static/tw_shared.css">
  <style>
    /* Profile Showcase Premium — UI-only redesign. No backend/API changes. */
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --sc-bg: var(--bg,#0a0e14);
      --sc-card: rgba(20,26,36,.82);
      --sc-card2: rgba(255,255,255,.055);
      --sc-line: rgba(255,255,255,.10);
      --sc-text: var(--t1,#fff);
      --sc-muted: var(--t2,#9aa5b4);
      --sc-soft: var(--t3,#6b7686);
      --sc-ac: var(--ac,#00c896);
      --sc-ac2: var(--ac2,#2563ff);
      --sc-radius: 26px;
      --sc-shadow: 0 24px 70px rgba(0,0,0,.36);
    }
    body {
      min-height:100vh; direction:rtl; color:var(--sc-text);
      font-family:'Cairo',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:
        radial-gradient(circle at 80% 0%, rgba(0,200,150,.18), transparent 32%),
        radial-gradient(circle at 5% 12%, rgba(37,99,255,.18), transparent 30%),
        linear-gradient(180deg,#090d13 0%, var(--sc-bg) 55%, #080b10 100%);
    }
    .sc-loading { min-height:100vh; display:flex; align-items:center; justify-content:center; color:var(--sc-muted); font-weight:700; }
    .sc-page { width:min(100%,1120px); margin:0 auto; padding:16px 14px 36px; }

    .sc-shell {
      display:grid; grid-template-columns:1fr; gap:16px;
    }

    /* HERO */
    .sc-hero {
      position:relative; overflow:hidden; border:1px solid var(--sc-line); border-radius:32px;
      background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.035));
      box-shadow:var(--sc-shadow); isolation:isolate;
    }
    .sc-cover {
      height:190px; position:relative; overflow:hidden;
      background:
        radial-gradient(circle at 18% 30%, rgba(255,255,255,.22), transparent 16%),
        linear-gradient(135deg,var(--sc-ac),var(--sc-ac2) 55%, #7c3aed);
    }
    .sc-cover::before {
      content:""; position:absolute; inset:0;
      background:
        linear-gradient(120deg, transparent 0 42%, rgba(255,255,255,.16) 43% 45%, transparent 46% 100%),
        radial-gradient(circle at 78% 20%, rgba(255,255,255,.20), transparent 12%);
      opacity:.75;
    }
    .sc-hero-body { position:relative; padding:0 18px 20px; text-align:center; }
    .sc-avatar-wrap {
      width:118px; height:118px; border-radius:50%; margin:-60px auto 12px;
      padding:5px; background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(255,255,255,.18));
      box-shadow:0 18px 45px rgba(0,0,0,.34); position:relative; z-index:2;
    }
    .sc-avatar {
      width:100%; height:100%; border-radius:50%; background:#141a24; display:flex;
      align-items:center; justify-content:center; overflow:hidden; font-size:2.8rem; border:4px solid var(--sc-bg);
    }
    .sc-avatar img { width:100%; height:100%; object-fit:cover; display:block; }
    .sc-name { font-size:1.65rem; line-height:1.25; font-weight:900; letter-spacing:-.02em; }
    .sc-title { margin-top:6px; color:var(--sc-muted); font-size:.93rem; line-height:1.65; }
    .sc-bio {
      margin:12px auto 0; max-width:600px; color:var(--sc-muted); line-height:1.85; font-size:.9rem;
      display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
    }
    .sc-pill-row { display:flex; justify-content:center; align-items:center; gap:8px; flex-wrap:wrap; margin-top:14px; }
    .sc-pill {
      padding:7px 11px; border-radius:999px; border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.055); color:var(--sc-muted); font-size:.76rem; font-weight:800;
    }
    .sc-pill.ok { color:#dfffee; background:rgba(0,200,150,.13); border-color:rgba(0,200,150,.22); }

    .sc-primary-action { margin:18px auto 0; display:flex; justify-content:center; }
    .sc-full {
      display:inline-flex; align-items:center; justify-content:center; gap:8px; min-width:190px;
      padding:13px 18px; border-radius:16px; color:#fff; text-decoration:none; font-weight:900; font-size:.9rem;
      background:linear-gradient(135deg,var(--sc-ac),var(--sc-ac2)); box-shadow:0 14px 35px rgba(0,200,150,.18);
    }

    .sc-stats {
      display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:18px;
    }
    .sc-stat {
      padding:14px 8px; border-radius:20px; background:rgba(255,255,255,.055); border:1px solid rgba(255,255,255,.075);
    }
    .sc-stat-n { font-size:1.32rem; font-weight:950; color:var(--sc-ac); line-height:1; }
    .sc-stat-l { margin-top:6px; font-size:.68rem; color:var(--sc-soft); font-weight:800; }

    /* CARDS */
    .sc-grid { display:grid; grid-template-columns:1fr; gap:16px; }
    .sc-card {
      border:1px solid var(--sc-line); background:var(--sc-card); backdrop-filter:blur(14px);
      border-radius:var(--sc-radius); padding:18px; box-shadow:0 14px 45px rgba(0,0,0,.20);
    }
    .sc-card-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; }
    .sc-card-title { font-size:1rem; font-weight:950; display:flex; align-items:center; gap:8px; }
    .sc-card-sub { color:var(--sc-soft); font-size:.74rem; font-weight:700; }
    .sc-badge-icon {
      width:30px; height:30px; border-radius:11px; display:inline-flex; align-items:center; justify-content:center;
      background:linear-gradient(135deg,rgba(0,200,150,.16),rgba(37,99,255,.15)); color:var(--sc-ac);
    }

    .sc-skills { display:flex; flex-wrap:wrap; gap:9px; }
    .sc-skill {
      padding:8px 12px; border-radius:999px; color:#dfffee; background:rgba(0,200,150,.12);
      border:1px solid rgba(0,200,150,.18); font-size:.78rem; font-weight:850;
    }

    .sc-timeline { display:flex; flex-direction:column; gap:10px; }
    .sc-item {
      padding:13px; border-radius:18px; background:rgba(255,255,255,.045); border:1px solid rgba(255,255,255,.075);
      display:grid; grid-template-columns:auto 1fr; gap:11px; align-items:start;
    }
    .sc-dot { width:10px; height:10px; margin-top:7px; border-radius:50%; background:var(--sc-ac); box-shadow:0 0 0 5px rgba(0,200,150,.10); }
    .sc-item-t { font-size:.9rem; font-weight:950; line-height:1.55; }
    .sc-item-s { color:var(--sc-soft); font-size:.77rem; margin-top:3px; font-weight:750; }

    .sc-empty { color:var(--sc-soft); font-size:.84rem; line-height:1.75; }

    @media (min-width:860px) {
      .sc-page { padding:28px 18px 56px; }
      .sc-shell { grid-template-columns:minmax(360px,420px) 1fr; align-items:start; }
      .sc-hero { position:sticky; top:24px; }
      .sc-cover { height:220px; }
      .sc-avatar-wrap { width:132px; height:132px; margin-top:-68px; }
      .sc-name { font-size:1.9rem; }
      .sc-grid { grid-template-columns:1fr; }
    }

    @media (max-width:420px) {
      .sc-page { padding:10px 10px 28px; }
      .sc-cover { height:168px; }
      .sc-hero { border-radius:26px; }
      .sc-card { border-radius:22px; padding:15px; }
      .sc-name { font-size:1.45rem; }
      .sc-stats { gap:8px; }
      .sc-stat { border-radius:16px; padding:12px 4px; }
      .sc-stat-n { font-size:1.15rem; }
    }
  </style>
</head>
<body>
  <div id="scLoading" class="sc-loading">جاري التحميل…</div>

  <main id="scContent" class="sc-page" style="display:none">
    <div class="sc-shell">
      <section class="sc-hero" aria-label="البطاقة التعريفية">
        <div class="sc-cover" id="scCover"></div>
        <div class="sc-hero-body">
          <div class="sc-avatar-wrap"><div class="sc-avatar" id="scAvatar">👤</div></div>
          <h1 class="sc-name" id="scName">—</h1>
          <div class="sc-title" id="scTitle">—</div>
          <div class="sc-pill-row">
            <span class="sc-pill ok" id="scAvail" style="display:none">متاح للعمل</span>
            <span class="sc-pill" id="scLocation" style="display:none"></span>
          </div>
          <p class="sc-bio" id="scBio"></p>

          <div class="sc-stats" id="scStats">
            <div class="sc-stat"><div class="sc-stat-n" id="scStatScore">—</div><div class="sc-stat-l">القوة</div></div>
            <div class="sc-stat"><div class="sc-stat-n" id="scStatExp">—</div><div class="sc-stat-l">خبرات</div></div>
            <div class="sc-stat"><div class="sc-stat-n" id="scStatSkills">—</div><div class="sc-stat-l">مهارات</div></div>
          </div>

          <div class="sc-primary-action">
            <a class="sc-full" id="scFullBtn">عرض الملف الكامل ←</a>
          </div>
        </div>
      </section>

      <section class="sc-grid" aria-label="ملخص الملف">
        <div class="sc-card" id="scSkillsCard">
          <div class="sc-card-head">
            <div class="sc-card-title"><span class="sc-badge-icon">✦</span> أهم المهارات</div>
            <div class="sc-card-sub">مختصر سريع</div>
          </div>
          <div class="sc-skills" id="scSkills"></div>
        </div>

        <div class="sc-card" id="scExpCard">
          <div class="sc-card-head">
            <div class="sc-card-title"><span class="sc-badge-icon">↗</span> أحدث الخبرات</div>
            <div class="sc-card-sub">آخر 3</div>
          </div>
          <div class="sc-timeline" id="scLatestExp"></div>
        </div>
      </section>
    </div>
  </main>

  <script src="/tw_shared.js"></script>
  <script>
  (function() {
    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }
    function setText(id, val) {
      var el = document.getElementById(id);
      if (el) el.textContent = val == null ? '' : String(val);
    }
    function show(id, val) {
      var el = document.getElementById(id);
      if (!el) return;
      el.style.display = val ? '' : 'none';
    }

    var id = new URLSearchParams(location.search).get('id');
    if (!id) {
      setText('scLoading', 'لا يوجد معرّف ملف');
      return;
    }

    fetch('/profile/' + encodeURIComponent(id))
      .then(function(r) {
        if (!r.ok) throw new Error('profile fetch failed: ' + r.status);
        return r.json();
      })
      .then(function(res) {
        var p = (res && res.profile) ? res.profile : {};
        var headline = p.headline || p.title || '';
        var skills = Array.isArray(p.skills) ? p.skills : [];
        var exp = Array.isArray(p.experience) ? p.experience : [];
        var locationText = p.location || [p.city, p.country].filter(Boolean).join('، ');

        setText('scName', p.full_name || '—');
        setText('scTitle', headline || '');
        setText('scBio', p.bio || '');
        setText('scStatExp', exp.length);
        setText('scStatSkills', skills.length);

        if (locationText) { setText('scLocation', '📍 ' + locationText); show('scLocation', true); }
        if (p.avail) { show('scAvail', true); }

        var av = document.getElementById('scAvatar');
        if (av && p.avatar_url) {
          av.innerHTML = '<img src="' + esc(p.avatar_url) + '" alt="">';
        }

        var skillsEl = document.getElementById('scSkills');
        var skillsCard = document.getElementById('scSkillsCard');
        if (skills.length && skillsEl) {
          skillsEl.innerHTML = skills.slice(0, 8).map(function(s) {
            var label = (s && typeof s === 'object') ? (s.skill || '') : s;
            return label ? '<span class="sc-skill">' + esc(label) + '</span>' : '';
          }).join('');
        } else if (skillsCard) {
          skillsCard.style.display = 'none';
        }

        var expEl = document.getElementById('scLatestExp');
        var expCard = document.getElementById('scExpCard');
        if (exp.length && expEl) {
          expEl.innerHTML = exp.slice(0, 3).map(function(e) {
            var title = esc(e.title || 'خبرة');
            var company = esc(e.company || '');
            return '<div class="sc-item">' +
              '<span class="sc-dot"></span>' +
              '<div><div class="sc-item-t">' + title + '</div>' +
              (company ? '<div class="sc-item-s">' + company + '</div>' : '') +
              '</div></div>';
          }).join('');
        } else if (expCard) {
          expCard.style.display = 'none';
        }

        var fullBtn = document.getElementById('scFullBtn');
        if (fullBtn) fullBtn.href = '/profile.html?id=' + encodeURIComponent(id);

        var ld = document.getElementById('scLoading');
        var ct = document.getElementById('scContent');
        if (ld) ld.style.display = 'none';
        if (ct) ct.style.display = 'block';

        var numId = (p.id != null) ? p.id : id;
        fetch('/profile/' + encodeURIComponent(numId) + '/score')
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(sc) { if (sc && typeof sc.score !== 'undefined') setText('scStatScore', sc.score); })
          .catch(function(){});
      })
      .catch(function() {
        setText('scLoading', 'تعذّر تحميل الملف');
      });
  })();
  </script>
</body>
</html>
