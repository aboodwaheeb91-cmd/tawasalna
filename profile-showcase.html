<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تواصلنا — البطاقة التعريفية</title>
  <link rel="stylesheet" href="/static/tw_shared.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Cairo',sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(37,99,255,.18), transparent 34%),
        radial-gradient(circle at 80% 10%, rgba(0,200,150,.15), transparent 32%),
        var(--bg,#070b18);
      color:var(--t1,#fff);
      min-height:100vh;
      direction:rtl;
    }

    .sc-loading{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--t3,rgba(255,255,255,.4));
      font-weight:800;
    }

    .sc-page{
      max-width:620px;
      margin:0 auto;
      padding:0 14px 34px;
    }

    /* Top logo space */
    .sc-logo-space{
      height:86px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }
    .sc-logo{
      font-size:1.55rem;
      font-weight:950;
      letter-spacing:.5px;
      background:linear-gradient(135deg,var(--ac,#00c896),var(--ac2,#2563ff));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      line-height:1.1;
    }
    .sc-logo small{
      display:block;
      color:var(--t2,rgba(255,255,255,.7));
      font-size:.58rem;
      letter-spacing:2px;
      margin-top:3px;
      font-weight:800;
    }

    /* One long premium card */
    .sc-card-main{
      border:1px solid rgba(255,255,255,.10);
      border-radius:28px;
      overflow:hidden;
      background:
        linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.025)),
        var(--bg2,#0d1426);
      box-shadow:0 22px 65px rgba(0,0,0,.34);
    }

    .sc-cover{
      height:124px;
      position:relative;
      background:
        radial-gradient(circle at 15% 25%, rgba(255,255,255,.22), transparent 13%),
        linear-gradient(135deg,var(--ac,#00c896),var(--ac2,#2563ff) 60%, #7c3aed);
      overflow:hidden;
    }
    .sc-cover:before{
      content:"";
      position:absolute;inset:0;
      background:
        linear-gradient(120deg,transparent 0 44%,rgba(255,255,255,.17) 45%,transparent 48%),
        radial-gradient(circle at 80% 20%,rgba(255,255,255,.15),transparent 18%);
      opacity:.75;
    }

    .sc-hero{
      display:flex;
      align-items:flex-start;
      gap:16px;
      padding:18px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .sc-side{
      width:112px;
      flex-shrink:0;
      position:relative;
    }

    .sc-avatar{
      width:112px;
      height:112px;
      border-radius:50%;
      border:4px solid var(--bg,#070b18);
      background:var(--bg2,#0d1426);
      margin-top:-74px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:2.4rem;
      box-shadow:0 16px 34px rgba(0,0,0,.32);
      position:relative;
      z-index:2;
    }
    .sc-avatar img{width:100%;height:100%;object-fit:cover;display:block}

    .sc-qr{
      margin-top:10px;
      width:112px;
      height:112px;
      border-radius:18px;
      background:#fff;
      padding:9px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:3px;
      box-shadow:0 14px 28px rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.10);
    }
    .sc-qr span{
      background:#111827;
      border-radius:2px;
      min-height:10px;
    }
    .sc-qr span:nth-child(2n){background:#e5e7eb}
    .sc-qr span:nth-child(3n){background:#111827}
    .sc-qr span:nth-child(7),
    .sc-qr span:nth-child(19),
    .sc-qr span:nth-child(23){background:var(--ac,#00c896)}

    .sc-info{
      flex:1;
      min-width:0;
      padding-top:4px;
    }
    .sc-name-row{
      display:flex;
      align-items:center;
      gap:7px;
      flex-wrap:wrap;
    }
    .sc-name{
      font-size:1.34rem;
      font-weight:950;
      line-height:1.35;
      letter-spacing:-.02em;
    }
    .sc-verified{
      width:20px;height:20px;border-radius:50%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,var(--ac,#00c896),var(--ac2,#2563ff));
      color:#fff;
      font-size:.72rem;
      font-weight:950;
      flex-shrink:0;
    }

    .sc-title{
      color:var(--ac,#00c896);
      font-size:.88rem;
      font-weight:850;
      margin-top:6px;
      line-height:1.5;
    }
    .sc-meta{
      color:var(--t2,rgba(255,255,255,.7));
      font-size:.76rem;
      margin-top:6px;
      line-height:1.6;
    }
    .sc-bio{
      color:var(--t2,rgba(255,255,255,.7));
      font-size:.80rem;
      line-height:1.85;
      margin-top:10px;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .sc-actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:14px;
    }
    .sc-btn{
      border:none;
      border-radius:13px;
      padding:9px 12px;
      font-family:inherit;
      font-weight:900;
      font-size:.74rem;
      cursor:pointer;
      min-height:38px;
    }
    .sc-btn-primary{
      background:linear-gradient(135deg,var(--ac,#00c896),var(--ac2,#2563ff));
      color:#fff;
      box-shadow:0 10px 24px rgba(0,200,150,.14);
    }
    .sc-btn-ghost{
      background:rgba(255,255,255,.055);
      color:var(--t1,#fff);
      border:1px solid rgba(255,255,255,.10);
    }
    .sc-full{
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .sc-stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:9px;
      padding:15px 16px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .sc-stat{
      text-align:center;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.07);
      border-radius:16px;
      padding:11px 5px;
    }
    .sc-stat-n{
      font-size:1.16rem;
      line-height:1;
      font-weight:950;
      color:var(--ac,#00c896);
    }
    .sc-stat-l{
      color:var(--t3,rgba(255,255,255,.4));
      font-size:.62rem;
      margin-top:6px;
      font-weight:800;
    }

    .sc-tabs{
      display:flex;
      gap:4px;
      padding:12px 14px 0;
      overflow-x:auto;
      scrollbar-width:none;
    }
    .sc-tabs::-webkit-scrollbar{display:none}
    .sc-tab{
      border:none;
      background:transparent;
      color:var(--t2,rgba(255,255,255,.7));
      font-family:inherit;
      font-size:.78rem;
      font-weight:900;
      padding:10px 12px;
      border-bottom:2px solid transparent;
      white-space:nowrap;
    }
    .sc-tab.active{
      color:var(--ac,#00c896);
      border-bottom-color:var(--ac,#00c896);
    }

    .sc-content{
      padding:16px;
    }
    .sc-panel{
      display:none;
      animation:fadeIn .18s ease-out;
    }
    .sc-panel.active{display:block}
    @keyframes fadeIn{from{opacity:.55;transform:translateY(3px)}to{opacity:1;transform:none}}

    .sc-section{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:20px;
      padding:15px;
    }
    .sc-section-title{
      font-size:.98rem;
      font-weight:950;
      margin-bottom:12px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .sc-section-title:before{
      content:"";
      width:9px;height:9px;border-radius:50%;
      background:var(--ac,#00c896);
      box-shadow:0 0 0 5px rgba(0,200,150,.12);
    }

    .sc-about{
      color:var(--t2,rgba(255,255,255,.7));
      line-height:1.9;
      font-size:.86rem;
    }

    .sc-skills{
      display:flex;
      flex-wrap:wrap;
      gap:9px;
    }
    .sc-skill{
      padding:8px 12px;
      border-radius:999px;
      color:#dfffee;
      background:rgba(0,200,150,.12);
      border:1px solid rgba(0,200,150,.18);
      font-size:.76rem;
      font-weight:850;
    }

    .sc-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .sc-item{
      padding:13px;
      border-radius:16px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.07);
    }
    .sc-item-t{
      font-size:.88rem;
      font-weight:950;
      line-height:1.55;
    }
    .sc-item-s{
      color:var(--t3,rgba(255,255,255,.4));
      font-size:.74rem;
      margin-top:3px;
      font-weight:750;
    }
    .sc-empty{
      color:var(--t3,rgba(255,255,255,.4));
      font-size:.82rem;
      line-height:1.7;
    }

    .sc-toast{
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%) translateY(12px);
      opacity:0;
      pointer-events:none;
      background:rgba(7,11,24,.97);
      border:1px solid rgba(255,255,255,.10);
      border-radius:14px;
      padding:10px 14px;
      color:#fff;
      font-size:.78rem;
      font-weight:900;
      transition:.22s;
      z-index:999;
      white-space:nowrap;
    }
    .sc-toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media (max-width:430px){
      .sc-page{padding:0 10px 28px}
      .sc-logo-space{height:76px}
      .sc-card-main{border-radius:24px}
      .sc-cover{height:112px}
      .sc-hero{gap:12px;padding:16px 14px}
      .sc-side{width:94px}
      .sc-avatar{width:94px;height:94px;margin-top:-62px;border-width:3px}
      .sc-qr{width:94px;height:94px;border-radius:15px;padding:8px;gap:2px}
      .sc-name{font-size:1.12rem}
      .sc-title{font-size:.78rem}
      .sc-meta{font-size:.69rem}
      .sc-bio{font-size:.74rem;-webkit-line-clamp:2}
      .sc-actions{gap:6px}
      .sc-btn{font-size:.68rem;padding:8px 9px;border-radius:11px}
      .sc-stats{grid-template-columns:repeat(4,1fr);gap:6px;padding:12px}
      .sc-stat{padding:10px 3px;border-radius:13px}
      .sc-stat-n{font-size:1rem}
      .sc-stat-l{font-size:.56rem}
      .sc-tab{font-size:.72rem;padding:9px 10px}
      .sc-content{padding:13px}
    }
  </style>
</head>
<body>
  <div id="scLoading" class="sc-loading">جاري التحميل…</div>

  <main id="scContent" class="sc-page" style="display:none">
    <div class="sc-logo-space">
      <div class="sc-logo">تواصلنا<small>TAWASOLNA</small></div>
    </div>

    <section class="sc-card-main">
      <div class="sc-cover" id="scCover"></div>

      <div class="sc-hero">
        <div class="sc-side">
          <div class="sc-avatar" id="scAvatar">👤</div>
          <div class="sc-qr" id="scQr" aria-label="QR">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>

        <div class="sc-info">
          <div class="sc-name-row">
            <div class="sc-name" id="scName">—</div>
            <span class="sc-verified" id="scVerified" style="display:none">✓</span>
          </div>
          <div class="sc-title" id="scTitle">—</div>
          <div class="sc-meta" id="scMeta"></div>
          <div class="sc-bio" id="scBio"></div>

          <div class="sc-actions">
            <button class="sc-btn sc-btn-primary" id="scFollowBtn" type="button">متابعة</button>
            <button class="sc-btn sc-btn-ghost" id="scContactBtn" type="button">تواصل معي</button>
            <a class="sc-btn sc-btn-ghost sc-full" id="scFullBtn">الملف الكامل</a>
          </div>
        </div>
      </div>

      <div class="sc-stats">
        <div class="sc-stat"><div class="sc-stat-n" id="scStatScore">—</div><div class="sc-stat-l">القوة</div></div>
        <div class="sc-stat"><div class="sc-stat-n" id="scStatExp">—</div><div class="sc-stat-l">خبرات</div></div>
        <div class="sc-stat"><div class="sc-stat-n" id="scStatSkills">—</div><div class="sc-stat-l">مهارات</div></div>
        <div class="sc-stat"><div class="sc-stat-n" id="scStatCerts">—</div><div class="sc-stat-l">شهادات</div></div>
      </div>

      <div class="sc-tabs" role="tablist">
        <button class="sc-tab active" data-tab="about" type="button">نبذة</button>
        <button class="sc-tab" data-tab="skills" type="button">مهارات</button>
        <button class="sc-tab" data-tab="exp" type="button">خبرات</button>
        <button class="sc-tab" data-tab="certs" type="button">شهادات</button>
      </div>

      <div class="sc-content">
        <div class="sc-panel active" id="tab-about">
          <div class="sc-section">
            <div class="sc-section-title">نبذة عني</div>
            <div class="sc-about" id="scAbout">—</div>
          </div>
        </div>

        <div class="sc-panel" id="tab-skills">
          <div class="sc-section">
            <div class="sc-section-title">أهم المهارات</div>
            <div class="sc-skills" id="scSkills"></div>
          </div>
        </div>

        <div class="sc-panel" id="tab-exp">
          <div class="sc-section">
            <div class="sc-section-title">أحدث الخبرات</div>
            <div class="sc-list" id="scLatestExp"></div>
          </div>
        </div>

        <div class="sc-panel" id="tab-certs">
          <div class="sc-section">
            <div class="sc-section-title">الشهادات</div>
            <div class="sc-list" id="scCerts"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="sc-toast" id="scToast">قريباً</div>

  <script src="/tw_shared.js"></script>
  <script>
  (function() {
    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }
    function setText(id, val) {
      var el = document.getElementById(id);
      if (el) el.textContent = val == null ? '' : String(val);
    }
    function toast(msg) {
      var t = document.getElementById('scToast');
      if (!t) return;
      t.textContent = msg || 'قريباً';
      t.classList.add('show');
      clearTimeout(window.__scToastTimer);
      window.__scToastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1500);
    }
    function bindTabs() {
      document.querySelectorAll('.sc-tab').forEach(function(btn){
        btn.addEventListener('click', function(){
          var tab = btn.getAttribute('data-tab');
          document.querySelectorAll('.sc-tab').forEach(function(b){ b.classList.remove('active'); });
          document.querySelectorAll('.sc-panel').forEach(function(p){ p.classList.remove('active'); });
          btn.classList.add('active');
          var panel = document.getElementById('tab-' + tab);
          if (panel) panel.classList.add('active');
        });
      });
    }

    bindTabs();

    var id = new URLSearchParams(location.search).get('id');
    if (!id) {
      setText('scLoading', 'لا يوجد معرّف ملف');
      return;
    }

    fetch('/profile/' + encodeURIComponent(id))
      .then(function(r) {
        if (!r.ok) throw new Error('profile fetch failed: ' + r.status);
        return r.json();
      })
      .then(function(res) {
        var p = (res && res.profile) ? res.profile : {};
        var headline = p.headline || p.title || '';
        var skills = Array.isArray(p.skills) ? p.skills : [];
        var exp = Array.isArray(p.experience) ? p.experience : [];
        var certs = Array.isArray(p.education) ? p.education : [];
        var loc = p.location || [p.city, p.country].filter(Boolean).join(' - ');

        setText('scName', p.full_name || '—');
        setText('scTitle', headline || '—');
        setText('scMeta', loc ? '📍 ' + loc : '');
        setText('scBio', p.bio || '');
        setText('scAbout', p.bio || 'لم تتم إضافة نبذة بعد.');
        setText('scStatExp', exp.length);
        setText('scStatSkills', skills.length);
        setText('scStatCerts', certs.length);

        var verified = document.getElementById('scVerified');
        if (verified && (p.is_verified || p.verification_status === 'verified')) verified.style.display = 'inline-flex';

        var av = document.getElementById('scAvatar');
        if (av && p.avatar_url) {
          av.innerHTML = '<img src="' + esc(p.avatar_url) + '" alt="">';
        }

        var skillsEl = document.getElementById('scSkills');
        if (skillsEl) {
          if (skills.length) {
            skillsEl.innerHTML = skills.slice(0, 10).map(function(s) {
              var label = (s && typeof s === 'object') ? (s.skill || '') : s;
              return label ? '<span class="sc-skill">' + esc(label) + '</span>' : '';
            }).join('');
          } else {
            skillsEl.innerHTML = '<div class="sc-empty">لا توجد مهارات بعد.</div>';
          }
        }

        var expEl = document.getElementById('scLatestExp');
        if (expEl) {
          if (exp.length) {
            expEl.innerHTML = exp.slice(0, 4).map(function(e) {
              var title = esc(e.title || 'خبرة');
              var company = esc(e.company || '');
              return '<div class="sc-item"><div class="sc-item-t">' + title + '</div>' +
                (company ? '<div class="sc-item-s">' + company + '</div>' : '') + '</div>';
            }).join('');
          } else {
            expEl.innerHTML = '<div class="sc-empty">لا توجد خبرات بعد.</div>';
          }
        }

        var certsEl = document.getElementById('scCerts');
        if (certsEl) {
          if (certs.length) {
            certsEl.innerHTML = certs.slice(0, 4).map(function(c) {
              var title = esc(c.degree || c.title || c.school || 'شهادة');
              var sub = esc(c.school || c.institution || '');
              return '<div class="sc-item"><div class="sc-item-t">' + title + '</div>' +
                (sub ? '<div class="sc-item-s">' + sub + '</div>' : '') + '</div>';
            }).join('');
          } else {
            certsEl.innerHTML = '<div class="sc-empty">لا توجد شهادات بعد.</div>';
          }
        }

        var fullBtn = document.getElementById('scFullBtn');
        if (fullBtn) fullBtn.href = '/profile.html?id=' + encodeURIComponent(id);

        var contactBtn = document.getElementById('scContactBtn');
        if (contactBtn) contactBtn.addEventListener('click', function(){ toast('ميزة التواصل قريباً'); });

        var followBtn = document.getElementById('scFollowBtn');
        if (followBtn) followBtn.addEventListener('click', function(){ toast('ميزة المتابعة قريباً'); });

        var ld = document.getElementById('scLoading');
        var ct = document.getElementById('scContent');
        if (ld) ld.style.display = 'none';
        if (ct) ct.style.display = 'block';

        var numId = (p.id != null) ? p.id : id;
        fetch('/profile/' + encodeURIComponent(numId) + '/score')
          .then(function(r) { return r.ok ? r.json() : null; })
          .then(function(sc) {
            if (sc && typeof sc.score !== 'undefined') setText('scStatScore', sc.score);
          })
          .catch(function() {});
      })
      .catch(function() {
        setText('scLoading', 'تعذّر تحميل الملف');
      });
  })();
  </script>
</body>
</html>
