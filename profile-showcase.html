<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>تواصلنا — البطاقة التعريفية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/tw_shared.css">
  <link rel="stylesheet" href="/static/profile-v2.css">
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
</head>
<body>
  <!-- Header -->
  <div class="sc-header">
    <button class="sc-home-pill" id="scHomeBtn"><i data-lucide="home" class="ico-sm"></i> الرئيسية</button>
    <div class="sc-logo">
      <img src="https://wrxvmdmknhoufoeprpoc.supabase.co/storage/v1/object/public/site/33333.svg"
           alt="تواصلنا"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <span class="sc-logo-fallback" style="display:none">تواصلنا</span>
    </div>
    <div class="sc-head-icons">

      <!-- Eye preview button — owner only (hidden via CSS until body.view-owner) -->
      <div class="sc-eye-wrap" id="scEyeWrap">
        <button class="sc-hicon sc-hicon-bare" id="scEyeBtn" title="معاينة البروفايل">
          <i data-lucide="eye-off" class="ico sc-eye-icon-off"></i>
          <i data-lucide="eye"     class="ico sc-eye-icon-on"></i>
        </button>
        <div class="sc-eye-menu" id="scEyeMenu">

          <button class="sc-eye-item" id="scPreviewPublic">
            <i data-lucide="user-round" class="ico-sm"></i>
            معاينة كمستخدم مسجل
          </button>
          <button class="sc-eye-item" id="scPreviewGuest">
            <i data-lucide="user-x" class="ico-sm"></i>
            معاينة كزائر
          </button>
          <div class="sc-eye-sep"></div>
          <button class="sc-eye-item sc-eye-end" id="scPreviewEnd">
            <i data-lucide="x-circle" class="ico-sm"></i>
            إنهاء المعاينة
          </button>
        </div>
      </div>

      <!-- Edit button — owner only, shown by renderProfile when viewer_type=owner -->
      <button class="sc-hicon sc-hicon-bare owner-only" id="scEditProfileBtn" title="تعديل الملف الشخصي" style="display:none">
        <i data-lucide="pencil" class="ico"></i>
      </button>
      <button class="sc-hicon sc-hicon-bare" id="scBellBtn" title="الإشعارات"><i data-lucide="bell" class="ico"></i></button>
      <button class="sc-hicon sc-hicon-bare" id="scMsgBtn" title="الرسائل"><i data-lucide="message-circle-more" class="ico"></i></button>
      <button class="sc-hicon sc-hicon-bare" id="scMenuBtn" title="القائمة"><i data-lucide="menu" class="ico"></i></button>
    </div>
  </div>

  <div class="sc-wrap">
    <div id="scLoading" class="sc-loading">جاري التحميل…</div>

    <div id="scContent" style="display:none">
      <div class="sc-main-card">
        <!-- Cover -->
        <div class="sc-cover" id="scCover"></div>

        <!-- Profile row: avatar+QR (right) | info (left) -->
        <div class="sc-prof-row">
          <div class="sc-ava-col">
            <div class="sc-avatar-wrap" id="scAvatarWrap">
              <div class="sc-avatar" id="scAvatar"><i data-lucide="user" class="ico-lg"></i></div>
            </div>
            <div class="sc-qr" id="scQr"></div>
          </div>
          <div class="sc-info">
            <div class="sc-name-row">
              <span class="sc-verified" id="scVerified" style="display:none"><i data-lucide="badge-check" class="ico-sm"></i></span>
              <span class="sc-name" id="scName">—</span>
            </div>
            <div class="sc-title" id="scTitle"></div>
            <div class="sc-bio" id="scBio"></div>
            <button class="sc-bio-more" id="scBioMore" style="display:none" onclick="toggleBio()">عرض المزيد ▾</button>
            <div class="sc-meta-row">
              <span class="sc-loc" id="scLoc"></span>
              <span class="sc-age" id="scAge" style="display:none"></span>
            </div>
            <div class="sc-link-row" id="scLinkRow">
              <i data-lucide="link" class="ico-sm"></i>
              <span class="sc-link-text" id="scLinkText"></span>

              <button class="sc-link-copy" id="scLinkCopy" title="نسخ الرابط">
                <i data-lucide="copy" class="ico-sm"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="sc-actions">
          <button class="sc-btn sc-btn-primary" id="scFollowBtn"><i data-lucide="user-plus" class="ico-sm"></i> متابعة</button>
          <button class="sc-btn sc-btn-ghost" id="scContactBtn"><i data-lucide="message-circle" class="ico-sm"></i> تواصل معي</button>
          <button class="sc-btn sc-btn-ghost" id="scFullBtn"><i data-lucide="file-text" class="ico-sm"></i> الملف</button>
        </div>

        <!-- Stats: 5 cells RTL order: الشهادات ← القوة ← المشاهدات ← المتابعون ← الخبرات -->
        <div class="sc-stats">
          <div class="sc-stat">
            <i data-lucide="graduation-cap" class="ico sc-stat-i" style="color:#f59e0b"></i>
            <div class="sc-stat-n" id="scStatEdu">—</div>
            <div class="sc-stat-l">الشهادات</div>
          </div>
          <div class="sc-stat">
            <i data-lucide="trending-up" class="ico sc-stat-i" style="color:#00c896"></i>
            <div class="sc-stat-n" id="scStatScore">—</div>
            <div class="sc-stat-l">القوة</div>
          </div>
          <div class="sc-stat">
            <i data-lucide="eye" class="ico sc-stat-i" style="color:#2563ff"></i>
            <div class="sc-stat-n" id="scStatViews">—</div>
            <div class="sc-stat-l">المشاهدات</div>
          </div>
          <div class="sc-stat">
            <i data-lucide="users" class="ico sc-stat-i" style="color:#8b5cf6"></i>
            <div class="sc-stat-n" id="scStatFollowers">—</div>
            <div class="sc-stat-l">المتابعون</div>
          </div>
          <div class="sc-stat">
            <i data-lucide="briefcase" class="ico sc-stat-i" style="color:#f97316"></i>
            <div class="sc-stat-n" id="scStatExp">—</div>
            <div class="sc-stat-l">الخبرات</div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="sc-tabs">
          <button class="sc-tab active" data-tab="about" onclick="scTab('about',this)"><i data-lucide="user-round" class="ico-sm"></i> نبذة عني</button>
          <button class="sc-tab" data-tab="skills" onclick="scTab('skills',this)"><i data-lucide="zap" class="ico-sm"></i> المهارات</button>
          <button class="sc-tab" data-tab="exp" onclick="scTab('exp',this)"><i data-lucide="briefcase" class="ico-sm"></i> الخبرات</button>
          <button class="sc-tab" data-tab="edu" onclick="scTab('edu',this)"><i data-lucide="graduation-cap" class="ico-sm"></i> الشهادات</button>
        </div>

        <!-- Tab content -->
        <div class="sc-content">
          <div class="sc-pane active" id="pane-about">
            <div class="sc-about-card">
              <div class="sc-about-title"><i data-lucide="user-round" class="ico-sm"></i> نبذة عني</div>
              <div class="sc-bio-text" id="scAboutText"></div>
            </div>
          </div>
          <div class="sc-pane" id="pane-skills"><div class="sc-skills" id="scSkillsPane"></div></div>
          <div class="sc-pane" id="pane-exp"><div id="scExpPane"></div></div>
          <div class="sc-pane" id="pane-edu"><div id="scEduPane"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="sc-toast" id="scToast"></div>

  <script src="/tw_shared.js"></script>
  <script src="/static/profile-v2.state.js"></script>
  <script src="/static/profile-v2.utils.js"></script>
  <script src="/static/profile-v2.api.js"></script>
  <script src="/static/profile-v2.render.js"></script>
  <script>
  // ── Edit Profile Modal — Phase 1: profession + bio only ──
  (function(){
    var overlay   = document.getElementById('epOverlay');
    var closeBtn  = document.getElementById('epClose');
    var cancelBtn = document.getElementById('epCancelBtn');
    var saveBtn   = document.getElementById('epSaveBtn');
    var editBtn   = document.getElementById('scEditProfileBtn');
    var errEl     = document.getElementById('epErr');

    if(!overlay || !editBtn) return;

    function openModal(){
      var p = window._scProfile || {};

      // Pre-populate bio
      var bioEl = document.getElementById('epBio');
      if(bioEl) bioEl.value = p.bio || '';

      // Fetch professions — pre-select current if any
      var profEl = document.getElementById('epProfession');
      if(profEl){
        profEl.innerHTML = '<option value="">جاري التحميل…</option>';
        getProfessions()
          .then(function(list){
            var groups = {};
            list.forEach(function(pr){
              var g = pr.category_group || 'أخرى';
              if(!groups[g]) groups[g] = [];
              groups[g].push(pr);
            });
            var html = '<option value="">— اختر التخصص —</option>';
            Object.keys(groups).forEach(function(g){
              html += '<optgroup label="' + g + '">';
              groups[g].forEach(function(pr){
                var sel = (p.profession && p.profession.id === pr.id) ? ' selected' : '';
                html += '<option value="' + pr.id + '"' + sel + '>' + pr.name_ar + '</option>';
              });
              html += '</optgroup>';
            });
            profEl.innerHTML = html;
            if(window.lucide && lucide.createIcons) lucide.createIcons();
          })
          .catch(function(){ profEl.innerHTML = '<option value="">تعذّر تحميل التخصصات</option>'; });
      }

      if(errEl) errEl.style.display = 'none';
      overlay.classList.add('open');
      if(window.lucide && lucide.createIcons) lucide.createIcons();
    }

    function closeModal(){
      overlay.classList.remove('open');
    }

    editBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', function(e){ if(e.target === overlay) closeModal(); });

    saveBtn.addEventListener('click', function(){
      // Use numeric user id from API response — never trust URL param alone
      var uid = window._scUserId;
      if(!uid){ if(errEl){ errEl.textContent = 'خطأ: لم يتم التعرف على المستخدم'; errEl.style.display = 'block'; } return; }

      var profEl = document.getElementById('epProfession');
      var profVal = profEl ? profEl.value : '';
      var bioVal  = (document.getElementById('epBio').value || '').trim();

      var payload = {};
      if(profVal) payload.profession_id = parseInt(profVal, 10);
      payload.bio = bioVal;

      if(errEl) errEl.style.display = 'none';
      saveBtn.disabled = true;
      saveBtn.textContent = 'جاري الحفظ…';

      updateProfile(uid, payload)
      .then(function(res){
        if(!res.ok){
          var msg = (res.data && res.data.detail) ? res.data.detail : 'حدث خطأ أثناء الحفظ';
          if(errEl){ errEl.textContent = msg; errEl.style.display = 'block'; }
          return;
        }
        closeModal();
        if(window.toast) window.toast('تم حفظ التغييرات بنجاح');
        return getProfile(_scProfileKey)
          .then(function(freshRes){
            if(freshRes && window.renderProfile) window.renderProfile(freshRes);
            if(window.lucide && lucide.createIcons) lucide.createIcons();
          });
      })
      .catch(function(){ if(errEl){ errEl.textContent = 'خطأ في الاتصال بالخادم'; errEl.style.display = 'block'; } })
      .finally(function(){ saveBtn.disabled = false; saveBtn.textContent = 'حفظ التغييرات'; });
    });
  })();
  </script>

  <!-- Edit Profile Modal — Phase 1: profession + bio -->
  <div class="ep-overlay" id="epOverlay">
    <div class="ep-sheet">
      <div class="ep-head">
        <span class="ep-title"><i data-lucide="pencil" class="ico-sm" style="color:var(--ac,#00c896);vertical-align:middle;margin-left:6px"></i> تعديل الملف الشخصي</span>
        <button class="ep-close" id="epClose"><i data-lucide="x" class="ico-sm"></i></button>
      </div>
      <div class="ep-body">
        <div class="ep-field">
          <label class="ep-label">التخصص المهني</label>
          <select class="ep-select" id="epProfession">
            <option value="">جاري التحميل…</option>
          </select>
        </div>
        <div class="ep-field">
          <label class="ep-label">نبذة تعريفية</label>
          <textarea class="ep-textarea" id="epBio" placeholder="اكتب نبذة عن نفسك…" maxlength="600"></textarea>
        </div>
        <div class="ep-err" id="epErr"></div>
      </div>
      <div class="ep-footer">
        <button class="ep-cancel" id="epCancelBtn">إلغاء</button>
        <button class="ep-save" id="epSaveBtn">حفظ التغييرات</button>
      </div>
    </div>
  </div>

</body>
</html>
