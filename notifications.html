<style>
/* ── Base ── */
:root {
  --ac:  #00c896;
  --ac2: #2563ff;
  --bg:  #070b18;
  --card: rgba(255,255,255,.03);
  --card-hover: rgba(255,255,255,.05);
  --border: rgba(255,255,255,.07);
  --border-hover: rgba(255,255,255,.12);
  --t:  rgba(255,255,255,.87);
  --t2: rgba(255,255,255,.5);
  --t3: rgba(255,255,255,.27);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--t);
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
}

/* ── Notifications-page header modifier (sticky, same as co-hdr) ── */
.notif-hdr {
  position: sticky;
  top: 0;
}

/* ── Page wrapper ── */
.notif-page {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 16px 100px; /* 100px bottom = bottom-nav height + safe area */
}

/* ── Hero ── */
.notif-hero {
  max-width: 680px;
  margin: 0 auto;
  padding: 14px 16px 10px;
}
.notif-hero-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.notif-title {
  font-size: 1.3rem;
  font-weight: 900;
  letter-spacing: -.3px;
}
.notif-hero-bell {
  color: var(--ac);
  filter: drop-shadow(0 0 7px rgba(0,200,150,.6));
  flex-shrink: 0;
}
.notif-subtitle {
  font-size: .78rem;
  color: var(--t2);
  line-height: 1.4;
}

/* ── Filter tabs — profile-sections style with separators ── */
.notif-tabs-wrap {
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.notif-tabs-wrap::-webkit-scrollbar { display: none; }
.notif-tabs {
  display: flex;
  width: max-content;
  min-width: 100%;
}
.notif-tab {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 10px 14px;
  min-height: 38px;
  color: var(--t2);
  font-family: 'Cairo', sans-serif;
  font-size: .75rem;
  font-weight: 700;
  cursor: pointer;
  border: none;
  background: none;
  position: relative;
  white-space: nowrap;
  flex-shrink: 0;
  transition: color .15s;
  border-inline-end: 1px solid var(--border);
}
.notif-tab:last-child { border-inline-end: none; }
.notif-tab:hover { color: var(--t); }
.notif-tab.active { color: var(--ac); }
.notif-tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  inset-inline-start: 0;
  inset-inline-end: 0;
  height: 2px;
  background: var(--ac);
  border-radius: 2px 2px 0 0;
}
.notif-tab svg { flex-shrink: 0; }

/* ── Action bar ── */
.notif-actions {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  margin-bottom: 16px;
}
.notif-markall-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 0;
  border: none;
  background: none;
  color: var(--ac);
  font-family: 'Cairo', sans-serif;
  font-size: .75rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .15s;
}
.notif-markall-btn:hover { opacity: .7; }
.notif-markall-btn:focus-visible {
  outline: 2px solid var(--ac);
  outline-offset: 3px;
  border-radius: 4px;
}
.notif-markall-btn svg { flex-shrink: 0; }

/* ── Notification card ── */
.notif-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color .18s, background .18s;
  position: relative;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
}
.notif-card:hover {
  border-color: var(--border-hover);
  background: var(--card-hover);
}
.notif-card-unread {
  border-color: rgba(0,200,150,.18);
  background: rgba(0,200,150,.025);
}
/* Unread left-edge accent (RTL: right edge) */
.notif-card-unread::after {
  content: '';
  position: absolute;
  top: 14px;
  inset-inline-end: 0;
  width: 3px;
  height: calc(100% - 28px);
  background: var(--ac);
  border-radius: 3px 0 0 3px;
}

/* Notification type icon */
.notif-card-ico {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Card body */
.notif-card-body { flex: 1; min-width: 0; }
.notif-card-title {
  font-size: .82rem;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 3px;
}
.notif-card-sub {
  font-size: .73rem;
  color: var(--t2);
  line-height: 1.4;
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.notif-card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
}
.notif-card-time {
  font-size: .65rem;
  color: var(--t3);
}
.notif-card-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--ac);
  flex-shrink: 0;
}

/* Group label */
.notif-group-lbl {
  font-size: .67rem;
  font-weight: 800;
  color: var(--t3);
  letter-spacing: 1.4px;
  text-transform: uppercase;
  margin: 8px 0 10px 0;
  padding-inline-end: 4px;
}

/* ── Empty state ── */
.notif-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 64px 24px 40px;
  gap: 14px;
}
.notif-empty-icon {
  width: 72px;
  height: 72px;
  border-radius: 22px;
  background: rgba(0,200,150,.07);
  border: 1.5px solid rgba(0,200,150,.15);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ac);
  box-shadow: 0 0 28px rgba(0,200,150,.09);
}
.notif-empty-title {
  font-size: .95rem;
  font-weight: 800;
}
.notif-empty-sub {
  font-size: .78rem;
  color: var(--t2);
  line-height: 1.6;
  max-width: 280px;
}

/* ── Skeleton ── */
@keyframes tw-shimmer {
  0%   { background-position: -1000px 0 }
  100% { background-position:  1000px 0 }
}
.tw-skeleton {
  background: linear-gradient(90deg,
    rgba(255,255,255,.04) 25%,
    rgba(255,255,255,.09) 50%,
    rgba(255,255,255,.04) 75%);
  background-size: 2000px 100%;
  animation: tw-shimmer 1.5s infinite linear;
  border-radius: 14px;
}

/* ── Bottom navigation ── */
.notif-bnav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(7,11,24,.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 8px 0 env(safe-area-inset-bottom, 6px);
  justify-content: space-around;
}
.notif-bn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  padding: 5px 12px;
  text-decoration: none;
  color: var(--t3);
  font-family: 'Cairo', sans-serif;
  border: none;
  background: none;
  transition: color .15s;
  min-width: 52px;
}
.notif-bn-lbl {
  font-size: .57rem;
  font-weight: 700;
}
.notif-bn.active { color: var(--ac); }
.notif-bn:hover  { color: var(--t2); }

@media (max-width: 600px) {
  .notif-bnav { display: flex; }
  .notif-page { padding-bottom: calc(68px + env(safe-area-inset-bottom, 8px) + 16px); }
}

/* ── Toast ── */
.tw-toast[aria-live="polite"] {
  position: fixed;
  bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(7,11,24,.97);
  border: 1px solid rgba(255,255,255,.1);
  backdrop-filter: blur(20px);
  border-radius: 14px;
  padding: 12px 20px;
  display: flex; align-items: center; gap: 10px;
  font-size: .82rem; font-family: Cairo, sans-serif;
  color: rgba(255,255,255,.92);
  opacity: 0;
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
  z-index: 9999; white-space: nowrap;
  min-width: 180px; justify-content: center;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
}
.tw-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.tw-toast.success { border-color: rgba(0,200,150,.3); }
.tw-toast.error   { border-color: rgba(239,68,68,.3); }
.tw-toast.info    { border-color: rgba(37,99,255,.3); }

/* Scroll progress */
.tw-scroll-prog {
  position: fixed; top: 0; left: 0;
  height: 2px; z-index: 999;
  background: linear-gradient(90deg, var(--ac), var(--ac2));
  transition: width .1s; width: 0;
}

/* Skip link */
.skip-link {
  position: absolute; top: -40px; right: 0;
  background: var(--ac); color: #0d1a2e;
  padding: 8px 16px; border-radius: 0 0 8px 0;
  font-family: Cairo,sans-serif; font-size: .8rem; font-weight: 700;
  text-decoration: none; transition: top .2s; z-index: 10000;
}
.skip-link:focus { top: 0; }
</style>

<script>
/* ── Auth guard ── */
var _user = null;
try { _user = JSON.parse(localStorage.getItem('tw_user')); } catch(e) {}
if (!_user || !_user.id) { window.location.href = '/login'; }

/* ── Init lucide icons for header ── */
if (window.lucide) lucide.createIcons();

/* ── Menu toggle (same pattern as company-profile.html) ── */
(function(){
  var btn = document.getElementById('ntMenuBtn');
  var dd  = document.getElementById('ntMenuDropdown');
  if (!btn || !dd) return;
  btn.addEventListener('click', function(e){
    e.stopPropagation();
    dd.classList.toggle('open');
  });
  document.addEventListener('click', function(){
    dd.classList.remove('open');
  });
})();

/* ── Logout (data-ah-logout, same pattern as app-header.js) ── */
document.querySelectorAll('[data-ah-logout]').forEach(function(b){
  b.addEventListener('click', function(){
    try {
      Object.keys(localStorage).filter(function(k){ return k.startsWith('tw_'); })
        .forEach(function(k){ localStorage.removeItem(k); });
    } catch(e) {}
    location.replace('/login');
  });
});

/* ── Dynamic profile link in bottom nav ── */
(function(){
  var bnProfile = document.getElementById('bnProfile');
  if (!bnProfile || !_user) return;
  if (_user.user_type === 'co') {
    bnProfile.href = _user.tw_id ? '/u/' + _user.tw_id : '/company-profile';
  } else if (_user.user_type === 'edu') {
    bnProfile.href = _user.tw_id ? '/u/' + _user.tw_id : '/edu-profile';
  } else {
    bnProfile.href = _user.tw_id ? '/u/' + _user.tw_id : '/profile';
  }
})();

/* ── Toast ── */
var _twToast = null;
function showToast(msg, type, dur) {
  type = type || 'success'; dur = dur || 2800;
  if (_twToast) { _twToast.remove(); }
  var t = document.createElement('div');
  t.setAttribute('aria-live', 'polite');
  t.className = 'tw-toast ' + type;
  var icoSvg = type === 'success'
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00c896" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
    : type === 'error'
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="1" fill="#2563ff"/></svg>';
  var icoEl = document.createElement('span');
  icoEl.innerHTML = icoSvg; /* SVG string — not API data */
  var msgEl = document.createElement('span');
  msgEl.textContent = msg;
  t.appendChild(icoEl);
  t.appendChild(msgEl);
  document.body.appendChild(t);
  _twToast = t;
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){ t.classList.add('show'); });
  });
  setTimeout(function(){
    t.classList.remove('show');
    setTimeout(function(){ if (t.parentNode) t.remove(); }, 350);
  }, dur);
}

/* ── Scroll progress ── */
(function(){
  var p = document.createElement('div');
  p.className = 'tw-scroll-prog';
  document.body.prepend(p);
  window.addEventListener('scroll', function(){
    var pct = window.scrollY / Math.max(1, document.body.scrollHeight - window.innerHeight) * 100;
    p.style.width = Math.min(pct, 100) + '%';
  });
})();

/* ════════════════════════════════════════════════════════════
   NOTIFICATION SYSTEM — V1
   Security rules enforced:
     - JWT Bearer only
     - textContent for all API data — no innerHTML on API strings
     - Link validation — / prefix only
     - No WebSocket, no push, no fake data
   ════════════════════════════════════════════════════════════ */

function _notifJwt() { return localStorage.getItem('tw_jwt') || ''; }

/* ── Inline SVG icons for notification type cards — not CDN, not emoji ── */
var _NOTIF_ICONS = {
  job: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>',
  comment: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
  mention: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/></svg>',
  follow: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>',
  verify: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>',
  bell: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>'
};

/* Filter groups — maps tab data-filter to notification type values */
var _filterGroups = {
  job:     ['job', 'job_applied'],
  comment: ['comment', 'reply', 'mention'],
  follow:  ['follow'],
  verify:  ['verify', 'kyc', 'verify_approved', 'verify_rejected']
};

/* Type-to-visual mapping — no emoji, color + SVG icon only */
var _typeMap = {
  comment:  { ico: _NOTIF_ICONS.comment, bg: 'rgba(37,99,255,.12)',   color: '#2563ff',   filter: 'comment', label: 'تعليق' },
  reply:    { ico: _NOTIF_ICONS.comment, bg: 'rgba(37,99,255,.12)',   color: '#2563ff',   filter: 'comment', label: 'رد' },
  mention:  { ico: _NOTIF_ICONS.mention, bg: 'rgba(139,92,246,.12)', color: '#8b5cf6',   filter: 'comment', label: 'ذكر' },
  job:      { ico: _NOTIF_ICONS.job,     bg: 'rgba(0,200,150,.12)',   color: '#00c896',   filter: 'job',     label: 'وظيفة' },
  job_applied: { ico: _NOTIF_ICONS.job,  bg: 'rgba(0,200,150,.12)',   color: '#00c896',   filter: 'job',     label: 'تقديم وظيفة' },
  follow:   { ico: _NOTIF_ICONS.follow,  bg: 'rgba(236,72,153,.12)', color: '#ec4899',   filter: 'follow',  label: 'متابعة' },
  verify:   { ico: _NOTIF_ICONS.verify,  bg: 'rgba(0,200,150,.12)',   color: '#00c896',   filter: 'verify',  label: 'توثيق' },
  kyc:      { ico: _NOTIF_ICONS.verify,  bg: 'rgba(0,200,150,.12)',   color: '#00c896',   filter: 'verify',  label: 'توثيق' },
  system:   { ico: _NOTIF_ICONS.bell,    bg: 'rgba(255,255,255,.07)', color: 'rgba(255,255,255,.6)', filter: 'system', label: 'إشعار' }
};

/* ── Build a notification card DOM node — all API text via textContent ── */
function _buildNotifCard(n) {
  var t = _typeMap[n.type] || _typeMap.system;
  /* Relative time */
  var ago = Math.floor((Date.now() - new Date(n.created_at)) / 60000);
  var agoStr = ago < 1 ? 'الآن'
    : ago < 60 ? ago + ' د'
    : ago < 1440 ? Math.floor(ago / 60) + ' س'
    : Math.floor(ago / 1440) + ' ي';
  /* Link validation — only relative paths starting with / */
  var link = (n.link && /^\//.test(n.link)) ? n.link : '';

  var card = document.createElement('div');
  card.className = 'notif-card' + (n.is_read ? '' : ' notif-card-unread');
  card.dataset.type = n.type || 'system';
  card.dataset.filterGroup = t.filter;
  if (link) card.dataset.link = link;

  /* Icon */
  var ico = document.createElement('div');
  ico.className = 'notif-card-ico';
  ico.style.background = t.bg;
  ico.style.color = t.color;
  ico.innerHTML = t.ico; /* SVG string from _typeMap — not API data */
  card.appendChild(ico);

  /* Body */
  var body = document.createElement('div');
  body.className = 'notif-card-body';

  var titleEl = document.createElement('div');
  titleEl.className = 'notif-card-title';
  titleEl.textContent = String(n.title || t.label); /* API data via textContent */
  body.appendChild(titleEl);

  if (n.body) {
    var subEl = document.createElement('div');
    subEl.className = 'notif-card-sub';
    subEl.textContent = String(n.body).slice(0, 80); /* API data via textContent */
    body.appendChild(subEl);
  }

  var metaEl = document.createElement('div');
  metaEl.className = 'notif-card-meta';

  var timeEl = document.createElement('span');
  timeEl.className = 'notif-card-time';
  timeEl.textContent = agoStr;
  metaEl.appendChild(timeEl);

  if (!n.is_read) {
    var dot = document.createElement('span');
    dot.className = 'notif-card-dot';
    dot.setAttribute('aria-label', 'غير مقروء');
    metaEl.appendChild(dot);
  }

  body.appendChild(metaEl);
  card.appendChild(body);

  return card;
}

/* ── Filter tabs logic ── */
function filterNotifs(filterVal) {
  document.querySelectorAll('.notif-tab').forEach(function(t) {
    var isActive = t.dataset.filter === filterVal;
    t.classList.toggle('active', isActive);
    t.setAttribute('aria-selected', isActive ? 'true' : 'false');
  });
  document.querySelectorAll('.notif-card').forEach(function(card) {
    var group = card.dataset.filterGroup || 'system';
    var groups = _filterGroups[filterVal];
    var show = filterVal === 'all' || (groups && groups.indexOf(card.dataset.type) >= 0);
    card.style.display = show ? '' : 'none';
  });
}

/* Attach tab click handlers */
document.querySelectorAll('.notif-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    filterNotifs(tab.dataset.filter);
  });
});

/* ── Empty state (SVG bell, no emoji) ── */
function _renderEmpty() {
  var empty = document.createElement('div');
  empty.className = 'notif-empty';

  var iconWrap = document.createElement('div');
  iconWrap.className = 'notif-empty-icon';
  iconWrap.innerHTML = _NOTIF_ICONS.bell; /* SVG — not API data */

  var title = document.createElement('div');
  title.className = 'notif-empty-title';
  title.textContent = 'لا توجد إشعارات حالياً';

  var sub = document.createElement('div');
  sub.className = 'notif-empty-sub';
  sub.textContent = 'ستظهر هنا التحديثات المهمة عند وصولها';

  empty.appendChild(iconWrap);
  empty.appendChild(title);
  empty.appendChild(sub);
  return empty;
}

/* ── Load notifications — JWT Bearer only ── */
function loadRealNotifications() {
  if (!_user || !_user.id) return;
  var jwt = _notifJwt();
  var dyn = document.getElementById('dynamicNotifs');
  if (dyn) {
    dyn.textContent = '';
    var sk1 = document.createElement('div');
    sk1.className = 'tw-skeleton';
    sk1.style.cssText = 'height:72px;margin-bottom:8px';
    var sk2 = document.createElement('div');
    sk2.className = 'tw-skeleton';
    sk2.style.cssText = 'height:72px;margin-bottom:8px';
    var sk3 = document.createElement('div');
    sk3.className = 'tw-skeleton';
    sk3.style.height = '72px';
    dyn.appendChild(sk1);
    dyn.appendChild(sk2);
    dyn.appendChild(sk3);
  }

  /* Authorization Bearer JWT only */
  fetch('/notifications/' + _user.id, {
    headers: { 'Authorization': 'Bearer ' + jwt }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var notifs = data.notifications || [];
    var unread = data.unread || 0;
    var container = document.getElementById('dynamicNotifs');
    if (!container) return;

    /* Filter out message-type — shown in /messages instead */
    notifs = notifs.filter(function(n) {
      return n.type !== 'message' && !(n.link && n.link.startsWith('/messages'));
    });

    container.textContent = '';

    if (!notifs.length) {
      container.appendChild(_renderEmpty());
      return;
    }

    var lbl = document.createElement('div');
    lbl.className = 'notif-group-lbl';
    lbl.textContent = 'الإشعارات' + (unread > 0 ? ' — ' + unread + ' جديد' : '');
    container.appendChild(lbl);

    notifs.slice(0, 20).forEach(function(n) {
      container.appendChild(_buildNotifCard(n));
    });

    /* Click-to-navigate — event delegation, link validated in _buildNotifCard */
    container.addEventListener('click', function(e) {
      var card = e.target.closest('.notif-card[data-link]');
      if (card) {
        var lnk = card.dataset.link;
        if (lnk && /^\//.test(lnk)) window.location.href = lnk;
      }
    });

    /* Auto-mark all as read after viewing */
    if (unread > 0) {
      fetch('/notifications/' + _user.id + '/read', {
        method: 'PUT',
        headers: { 'Authorization': 'Bearer ' + jwt }
      }).catch(function() {});
    }
  })
  .catch(function() {
    var container = document.getElementById('dynamicNotifs');
    if (container) {
      container.textContent = '';
      container.appendChild(_renderEmpty());
    }
  });
}

/* ── Load job applications as secondary source ── */
function loadJobApplications() {
  if (!_user || !_user.id) return;
  var jwt = _notifJwt();
  var statusMap = {
    pending:  'قيد المراجعة',
    viewed:   'تم عرض طلبك',
    accepted: 'تم قبولك',
    rejected: 'تم رفض طلبك'
  };
  fetch('/my/applications', {
    headers: { 'Authorization': 'Bearer ' + jwt }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var apps = data.applications || [];
    if (!apps.length) return;
    var container = document.getElementById('dynamicNotifs');
    if (!container) return;

    /* Remove empty state if it was shown */
    var existing = container.querySelector('.notif-empty');
    if (existing) existing.remove();

    var lbl = document.createElement('div');
    lbl.className = 'notif-group-lbl';
    lbl.textContent = 'طلبات التوظيف';
    container.appendChild(lbl);

    apps.slice(0, 5).forEach(function(a) {
      var isNew = a.status !== 'pending';
      /* Build a pseudo-notification for job applications */
      var fakeN = {
        type: 'job',
        is_read: !isNew,
        title: String(statusMap[a.status] || a.status || '') + ' — ' + String(a.title || 'وظيفة'),
        body: String(a.company_name || '') + ' · ' + String((a.applied_at || '').slice(0, 10)),
        created_at: a.applied_at || new Date().toISOString(),
        link: ''
      };
      container.appendChild(_buildNotifCard(fakeN));
    });
  })
  .catch(function() {});
}

/* ── Mark all as read — JWT Bearer ── */
function markAll() {
  if (!_user || !_user.id) return;
  var jwt = _notifJwt();
  fetch('/notifications/' + _user.id + '/read', {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + jwt }
  })
  .then(function() {
    document.querySelectorAll('.notif-card-unread').forEach(function(el) {
      el.classList.remove('notif-card-unread');
      var dot = el.querySelector('.notif-card-dot');
      if (dot) dot.remove();
    });
    showToast('تم تحديد الكل كمقروء');
  })
  .catch(function() {
    showToast('تم التحديث');
  });
}

/* ── Bootstrap ── */
loadRealNotifications();
if (typeof loadGlobalBadges === 'function') loadGlobalBadges();
setTimeout(loadJobApplications, 800);

/* Fallback empty state if API returns nothing after timeout */
setTimeout(function() {
  var dyn = document.getElementById('dynamicNotifs');
  if (!dyn) return;
  var hasCards = dyn.querySelector('.notif-card, .notif-empty, .notif-group-lbl');
  if (!hasCards) dyn.appendChild(_renderEmpty());
}, 3500);
</script>
