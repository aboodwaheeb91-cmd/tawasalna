<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="dns-prefetch" href="https://tawasolna.com">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00c896">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="تواصلنا">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تواصلنا - الإشعارات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--ac:#00c896;--ac2:#2563ff;--bg:#070b18;--card:rgba(255,255,255,.03);--border:rgba(255,255,255,.07);--t:rgba(255,255,255,.87);--t2:rgba(255,255,255,.5);--t3:rgba(255,255,255,.27);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--t);font-family:'Cairo',sans-serif;min-height:100vh;}

.nav{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;display:flex;align-items:center;gap:8px;padding:0 14px;background:rgba(7,11,24,.93);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{font-size:1rem;font-weight:900;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-left:auto;cursor:pointer;}
.nb{padding:5px 11px;border-radius:8px;border:none;cursor:pointer;font-family:'Cairo',sans-serif;font-size:.73rem;font-weight:700;transition:all .2s;background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);border:1px solid var(--border);}
.nb:hover{background:rgba(255,255,255,.12);color:var(--t);}

.main{padding:70px 16px 40px;max-width:680px;margin:0 auto;}

/* Header */
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.page-head h1{font-size:1.1rem;font-weight:900;}
.mark-all{font-size:.74rem;color:var(--ac);cursor:pointer;font-weight:700;}
.mark-all:hover{opacity:.8;}

/* Filter tabs */
.ftabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;padding-bottom:3px;}
.ftab{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--t2);font-family:'Cairo',sans-serif;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
.ftab:hover{border-color:rgba(0,200,150,.3);color:var(--t);}
.ftab.active{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border-color:transparent;}

/* Notification groups */
.notif-group{margin-bottom:20px;}
.group-label{font-size:.68rem;font-weight:800;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;padding-right:4px;}

/* Notification item */
.ni{display:flex;gap:12px;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative;}
.ni:hover{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.04);}
.ni.unread{border-color:rgba(0,200,150,.15);background:rgba(0,200,150,.02);}
.ni.unread::before{content:'';position:absolute;top:16px;right:-1px;width:4px;height:calc(100% - 32px);background:var(--ac);border-radius:0 4px 4px 0;}

.ni-ico{width:44px;height:44px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
.ico-job{background:rgba(37,99,255,.12);}
.ico-training{background:rgba(139,92,246,.12);}
.ico-verify{background:rgba(0,200,150,.12);}
.ico-msg{background:rgba(249,115,22,.12);}
.ico-follow{background:rgba(236,72,153,.12);}
.ico-interview{background:rgba(234,179,8,.12);}
.ico-system{background:rgba(255,255,255,.06);}

.ni-body{flex:1;min-width:0;}
.ni-title{font-size:.8rem;font-weight:700;margin-bottom:3px;line-height:1.4;}
.ni-title span{color:var(--ac);}
.ni-sub{font-size:.72rem;color:var(--t2);margin-bottom:5px;line-height:1.4;}
.ni-time{font-size:.63rem;color:var(--t3);}
.ni-actions{display:flex;gap:6px;margin-top:8px;}
.na-btn{padding:5px 12px;border-radius:8px;border:none;font-family:'Cairo',sans-serif;font-size:.7rem;font-weight:700;cursor:pointer;transition:all .2s;}
.na-primary{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;}
.na-ghost{background:rgba(255,255,255,.08);color:var(--t2);}
.na-ghost:hover{background:rgba(255,255,255,.14);color:var(--t);}

/* Interview card */
.interview-card{background:rgba(234,179,8,.05);border:1px solid rgba(234,179,8,.2);border-radius:12px;padding:12px 14px;margin-top:8px;}
.ic-title{font-size:.76rem;font-weight:800;color:#eab308;margin-bottom:6px;}
.ic-details{display:flex;gap:14px;flex-wrap:wrap;}
.ic-item{font-size:.7rem;color:var(--t2);display:flex;align-items:center;gap:4px;}

/* Empty */
.empty{text-align:center;padding:60px 20px;}
.empty .ei{font-size:3rem;margin-bottom:12px;}
.empty p{font-size:.8rem;color:var(--t2);}

/* Bottom nav */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(7,11,24,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0 4px;justify-content:space-around;}
.bn{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 10px;}
.bn .bi{font-size:1.15rem;}
.bn .bl{font-size:.56rem;color:var(--t3);font-weight:700;}
.bn.active .bl{color:var(--ac);}

@media(max-width:600px){.bnav{display:flex;}body{padding-bottom:68px;}}


/* ══ ITQAN - Shared Utilities ══ */
@keyframes tw-shimmer{0%{background-position:-1000px 0}100%{background-position:1000px 0}}
@keyframes tw-spin{to{transform:translateY(-50%) rotate(360deg);}}
@keyframes tw-fadein{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes tw-verified{0%,100%{box-shadow:0 0 0 0 rgba(0,200,150,0);}50%{box-shadow:0 0 0 5px rgba(0,200,150,.15);}}
.tw-toast[aria-live="polite"]{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(7,11,24,.97);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(20px);border-radius:14px;padding:12px 20px;display:flex;align-items:center;gap:10px;font-size:.82rem;font-family:Cairo,sans-serif;color:rgba(255,255,255,.92);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:9999;white-space:nowrap;min-width:180px;justify-content:center;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.tw-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.tw-toast.success{border-color:rgba(0,200,150,.3);}
.tw-toast.error{border-color:rgba(239,68,68,.3);}
.tw-toast.info{border-color:rgba(37,99,255,.3);}
.tw-skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 75%);background-size:2000px 100%;animation:tw-shimmer 1.5s infinite linear;border-radius:8px;}
.tw-btn-loading{position:relative;pointer-events:none;opacity:.8;}
.tw-btn-loading::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;animation:tw-spin .7s linear infinite;right:12px;top:50%;transform:translateY(-50%);}
.tw-scroll-prog{position:fixed;top:0;left:0;height:2px;z-index:999;background:linear-gradient(90deg,var(--ac,#00c896),var(--ac2,#2563ff));transition:width .1s;width:0%;}
.tw-fab{position:fixed;bottom:80px;left:18px;width:50px;height:50px;border-radius:50%;border:none;font-size:1.4rem;background:linear-gradient(135deg,var(--ac,#00c896),var(--ac2,#2563ff));color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(0,200,150,.35);transition:all .25s cubic-bezier(.34,1.56,.64,1);z-index:50;display:flex;align-items:center;justify-content:center;}
.tw-fab:hover{transform:scale(1.12) rotate(90deg);}
.tw-empty{text-align:center;padding:50px 20px;}
.tw-empty-ico{font-size:2.5rem;margin-bottom:12px;opacity:.7;display:block;}
.tw-empty-title{font-size:.95rem;font-weight:800;margin-bottom:6px;}
.tw-empty-sub{font-size:.78rem;color:rgba(255,255,255,.35);margin-bottom:18px;line-height:1.6;}
.tw-empty-btn{padding:10px 22px;border-radius:12px;background:linear-gradient(135deg,var(--ac,#00c896),var(--ac2,#2563ff));border:none;color:#fff;font-family:Cairo,sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;}
.tw-card-lift{transition:transform .2s,box-shadow .2s;}
.tw-card-lift:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.tw-verified{animation:tw-verified 2.5s ease-in-out infinite;}

</style>
<style>.skip-link{position:absolute;top:-40px;right:0;background:var(--ac,#00c896);color:#0d1a2e;padding:8px 16px;border-radius:0 0 8px 0;font-family:Cairo,sans-serif;font-size:.8rem;font-weight:700;text-decoration:none;transition:top .2s;z-index:10000}.skip-link:focus{top:0}</style><a href="#main-content" class="skip-link">تخطى للمحتوى الرئيسي</a><link rel="stylesheet" href="/static/tw_shared.css">
</head>
<body>

<!-- ██ NAVBAR SECTION ██ -->
<nav class="nav">
  <button class="nb" onclick="goHome()">← رجوع</button>
  <div class="nav-logo"><img src="https://wrxvmdmknhoufoeprpoc.supabase.co/storage/v1/object/public/site/Logo.svg" alt="تواصلنا" style="height:36px;width:auto;object-fit:contain;display:block"></div>
</nav>

<div class="main" role="main" id="main-content">
  <div class="page-head">
    <h1>🔔 الإشعارات</h1>
    <span class="mark-all" onclick="markAll()">تحديد الكل كمقروء</span>
  </div>

  <div class="ftabs">
    <button class="ftab active" onclick="filterNotifs('all',this)">الكل</button>
    <button class="ftab" onclick="filterNotifs('job',this)">💼 وظائف</button>
    <button class="ftab" onclick="filterNotifs('interview',this)">📅 مقابلات</button>
    <button class="ftab" onclick="filterNotifs('training',this)">🎓 تدريب</button>
    <button class="ftab" onclick="filterNotifs('verify',this)">✅ توثيق</button>
    <button class="ftab" onclick="filterNotifs('msg',this)">💬 رسائل</button>
  </div>

  <!-- Notifications loaded from DB only -->
  <div id="dynamicNotifs" style="margin-bottom:8px"><div class="tw-skeleton" style="height:64px;margin-bottom:8px"></div><div class="tw-skeleton" style="height:64px"></div></div>

</div>

<!-- BOTTOM NAV -->
<div class="bnav">
  <div class="bn" onclick="goHome()"><span class="bi">🏠</span><span class="bl">الرئيسية</span></div>
  <div class="bn"><span class="bi">💼</span><span class="bl">وظائف</span></div>
  <div class="bn"><span class="bi">👤</span><span class="bl">ملفي</span></div>
  <div class="bn active" style="position:relative"><span class="bi">🔔</span><span class="bl">إشعارات</span></div>
  <div class="bn" onclick="location.href='/messages'" style="position:relative"><span class="bi">💬</span><span class="bl">رسائل</span><span data-badge="msgs" style="display:none;position:absolute;top:4px;right:4px;background:#2563ff;color:#fff;border-radius:50%;width:14px;height:14px;font-size:.5rem;font-weight:700;line-height:14px;text-align:center"></span></div>
</div>

<script src="/tw_shared.js"></script>
<script>
let _user = null;
try { _user = JSON.parse(localStorage.getItem('tw_user')); } catch(e){}
if(!_user || !_user.id){ window.location.href = '/'; }

function filterNotifs(type, el){
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  // Filter notif items
  document.querySelectorAll('.ni').forEach(function(ni){
    if(type==='all'||ni.dataset.type===type){
      ni.style.display='';
    } else {
      ni.style.display='none';
    }
  });
  document.querySelectorAll('.ni').forEach(n => {
    n.style.display = (type === 'all' || n.dataset.type === type) ? '' : 'none';
  });
}

function markAll(){
  document.querySelectorAll('.ni.unread').forEach(n => {
    n.classList.remove('unread');
    n.querySelector('::before');
  });
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('unread'));
}

function goHome(){
  let u=null;
  try{u=JSON.parse(localStorage.getItem('tw_user'));}catch(e){}
  if(!u){ window.location.href='/'; return; }
  const dest = u.user_type==='co' ? 'company-profile.html?id='+u.id
             : u.user_type==='edu' ? 'edu-profile.html?id='+u.id
             : 'home.html';
  window.location.href = dest;
}

// ── Load real notifications from job applications ──
(function(){
  if(!_user||!_user.id) return;
  // Load job applications as notifications
  fetch('/my/applications', {headers:{'X-User-Id':_user.id}})
  .then(function(r){return r.json();})
  .then(function(data){
    const apps = data.applications||[];
    if(!apps.length) return;
    const container = document.getElementById('dynamicNotifs');
    if(!container) return;
    const statusMap={pending:'⏳ قيد المراجعة',viewed:'👁 تم عرض طلبك',accepted:'✅ تم قبول طلبك',rejected:'❌ تم رفض طلبك'};
    const statusColor={pending:'rgba(255,255,255,.1)',viewed:'rgba(37,99,255,.1)',accepted:'rgba(0,200,150,.1)',rejected:'rgba(239,68,68,.1)'};
    container.innerHTML='<div class="group-label">طلبات التوظيف</div>'
      +apps.slice(0,5).map(function(a){
        var isNew=a.status!=='pending';
        return '<div class="ni '+(isNew?'unread':'')+'" data-type="job" style="border-right:3px solid '+(isNew?'var(--ac)':'transparent')+'">'
          +'<div class="ni-ico" style="background:'+statusColor[a.status]+'">💼</div>'
          +'<div class="ni-body">'
          +'<div class="ni-title">'+statusMap[a.status]+' - '+(a.title||'وظيفة')+'</div>'
          +'<div class="ni-sub">'+(a.company_name||'')+' · '+(a.applied_at||'').slice(0,10)+'</div>'
          +'</div></div>';
      }).join('');
  }).catch(function(){});
})();



// ══ ITQAN Utilities ══
var _twToast=null;
function showToast(msg,type,dur){
  type=type||'success';dur=dur||2800;
  if(_twToast){_twToast.remove();}
  var t=document.createElement('div');
  t.className='tw-toast '+type;
  var ico=type==='success'?'✅':type==='error'?'❌':'ℹ️';
  t.innerHTML='<span>'+ico+'</span><span>'+msg+'</span>';
  document.body.appendChild(t);
  _twToast=t;
  requestAnimationFrame(function(){requestAnimationFrame(function(){t.classList.add('show');});});
  setTimeout(function(){t.classList.remove('show');setTimeout(function(){if(t.parentNode)t.remove();},350);},dur);
}
function setBtnLoad(btn,loading){
  if(!btn)return;
  if(loading){btn.classList.add('tw-btn-loading');btn._orig=btn.textContent;btn.textContent='';btn.disabled=true;}
  else{btn.classList.remove('tw-btn-loading');btn.textContent=btn._orig||'حفظ';btn.disabled=false;}
}
function twNavigate(url){
  document.body.style.cssText='opacity:0;transform:translateY(-6px);transition:all .2s ease;';
  setTimeout(function(){window.location.href=url;},180);
}
function initScrollProg(){
  var p=document.createElement('div');p.className='tw-scroll-prog';
  document.body.prepend(p);
  window.addEventListener('scroll',function(){
    var pct=window.scrollY/(document.body.scrollHeight-window.innerHeight)*100;
    p.style.width=Math.min(pct,100)+'%';
  });
}


// ══ Real Notifications System ══
function loadRealNotifications(){
  if(!_user||!_user.id) return;
  var dyn=document.getElementById('dynamicNotifs');
  if(dyn) dyn.innerHTML='<div class="tw-skeleton" style="height:64px;margin-bottom:8px"></div><div class="tw-skeleton" style="height:64px"></div>';

  fetch('/notifications/'+_user.id)
  .then(function(r){return r.json();}).then(function(data){
    var notifs=data.notifications||[];
    var unread=data.unread||0;
    var container=document.getElementById('dynamicNotifs');
    if(!container) return;

    if(!notifs.length){
      container.innerHTML='';
      return;
    }

    var typeMap={
      message:{ico:'💬',color:'rgba(37,99,255,.1)',label:'رسالة'},
      job:{ico:'💼',color:'rgba(0,200,150,.1)',label:'وظيفة'},
      verify:{ico:'✅',color:'rgba(0,200,150,.1)',label:'توثيق'},
      kyc:{ico:'🪪',color:'rgba(0,200,150,.1)',label:'KYC'},
      system:{ico:'🔔',color:'rgba(255,255,255,.05)',label:'إشعار'}
    };

    var html='<div class="group-label">الإشعارات الحديثة'+(unread>0?' ('+unread+' جديد)':'')+'</div>';
    html+=notifs.slice(0,10).map(function(n){
      var t=typeMap[n.type]||typeMap.system;
      var ago=Math.floor((Date.now()-new Date(n.created_at))/60000);
      var agoStr=ago<1?'الآن':ago<60?ago+' د':ago<1440?Math.floor(ago/60)+' س':Math.floor(ago/1440)+' ي';
      var linkAttr=n.link?(' data-link="'+n.link+'"'):'';
      return '<div class="ni '+(n.is_read?'':'unread')+'" data-type="'+n.type+'"'+linkAttr+' style="border-right:3px solid '+(n.is_read?'transparent':'var(--ac)')+'">'+
        '<div class="ni-ico" style="background:'+t.color+'">'+t.ico+'</div>'+
        '<div class="ni-body">'+
        '<div class="ni-title">'+(n.title||t.label)+'</div>'+
        '<div class="ni-sub">'+(n.body||'').slice(0,50)+' · '+agoStr+'</div>'+
        '</div></div>';
    }).join('');

    container.innerHTML=html;

    // Click-to-navigate via event delegation
    container.addEventListener('click',function(e){
      var item=e.target.closest('.ni[data-link]');
      if(item){var lnk=item.getAttribute('data-link');if(lnk)window.location.href=lnk;}
    });

    // Mark as read
    if(unread>0){
      fetch('/notifications/'+_user.id+'/read',{method:'PUT'}).catch(function(){});
    }
  }).catch(function(){});
}

// Also load job applications as before
function loadJobApplications(){
  if(!_user||!_user.id) return;
  fetch('/my/applications',{headers:{'X-User-Id':_user.id}})
  .then(function(r){return r.json();}).then(function(data){
    var apps=data.applications||[];
    if(!apps.length) return;
    var container=document.getElementById('dynamicNotifs');
    if(!container) return;
    var statusMap={pending:'⏳ قيد المراجعة',viewed:'👁 تم عرض طلبك',accepted:'✅ تم قبولك',rejected:'❌ تم رفض طلبك'};
    var existing=container.innerHTML;
    var appsHtml=apps.slice(0,5).map(function(a){
      var isNew=a.status!=='pending';
      return '<div class="ni '+(isNew?'unread':'')+'" data-type="job" style="border-right:3px solid '+(isNew?'var(--ac)':'transparent')+'">'
        +'<div class="ni-ico" style="background:rgba(0,200,150,.1)">💼</div>'
        +'<div class="ni-body">'
        +'<div class="ni-title">'+(statusMap[a.status]||a.status)+' - '+(a.title||'وظيفة')+'</div>'
        +'<div class="ni-sub">'+(a.company_name||'')+' · '+(a.applied_at||'').slice(0,10)+'</div>'
        +'</div></div>';
    }).join('');
    container.innerHTML=existing+appsHtml;
  }).catch(function(){});
}

// Override markAll to use API
function markAll(){
  if(_user&&_user.id){
    fetch('/notifications/'+_user.id+'/read',{method:'PUT'}).then(function(){
      document.querySelectorAll('.ni.unread').forEach(function(el){
        el.classList.remove('unread');
        el.style.borderRightColor='transparent';
      });
      showToast('تم تحديد الكل كمقروء ✅');
    }).catch(function(){
      showToast('تم التحديد ✅');
    });
  }
}

// Load on start
loadRealNotifications();
loadGlobalBadges();
loadJobApplications();


// Add empty state if no notifs
setTimeout(function(){
  var dyn=document.getElementById('dynamicNotifs');
  var groups=document.querySelectorAll('.notif-group,.group-label');
  var hasContent=dyn&&dyn.textContent.trim().length>10;
  if(!hasContent&&groups.length===0){
    if(dyn) dyn.innerHTML='<div class="tw-empty"><span class="tw-empty-ico">🔔</span><div class="tw-empty-title">لا إشعارات جديدة</div><div class="tw-empty-sub">ستظهر هنا إشعاراتك عند توفرها</div></div>';
  }
},2000);

</script>
</body>
</html>
