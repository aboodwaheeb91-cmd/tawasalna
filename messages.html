<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="dns-prefetch" href="https://fonts.gstatic.com">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00c896">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="تواصلنا">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تواصلنا - الرسائل</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/tw_shared.css">
<link rel="stylesheet" href="/static/messages.css?v=v4">
<style>.skip-link{position:absolute;top:-40px;right:0;background:var(--ac,#00c896);color:#0d1a2e;padding:8px 16px;border-radius:0 0 8px 0;font-family:Cairo,sans-serif;font-size:.8rem;font-weight:700;text-decoration:none;transition:top .2s;z-index:10000}.skip-link:focus{top:0}</style>
<a href="#main-content" class="skip-link">تخطى للمحتوى الرئيسي</a>
</head>
<body>

<!-- ── Nav ── -->
<nav class="nav">
  <button class="nb" onclick="goHome()">← رجوع</button>
  <span style="font-size:.82rem;font-weight:700;color:var(--t2)">💬 الرسائل</span>
  <div class="nav-logo">
    <img src="https://wrxvmdmknhoufoeprpoc.supabase.co/storage/v1/object/public/site/Logo.svg"
         alt="تواصلنا" style="height:36px;width:auto;object-fit:contain;display:block">
  </div>
</nav>

<div class="layout" id="main-content">

  <!-- ── Conversations List ── -->
  <div class="conv-list" id="convList">
    <div class="conv-search">
      <input class="cs-input" id="convSearch" placeholder="🔍 بحث في المحادثات...">
    </div>
    <div class="conv-items" id="convItems"></div>
  </div>

  <!-- ── Chat Panel ── -->
  <div class="chat" id="chatArea">

    <div class="chat-head" id="chatHead">
      <button class="ch-btn ch-back" onclick="toggleConvList()" title="قائمة المحادثات">☰</button>
      <div class="ch-ava" id="chatAva">💬</div>
      <div>
        <div class="ch-name" id="chatName">اختر محادثة</div>
        <div class="ch-status" id="chatStatus"></div>
      </div>
      <div class="ch-actions">
        <button class="ch-btn" id="viewProfileBtn" onclick="viewConvProfile()" style="display:none">👤 الملف</button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-chat">
        <span class="ei">💬</span>
        <p>اختر محادثة للبدء</p>
      </div>
    </div>

    <div class="chat-input" id="chatInput" style="display:none">
      <div class="input-wrap">
        <textarea class="msg-input" id="msgInput" placeholder="اكتب رسالتك..." rows="1"
                  onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <span class="attach-btn" title="إرفاق ملف (قريباً)">📎</span>
      </div>
      <button class="send-btn" onclick="doSendMessage()" title="إرسال">➤</button>
    </div>

  </div>
</div>

<script src="/tw_shared.js"></script>
<script src="/static/messages.state.js?v=v4"></script>
<script src="/static/messages.api.js?v=v4"></script>
<script src="/static/messages.ws.js?v=v4"></script>
<script src="/static/messages.render.js?v=v4"></script>
</body>
</html>
