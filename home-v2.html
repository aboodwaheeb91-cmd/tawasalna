<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>الرئيسية — تواصلنا</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap">
<script src="/static/vendor/lucide/lucide.min.js"></script>
<style>
/* reset */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#070b18;color:#e2e8f0;font-family:'Cairo',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5;padding-top:calc(var(--nav) + var(--flt))}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
img{display:block;max-width:100%}
.hidden{display:none!important}

/* vars */
:root{
  --g:#00c896;--b:#2563ff;--p:#8b5cf6;
  --bg:#070b18;--surf:rgba(255,255,255,.04);--surf2:rgba(255,255,255,.07);
  --brd:rgba(255,255,255,.08);--muted:#94a3b8;--text:#e2e8f0;
  --nav:56px;--flt:46px;
}

/* === Top Nav === */
.hw-nav{
  position:fixed;top:0;inset-inline:0;z-index:100;height:var(--nav);
  background:rgba(7,11,24,.93);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--brd);
  display:flex;align-items:center;padding:0 14px;gap:6px;
}
.hw-logo img{height:28px}
.hw-nav-sp{flex:1}
.hw-ni{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:color .15s,background .15s;position:relative;
}
.hw-ni:hover{color:var(--text);background:var(--surf2)}
.hw-ni-dot{
  position:absolute;top:6px;inset-inline-end:6px;
  width:7px;height:7px;border-radius:50%;
  background:var(--g);border:2px solid var(--bg);
}
.hw-av{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;cursor:pointer;
  background:linear-gradient(135deg,var(--g),var(--b));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;color:#fff;
}

/* === Filter Bar === */
.hw-fbar{
  position:fixed;top:var(--nav);inset-inline:0;z-index:90;height:var(--flt);
  background:rgba(7,11,24,.9);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--brd);overflow:hidden;
}
.hw-fbar-inner{
  display:flex;align-items:center;gap:4px;height:100%;padding:0 12px;
  overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;
}
.hw-fbar-inner::-webkit-scrollbar{display:none}
.hw-ft{
  flex-shrink:0;padding:5px 14px;border-radius:20px;
  font-size:13px;font-weight:600;color:var(--muted);
  transition:all .15s;white-space:nowrap;
}
.hw-ft:hover{color:var(--text);background:var(--surf2)}
.hw-ft.active{color:#070b18;background:var(--g)}

/* === Page Layout === */
.hw-page{
  padding:14px 12px 72px;
  display:grid;grid-template-columns:1fr;gap:12px;
}

/* === Type Banner (co/edu) === */
.hw-banner{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  background:var(--surf);border:1px solid var(--brd);border-radius:14px;
  padding:14px 16px;
}
.hw-banner-ico{
  width:40px;height:40px;border-radius:10px;flex-shrink:0;
  background:rgba(0,200,150,.12);color:var(--g);
  display:flex;align-items:center;justify-content:center;
}
.hw-banner-info{flex:1;min-width:0}
.hw-banner-info h3{font-size:15px;font-weight:700;margin-bottom:2px}
.hw-banner-info p{font-size:12px;color:var(--muted)}
.hw-banner-stats{display:flex;gap:20px;flex-shrink:0}
.hw-bstat strong{display:block;font-size:18px;font-weight:700;color:var(--g);text-align:center}
.hw-bstat span{font-size:11px;color:var(--muted);display:block;text-align:center}

/* === Feed === */
.hw-feed{display:flex;flex-direction:column;gap:10px;min-width:0}

/* card base */
.hw-card{
  background:var(--surf);border:1px solid var(--brd);border-radius:14px;
  padding:16px;transition:border-color .15s;
}
.hw-card:hover{border-color:rgba(255,255,255,.14)}

/* job card */
.hw-jhead{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.hw-jlogo{
  width:44px;height:44px;border-radius:10px;flex-shrink:0;
  background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;color:var(--muted);
}
.hw-jinfo{flex:1;min-width:0}
.hw-jtitle{font-size:15px;font-weight:700;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hw-jco{font-size:12px;color:var(--muted)}
.hw-jmeta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.hw-chip{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--muted)}
.hw-chip.g{background:rgba(0,200,150,.12);color:var(--g)}
.hw-jfoot{display:flex;align-items:center;justify-content:space-between}

/* post card */
.hw-phead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hw-pav{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--b),var(--p));
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;
}
.hw-pname{font-size:14px;font-weight:700}
.hw-psub{font-size:11px;color:var(--muted)}
.hw-pbody{
  font-size:13px;line-height:1.7;color:#cbd5e1;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.hw-pfoot{display:flex;gap:16px;margin-top:12px;padding-top:10px;border-top:1px solid var(--brd)}
.hw-pact{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer;transition:color .15s}
.hw-pact:hover{color:var(--g)}

/* question card */
.hw-qhead{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.hw-qico{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:rgba(139,92,246,.15);color:var(--p);
  display:flex;align-items:center;justify-content:center;
}
.hw-qtext{font-size:14px;font-weight:600;line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.hw-qmeta{display:flex;gap:14px;margin-top:8px}
.hw-qm{font-size:11px;color:var(--muted)}

/* course card */
.hw-crhead{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.hw-crthumb{
  width:54px;height:54px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,rgba(37,99,255,.3),rgba(139,92,246,.3));
  display:flex;align-items:center;justify-content:center;color:var(--b);
}
.hw-crtitle{font-size:14px;font-weight:700;margin-bottom:3px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.hw-crprov{font-size:12px;color:var(--muted)}
.hw-crfoot{display:flex;align-items:center;justify-content:space-between;margin-top:10px}

/* suggested card */
.hw-scard{display:flex;align-items:center;gap:12px}
.hw-sav{
  width:46px;height:46px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--g),var(--b));
  display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;
}
.hw-sinfo{flex:1;min-width:0}
.hw-sname{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hw-ssub{font-size:12px;color:var(--muted)}

/* === Skeleton === */
.hw-skl{border-radius:6px;background:rgba(255,255,255,.06);animation:hw-p 1.5s ease infinite}
.hw-skc{border-radius:50%;background:rgba(255,255,255,.06);animation:hw-p 1.5s ease infinite}
.hw-skr{border-radius:8px;background:rgba(255,255,255,.06);animation:hw-p 1.5s ease infinite}
@keyframes hw-p{0%,100%{opacity:.35}50%{opacity:.75}}

/* === Empty State === */
.hw-empty{padding:44px 20px;text-align:center;color:var(--muted)}
.hw-empty-ico{
  width:52px;height:52px;border-radius:50%;background:var(--surf);
  display:flex;align-items:center;justify-content:center;margin:0 auto 12px;
}
.hw-empty h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
.hw-empty p{font-size:13px;line-height:1.6}

/* === Buttons === */
.hw-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 18px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;
}
.hw-btn.g{background:var(--g);color:#070b18}
.hw-btn.g:hover{opacity:.85}
.hw-btn.out{border:1px solid var(--brd);color:var(--muted)}
.hw-btn.out:hover{border-color:var(--g);color:var(--g)}

/* === Sidebar (desktop only) === */
.hw-sidebar{display:none}

/* === Bottom Nav === */
.hw-bnav{
  position:fixed;bottom:0;inset-inline:0;z-index:100;height:60px;
  background:rgba(7,11,24,.95);backdrop-filter:blur(12px);
  border-top:1px solid var(--brd);display:flex;align-items:stretch;
}
.hw-bn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;color:var(--muted);font-size:10px;font-weight:600;transition:color .15s;
}
.hw-bn.active,.hw-bn:hover{color:var(--g)}

/* === Desktop === */
@media(min-width:1020px){
  .hw-page{
    grid-template-columns:1fr 260px;
    grid-template-areas:'feed sidebar';
    max-width:1060px;margin-inline:auto;
    padding:20px 20px 40px;
  }
  .hw-feed{grid-area:feed}
  .hw-sidebar{
    display:flex;flex-direction:column;gap:12px;grid-area:sidebar;
    align-self:start;
    position:sticky;top:calc(var(--nav) + var(--flt) + 16px);
  }
  .hw-bnav{display:none}
  .hw-sb-box{
    background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:14px;
  }
  .hw-sb-hdr{
    font-size:12px;font-weight:700;color:var(--muted);
    margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--brd);
  }
  .hw-sb-lnk{
    display:flex;align-items:center;gap:8px;padding:7px 6px;border-radius:9px;
    font-size:13px;color:var(--muted);transition:all .15s;
  }
  .hw-sb-lnk:hover{color:var(--text);background:var(--surf2)}
  .hw-compl-bar{height:5px;border-radius:3px;background:rgba(255,255,255,.07);margin:8px 0 4px}
  .hw-compl-fill{height:100%;border-radius:3px;background:var(--g);width:0;transition:width .5s}
  .hw-compl-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
}
</style>
</head>
<body>

<!-- Top Nav -->
<nav class="hw-nav">
  <a href="/" class="hw-logo"><img src="/static/33333.svg" height="28" alt="تواصلنا"></a>
  <div class="hw-nav-sp"></div>
  <a href="/messages" class="hw-ni" title="رسائل">
    <i data-lucide="message-square" width="19" height="19"></i>
  </a>
  <a href="/notifications" class="hw-ni" title="إشعارات">
    <i data-lucide="bell" width="19" height="19"></i>
    <span class="hw-ni-dot hidden" id="notifDot"></span>
  </a>
  <button class="hw-ni" id="btnLogout" title="تسجيل الخروج">
    <i data-lucide="log-out" width="19" height="19"></i>
  </button>
  <a id="navAv" href="#" class="hw-av" title="ملفي">?</a>
</nav>

<!-- Filter Bar -->
<div class="hw-fbar">
  <div class="hw-fbar-inner">
    <button class="hw-ft active" data-filter="all">الكل</button>
    <button class="hw-ft" data-filter="jobs">وظائف</button>
    <button class="hw-ft" data-filter="posts">منشورات</button>
    <button class="hw-ft" data-filter="questions">أسئلة</button>
    <button class="hw-ft" data-filter="courses">دورات</button>
    <button class="hw-ft" data-filter="companies">شركات</button>
  </div>
</div>

<!-- Page -->
<div class="hw-page">

  <!-- FEED -->
  <main class="hw-feed">

    <!-- Type banner — co/edu only, hidden by default -->
    <div id="hwBanner" class="hw-banner hidden">
      <div class="hw-banner-ico"><i id="hwBIco" data-lucide="briefcase" width="20" height="20"></i></div>
      <div class="hw-banner-info">
        <h3 id="hwBTitle"></h3>
        <p id="hwBSub"></p>
      </div>
      <div class="hw-banner-stats" id="hwBStats"></div>
    </div>

    <!-- Feed list: skeleton shown in PR A; PR B replaces with real cards via DOM API -->
    <div id="hwFeed">

      <!-- skeleton: job -->
      <div class="hw-card">
        <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:12px">
          <div class="hw-skr" style="width:44px;height:44px;flex-shrink:0"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:7px">
            <div class="hw-skl" style="height:14px;width:62%"></div>
            <div class="hw-skl" style="height:11px;width:38%"></div>
          </div>
        </div>
        <div style="display:flex;gap:7px;margin-bottom:14px">
          <div class="hw-skl" style="height:22px;width:68px;border-radius:12px"></div>
          <div class="hw-skl" style="height:22px;width:52px;border-radius:12px"></div>
          <div class="hw-skl" style="height:22px;width:78px;border-radius:12px"></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="hw-skl" style="height:10px;width:76px"></div>
          <div class="hw-skl" style="height:30px;width:82px;border-radius:20px"></div>
        </div>
      </div>

      <!-- skeleton: post -->
      <div class="hw-card">
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px">
          <div class="hw-skc" style="width:38px;height:38px;flex-shrink:0"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:6px">
            <div class="hw-skl" style="height:13px;width:42%"></div>
            <div class="hw-skl" style="height:10px;width:26%"></div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <div class="hw-skl" style="height:12px;width:100%"></div>
          <div class="hw-skl" style="height:12px;width:88%"></div>
          <div class="hw-skl" style="height:12px;width:72%"></div>
        </div>
      </div>

      <!-- skeleton: course -->
      <div class="hw-card">
        <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:12px">
          <div class="hw-skr" style="width:54px;height:54px;flex-shrink:0"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:7px;padding-top:4px">
            <div class="hw-skl" style="height:14px;width:68%"></div>
            <div class="hw-skl" style="height:11px;width:44%"></div>
            <div class="hw-skl" style="height:11px;width:28%"></div>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="display:flex;gap:7px">
            <div class="hw-skl" style="height:22px;width:58px;border-radius:12px"></div>
            <div class="hw-skl" style="height:22px;width:48px;border-radius:12px"></div>
          </div>
          <div class="hw-skl" style="height:30px;width:94px;border-radius:20px"></div>
        </div>
      </div>

      <!-- skeleton: question -->
      <div class="hw-card">
        <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px">
          <div class="hw-skr" style="width:34px;height:34px;flex-shrink:0;border-radius:9px"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:6px">
            <div class="hw-skl" style="height:13px;width:100%"></div>
            <div class="hw-skl" style="height:13px;width:78%"></div>
          </div>
        </div>
        <div style="display:flex;gap:14px">
          <div class="hw-skl" style="height:10px;width:68px"></div>
          <div class="hw-skl" style="height:10px;width:52px"></div>
        </div>
      </div>

      <!-- skeleton: suggested -->
      <div class="hw-card">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="hw-skc" style="width:46px;height:46px;flex-shrink:0"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:7px">
            <div class="hw-skl" style="height:13px;width:55%"></div>
            <div class="hw-skl" style="height:10px;width:38%"></div>
          </div>
          <div class="hw-skl" style="height:30px;width:74px;border-radius:20px;flex-shrink:0"></div>
        </div>
      </div>

    </div><!-- #hwFeed -->

    <!-- Empty state: hidden in PR A, shown by PR B when API returns empty -->
    <div id="hwEmpty" class="hw-empty hidden">
      <div class="hw-empty-ico"><i data-lucide="rss" width="22" height="22"></i></div>
      <h3>لا يوجد محتوى بعد</h3>
      <p>سيظهر هنا ما يشاركه المتابعون والفرص المقترحة لك</p>
    </div>

  </main>

  <!-- SIDEBAR (desktop only) -->
  <aside class="hw-sidebar">

    <div class="hw-sb-box">
      <div class="hw-sb-hdr">اكتمال الملف الشخصي</div>
      <div class="hw-compl-bar"><div class="hw-compl-fill" id="sbFill"></div></div>
      <div class="hw-compl-row">
        <span>اكتمال الملف</span>
        <span id="sbPct">—</span>
      </div>
      <a id="sbComplLink" href="/profile"
         style="display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:12px;font-weight:700;color:var(--g)">
        <i data-lucide="arrow-left" width="13" height="13"></i>
        تحسين ملفي
      </a>
    </div>

    <div class="hw-sb-box">
      <div class="hw-sb-hdr">روابط سريعة</div>
      <div id="sbLinks"></div>
    </div>

  </aside>

</div><!-- .hw-page -->

<!-- Bottom Nav -->
<nav class="hw-bnav">
  <a href="/preview/home-v2" class="hw-bn active">
    <i data-lucide="home" width="20" height="20"></i>
    الرئيسية
  </a>
  <a id="bnJobs" href="#" class="hw-bn">
    <i id="bnJobsIco" data-lucide="briefcase" width="20" height="20"></i>
    <span id="bnJobsLbl">وظائف</span>
  </a>
  <a id="bnProfile" href="/profile" class="hw-bn">
    <i data-lucide="user" width="20" height="20"></i>
    <span id="bnProfileLbl">ملفي</span>
  </a>
  <a href="/messages" class="hw-bn">
    <i data-lucide="message-square" width="20" height="20"></i>
    رسائل
  </a>
  <a href="/notifications" class="hw-bn">
    <i data-lucide="bell" width="20" height="20"></i>
    إشعارات
  </a>
</nav>

<script>
(function () {
  'use strict';

  /* auth guard */
  var _u = null;
  try { _u = JSON.parse(localStorage.getItem('tw_user') || 'null'); } catch (e) {}
  if (!_u || !_u.id) { location.replace('/login'); return; }

  var type     = _u.user_type || 'emp';
  var fullName = _u.full_name || _u.name || _u.email || 'مستخدم';
  var initial  = fullName.charAt(0).toUpperCase();

  function getProfileUrl(u) {
    return u.tw_id ? '/u/' + u.tw_id : '/profile';
  }

  /* nav avatar */
  var navAv = document.getElementById('navAv');
  if (navAv) {
    navAv.textContent = initial;
    navAv.title = fullName;
    if (type === 'emp')      navAv.href = getProfileUrl(_u);
    else if (type === 'co')  navAv.href = '/company-profile';
    else if (type === 'edu') navAv.href = '/edu-profile';
  }

  /* logout */
  document.getElementById('btnLogout').addEventListener('click', function () {
    Object.keys(localStorage)
      .filter(function (k) { return k.startsWith('tw_'); })
      .forEach(function (k) { localStorage.removeItem(k); });
    location.replace('/login');
  });

  /* filter tabs — visual only in PR A; PR B adds fetch */
  document.querySelectorAll('.hw-ft').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.hw-ft').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
    });
  });

  /* per-type setup */
  var profileUrl = getProfileUrl(_u);

  if (type === 'emp') {
    document.getElementById('bnProfile').href = profileUrl;
    document.getElementById('sbComplLink').href = profileUrl;
    _sbLinks([
      { icon: 'user',      label: 'ملفي الشخصي',  href: profileUrl },
      { icon: 'briefcase', label: 'تصفح الوظائف', href: '/home' },
      { icon: 'book-open', label: 'الدورات',       href: '/home' },
      { icon: 'settings',  label: 'الإعدادات',     href: '/settings' },
    ]);

  } else if (type === 'co') {
    document.getElementById('bnProfile').href = '/company-profile';
    document.getElementById('bnProfileLbl').textContent = 'شركتي';
    document.getElementById('bnJobs').href = '/company-profile';
    document.getElementById('bnJobsLbl').textContent = 'وظائفي';
    document.getElementById('sbComplLink').href = '/company-profile';
    _banner('briefcase', 'وظائف شركتك', 'تابع وظائفك المنشورة والمتقدمين', [
      { v: '—', l: 'وظيفة نشطة' }, { v: '—', l: 'متقدم جديد' },
    ]);
    _sbLinks([
      { icon: 'layout-dashboard', label: 'لوحة التحكم', href: '/company-profile' },
      { icon: 'users',            label: 'المرشحون',     href: '/company' },
      { icon: 'plus-circle',      label: 'نشر وظيفة',   href: '/company-profile' },
      { icon: 'settings',         label: 'الإعدادات',   href: '/settings' },
    ]);

  } else if (type === 'edu') {
    document.getElementById('bnProfile').href = '/edu-profile';
    document.getElementById('bnProfileLbl').textContent = 'مؤسستي';
    document.getElementById('bnJobsIco').setAttribute('data-lucide', 'book-open');
    document.getElementById('bnJobs').href = '/edu-profile';
    document.getElementById('bnJobsLbl').textContent = 'دوراتي';
    document.getElementById('sbComplLink').href = '/edu-profile';
    _banner('graduation-cap', 'دورات مؤسستك', 'تابع الدورات المنشورة وطلبات التوثيق', [
      { v: '—', l: 'دورة نشطة' }, { v: '—', l: 'طلب توثيق' },
    ]);
    _sbLinks([
      { icon: 'layout-dashboard', label: 'لوحة التحكم',   href: '/edu-profile' },
      { icon: 'book-open',        label: 'الدورات',         href: '/edu' },
      { icon: 'shield-check',     label: 'طلبات التوثيق', href: '/edu-profile' },
      { icon: 'settings',         label: 'الإعدادات',       href: '/settings' },
    ]);
  }

  /* lucide — called once at end; helpers call it again after dynamic icon inserts */
  if (window.lucide) lucide.createIcons();

  /* helpers */
  function _banner(ico, title, sub, stats) {
    var el = document.getElementById('hwBanner');
    if (!el) return;
    el.classList.remove('hidden');
    document.getElementById('hwBIco').setAttribute('data-lucide', ico);
    document.getElementById('hwBTitle').textContent = title;
    document.getElementById('hwBSub').textContent = sub;
    var statsEl = document.getElementById('hwBStats');
    statsEl.innerHTML = '';
    stats.forEach(function (s) {
      var d = document.createElement('div');
      d.className = 'hw-bstat';
      var strong = document.createElement('strong');
      strong.textContent = s.v;
      var span = document.createElement('span');
      span.textContent = s.l;
      d.appendChild(strong);
      d.appendChild(span);
      statsEl.appendChild(d);
    });
    if (window.lucide) lucide.createIcons();
  }

  function _sbLinks(links) {
    var c = document.getElementById('sbLinks');
    if (!c) return;
    c.innerHTML = '';
    links.forEach(function (l) {
      var a = document.createElement('a');
      a.className = 'hw-sb-lnk';
      a.href = l.href;
      var ico = document.createElement('i');
      ico.setAttribute('data-lucide', l.icon);
      ico.setAttribute('width', '15');
      ico.setAttribute('height', '15');
      var span = document.createElement('span');
      span.textContent = l.label;
      a.appendChild(ico);
      a.appendChild(span);
      c.appendChild(a);
    });
    if (window.lucide) lucide.createIcons();
  }

})();
</script>

</body>
</html>
